body:
  text: 陸子餘集卷五明陸粲撰處置邊防疏臣聞設險守國經世之要務有備無患保邦之逺圖古之有國家者未始不以城郭溝池為固其在邊疆所繫尤重不可一日缺焉者也臣切見我朝西北邊防處置可謂周密然日久弊生不無少弛且如陜西河套本吾內境國初設東勝衛於此以控扼其地其後廢而不守遂使河套之險棄為敵巢每嵗秋冬敵輒屯聚其間為我邊患其寧夏地方花馬池至靈州一帶地勢平衍城堡稀疏邊牆低薄易於掏穵壕塹狹淺可越而過敵每擁衆從此而入肆為殺掠我軍無險可據分而備之則患人力之單微聚而不罷則憂饋餉之難繼使一方騷然八郡困敝職此之由往時建議者每欲舉張仁願築受降城故事復守東勝阻河為固連接寧夏大同二鎮以為聲援是誠上䇿顧事體重大未敢輕議為今之計惟有將前項邊牆幫築髙厚壕塹挑濬深闊外以禦敵寇內以衛耕牧最為急務正德初年該陜西總制都御史楊一清條陳邊務要將延綏定邊營迤東石潦池至寧夏橫城三百里內邊牆幫築已經兵部題覆準行興工築牆約計四十里會本官去任其功未竟繼之者畏事避嫌莫肯任此因循至今邊患日甚陜西地方益加凋敝將來之憂恐不止如今日而已幸遇陛下天縱神武方勵精圖治修舉舊章邊防重事所宜及時經理况陜西自今年六月之捷敵人創艾未暇深入為寇地方稍寧正可有為之日夫難得易失者時也此際不為後欲為之恐愈難矣議者多言邊塞之地風沙飄擊版築之功難成易壞然自正德迄今二十餘年前項邊牆四十里者猶屹然如故則斯言之不足信亦明矣夫興事立功要以實心為之能極堅完自堪耐久若如當時原議築牆濬壕髙廣深闊皆踰二丈有敵臺以便守禦有暖鋪以便巡警有小堡以相協助有墩臺以備瞭望處置精詳形勢雄壯選調徑兵分布要害敵人畏憚自然不敢侵逼其欲來送死仍前填壕穵牆我軍乘髙矢石交下彼之人馬損傷必多敵進不得攻退無所掠其勢必至奔潰因而乘之蔑不勝矣為今日守邊固圉之計莫先於此臣嘗詢訪西人僉以為便且謂有五利焉蓋憑髙視下以逸待勞士有全力以制敵敝一也畜牧在野得免驅掠嵗益孳生邊民富實二也今邊境乏馬牆成則步卒可守量省騎兵減芻秣之繁免追陪之纍三也寧夏地方大小鹽池嵗課常患不充緣守臣以敵寇不時侵軼撈取則恐惹事而有咎招商又多畏憚而不來牆成則得以時撈取商賈流通鹽課充羡軍用益饒四也廣開屯田安意耕穫嵗收子粒以佐軍興漸省轉輸用寬內郡之力五也議者不察此顧以勞人費財為言曽不思陜西諸郡遞年供給邊餉飛芻挽粟千里不絶勞費何可勝言一遇敵人入套聲息稍緊邊臣奏開鹽引及動支官帑銀兩輒數十萬今築牆止三百里先年原擬人夫口糧等用止該銀十六萬兩有竒又加以别項雜用總計不過二十萬耳牆成之後使敵不敢入套邊方無騷擾之患內地有休息之期計每嵗所省視築牆之費何止數倍所謂一勞久逸暫費永寧較其利害多寡亦灼然易見但恐邊臣偷安過於畏慎自生疑阻是在聖心獨斷委任責成然後流言不行人肯任事耳如蒙皇上俯察愚臣之言乞敕兵部查照先年題覆事理及臣僚中有建言及此者參詳議處以聞敇陜西提督邊務大臣會同彼處巡撫都御史親詣前項地方相度整理其所用銀兩於太倉動支一二十萬如果不敷或量開鹽引或支陜西布政司無礙官銀接濟選委布按二司及分守守備等官分董其役務令十分堅固不許苟且塞責春夏興工秋冬輟役一二年間可畢其事如此則邊防永固敵寇斂戢俟數年之後我之財力稍充士馬足用雖復城東勝以收河套之險亦可為矣臣章句書生不知邊計偶有所見不敢緘默用是冒昧上陳伏惟聖明留意邊方幸甚陜西一省軍民幸甚緣係處置邊防事理未敢擅便謹題請旨法祖宗復舊制以端治本疏臣伏覩我太祖髙皇帝御製大誥以君臣同遊為篇首臣每誦之未嘗不竊歎聖慮之深逺也蓋自古禍亂之原每生於壅蔽而壅蔽之害常起於上下之不交我聖祖作為典訓以詔萬世託始於君臣同遊之一言正欲通上下之情而絶壅蔽之害其所以貽厥孫謀者至矣臣聞天下之勢如一身必血氣周流而無滯則其身堅強譬如一家必骨肉歡洽而有恩則其家康泰古之善治者每以通達下情為先務君臣之間日相接見非特三代盛德之主若此而由漢唐以下皆然未有隔越不通如近世之甚者今必先去此弊然後天下事可從而理不然雖興利除害惟日不足亦暫得而終失未見其有益也仰惟我聖祖創業垂統正名定分極嚴於君臣之禮然接遇臣下延納群情曽無少間當時遣將出師皆面授成算帷幄信臣若劉基宋濂諸人日侍左右逺方卑職布衣儒生俱蒙引對甚至庶民之役于官者亦以言事直達御前是後若太宗仁宗宣宗咸遵守而行之一時如三楊蹇夏輩承顔造膝議論往復猶家人父子是以上下交孚底于極治朝廷政權自不至於旁落下移也臣聞諸故老近世朝儀起自英宗以幼沖踐祚未能親決萬幾當時諸臣苟為權宜之計常朝奏事限定起數隔日預定春坊本擬旨發落自餘政事俱俟朝退具疏封進沿襲至今遂為故事每日常朝諸司引奏皆瑣碎事務官員謝恩見辭頃刻而退此外君臣無復相接情意壅而不通弊端由之以啓天下之患無大於此者逮英宗自南宮復辟始親政事大臣如李賢王翺特被顧問近孝宗晚年亦數召劉大夏戴珊等議事然猶未能盡復舊制是若有待於今日者陛下以聖神御極總攬權綱釐革弊政慨然欲舉一世於三代之隆甚盛心也然圖治者必端其本猶治病者當究其原今日本原受病之地正在上下之情不通故臣之愚以為必先去此弊然後天下事可從而理也臣謹按大明會典內所載朝儀華蓋謹身武英等殿皆得朝見奏事又云凡朝退燕間及行幸處文職三品武職二品以上及勳舊文學之臣賜坐觀此則知內殿乃君臣常接之地而凡乘輿所在臣子亦得侍從矣又按御製五倫書及先輩名臣所著聖諭録等書往往載當時顧問應對之語舊典甚明可為依據伏願陛下遵太祖之逺猷繼列聖之成法盡剗數十年之弊以復舊規每日視朝罷退御便殿接見羣臣凡政事之大者所司先期上奏至日仍據其本末委曲敷陳大臣在旁上與之熟議可否親賜裁決事畢之後泛問當世之務人材賢否軍民利病皆得言之侍從臺諫輪日奏事或許非時請對撫按方面等官及諸邊大將廷辭入謝皆引見賜食訪以便宜其餘外服庶僚凡因事而至者卒然時召一二而問之得以周知民間之疾苦至於講學一事所繫尤重今經筵月惟三御寒暑又皆間歇惟日講最為親近然接對不過數刻情意猶未盡通乞如洪熙年間開𢎞文閣故事妙選天下博聞有道之士數人置諸近侍使更畨入直陛下聽政之隙輒造其間從容下問或講經史或論治道涵養漸摩之久自然有益聖德如此則上下之情通壅蔽之害去天下事將無不可為者雖三代之治亦由是可復矣臣待罪言職遭值清朝每自慶以為不世之遇是以輒獻愚忠以為端本澄源之助惟陛下少垂省覽採而行之實宗社生靈之幸而臣亦預有榮焉臣犬馬微誠無任惓惓去積弊以振作人材疏臣聞立賢無方古之常道我祖宗朝用人初未嘗拘泥一途近時典選者専守資格偏狹固滯壞盡人材其弊已非一日矣兹遇陛下聖明庶政日新舊章漸復海內延頸想望太平臣愚切謂致治莫先於人材而欲人材之興起必去纍年之積弊用敢略舉數事言之其一選用行取及奏保旌異之類専重進士賢材何往無之豈獨進士可用今由此途而仕者雖或治無善狀在上者猶護持之昔范仲淹有言一家哭何如一路哭今之當道曽不念此其人進士也則容養不問使肆於民上不惜一路之哭而惜一家之哭其人非進士也則指摘瑕疵動加摧抑人情無所慕則不能有所勉吾既薄之彼寧不自棄是驅之於不善而使民受其殃也臣謂舉人監生等出身者果有賢能宜與進士兼取並用屬者言官建白已嘗及此然所論止為逺方臣猶病其未廣况庸人狃於習見往往議其迂闊難行自非立為定法常切申明臣恐奉行者不至姑取一二以應故事終無以為激勸也其二教職往時所重名臣多出其間比來此選日輕有志者多不屑就而老耄昏塞十居七八教法不行人材日壞臣聞正統天順間嵗貢生猶間授京秩今雖舉人教官行取者僅千萬之一二若進士告就此官良非得已而吏部遇其遷轉例不以要職處之夫儒官落莫人所不堪又加挫抑其誰願此臣謂此等果教有成效宜優加升擢以示勸雖嵗貢出身亦間拔其尤者不次用之使知激昂且以警世之玩忽者量增其祿俾得養廉撫按藩臬務須優待問答免行跪禮講書必令預坐且以此意戒飭提學官使為之倡其嵗貢除遵照近例嚴加考選外仍復舊規府學一年貢二人州學二年三人縣學一年一人通令坐監讀書就於其中選取教職蓋此輩所以老耄昏塞者正以貢期闊逺嵗月磨礱漸至衰頽耳今為此則非惟淹滯不振者得觀光太學而年力尚壯者亦得及時效用此法果行所振拔者多矣其三各王府長史紀善教授等官舊皆以儒碩充選若楊士竒周忱由此致大用自餘名臣尚多今則例用闒冗不材者終身不遷有同廢錮以故宗室中屢有放恣違法者由輔導官非人且權輕故也臣請自今遇缺皆選有學行者為之秩滿一體升遷夫民家有子弟猶為求良師况在皇族可不擇人輔翼矧年勞敘進仕者之常豈有終始一官之理斯人之觖望不足惜而見朝廷有厭薄宗室之意豈所以厚本支而勸親親哉其四邊方州郡若雲貴川廣地雜蠻夷易動難安長吏之選視內地尤當加慎今有願就逺方之例其人大抵日暮途窮苟圖利祿耳在上者曷為徇其欲又凡外官考察才力不及俱調逺省是薄其民而使不肖者治之也若曰欲懲戒其人使知䇿勵則貶秩可矣何必逺方此等去處不幸而有梗化者興師轉餉所費不資孰若精擇良吏以土俗稍宜者為之厚其俸給優加遷擢使撫字之為愈乎其五鹽法馬政國之重事非廉幹強力者無以任之今行太僕苑馬寺鹽運司等官銓曹甚輕其選而士大夫尤不樂為其為之而能自振拔者蓋無幾人頃朝廷方議通鹽法修馬政然不擇其人而徒變其法猶無益也天下事孰非臣子所當為選華擇要厭憚繁劇乃不忠之大者此風豈可長哉凡此數端皆積年宿弊最為害事者乞勑吏部盡行改革一洗偏狹固滯之習以施鼓舞振作之權不過數年其效將必卓然有可觀者也其他用人之方切於時宜者臣愚謹攄一得之見條陳四事於後如蒙皇上恢天地之量采芻蕘之言敕下吏部詳議可否擇而行焉其於聖治不無小補而臣區區願效之愚忠亦得試其一二矣緣係去積弊以振作人材事理未敢擅便為此開坐謹題請旨計開一久任使臣聞書曰三載考績三考黜陟幽明我朝稽古立法內外官貟俱歷九年考其功過以為升黜其後稍變前制然𢎞治以前仕者亦多歷俸兩考才升自逆瑾盜政始隳舊章內外官員遷轉不常人思速化因循苟簡捱日望升縱令有所建明亦多不究其志新故交承之間姦弊因之而起比典選者亦曽議及此然立法不平如謂知府知州應久任似也彼布按二司及府州佐二獨何功而嵗嵗遞升乎且官至布政按察亦尊矣其志亦可行矣假令嵗月稍久不為甚屈何必未滿輒遷以滋僥幸勞逸不均遲速迥異人心不服窒礙難行今欲行此必內自部院監寺外及藩司郡縣一槩施之縱不能盡復九年之制亦必如𢎞治以前實歷六年其賢能卓異者與其逐級而亟升不若久任而殊擢如知府徑升布政副使或升四品京堂按察使徑升副都御史侍郎布政使徑升侍郎或尚書凡京官任內曽歷過知州知縣者從優敘用庶幾彼此適均小大競勸人各奮於事功不敢希冀幸進民生安而士習厚矣一慎考察臣嘗見故大學士丘濬所著大學衍義補中論考察之弊最為明切濬之言略曰本朝三年一朝覲天下司府州縣各齎須知文册來朝六部都察院行查其所行事件有未完者當廷劾奏以行黜陟近因選調積滯設法疏通輒憑巡按御史開具揭帖不復稽其實迹立為老疾罷軟貪酷素行不謹等名以黜之殊非祖宗初意按舊制官員給由到部考得平常及不稱職者亦皆復任必待九年三考然後黜降其有緣事降職除名亦許伸理其愛惜人才而不輕棄絶如此彼哉何人立為此等名目加以空文如死後節惠之諡使受此曖昧不明之惡聲沒齒齎恨何以厭服其心乎伊尹曰一夫不獲時豫之辜使天下失職之人布滿郡縣豈朝廷之福哉臣按濬此言深中近世考察之弊惟今天下所造須知文册止是空文部院雖或行查亦不過虛應故事其前項不謹等名目行之既久誠難猝變然以祖宗之良法美意彼妄庸者一朝而易之如反掌况此等弊法苟欲改革亦何難之有至於所謂考語者大抵駢四儷六兩可難辨之詞夫古之聖賢猶不能以一言蓋一人今區區數語欲盡夫人之情狀難矣况未必盡公乎若謂官吏賢否吏部所知有限不得不屬諸巡按亦當使明著其迹如昔人所謂某人亷吏也有某事以知其亷某人能吏也有某事以知其能仍計其所開報之虛實多寡以為巡按之殿最則皆知所警懼不敢以喜怒之私上下其手使公道昭明黜陟惟允賢者不至於失職而不肖者亦無所苟容其為國家之益大矣一汰冗官臣惟官之冗未有如今日者也一事而置一官數人而理一事且臺省藩司布列充滿而國家每行一事輒議别為設官然則彼在位者徒坐食而已乎夫為政以人不在多寡如其賢能自可兼理不然雖多亦奚以為大抵添設一官止為吏胥人等開一騙錢局其實於民無分毫之益今天下額外剩員所在充溢愈近民者則其害愈甚至於布按二司設官尤為過多其巡歷地方或一時總至或先後沓來有司政事奪於送迎民間財力困於供億况此等官員賢者所至有益地方不賢者取具文移苟以塞責且如清軍最為重事今不過行委屬官將前官已清查者重録一過造册了事而已行伍無所增益里甲年年受纍又其巡歷止於衝要地方使公私勞費其偏僻州縣或經年不到官吏放恣莫之誰何勞逸苦樂殊為不均今之為撫按者止知督率二司出巡足以禁制守令之貪暴不知過多之為害如此昔唐姚崇言擇十道按察使患不得人夫舉天下而才十人猶且難之况今數倍之多乎臣聞舊制止是僉事分巡餘皆坐司管事由今觀之二司官緊要者布政司則管糧按察司則提學兵備而已然兵備之設亦似過多特有可諉者曰為保障地方計耳若夫詞訟既有分巡錢糧有官督理則分守之官殆為虛設其他一官之事分屬數人者有之至於京官尤為過冗大率在部者過於間逸専管者無所建明臣謂京官省則俸祿可減以紓國用外官省則供億可減以厚民生乞敕吏部通行查考凡不係緊要者量為裁革省一分則有一分之益不然十羊九牧徒為煩擾官愈多而事愈紊欲天下之治難矣一復制科本朝以經術取士其名最正然士専一經不暇他及一得科第棄不復省間有從事古學者力分於簿書志奪於進取自不能専攻不惟文辭之陋而議論識見亦不逮前人逺甚蓋科舉之法行之百六十年而人才終有愧於古者如此且天下固有髙明倜儻之才不能應有司之繩墨者是科舉所得之外未嘗無遺才也前代取人不専一途明經進士之外又有制科雖其途似雜而得以鼓舞豪俊網羅遺逸祖宗朝亦有賢良方正懷才抱德經明行修諸科臣愚乞倣此意特設一科以待非常之才必博通經史兼工文辭曉暢治道者有官無官皆得應之間數嵗一舉每舉不過數人髙者儲之禁近其次分置諸曹先有官者則遞進焉如此則天下之士爭自奮起雖已仕者亦不廢學無復専經之陋矣臣又聞之人各有能有不能今天下固有學習兵書諳曉術數而案牘文墨非其所長者又有沉鷙勇敢之人胸中了了而不能筆之於書者此等仕既無階心常自負每有風塵之警輒思攘臂其間縱無所成亦能始禍唐之黃巢王仙芝宋之張元吳昊皆以流落不遇遂陷凶逆其事可鑒大抵人有才氣而不得逞其末流何所不至若御得其道則狙詐咸可作使乞令所在官司凡諸色人有不習舉業而才藝可稱者聽其薦聞量才試用其有知邊情諳武略膂力騎射過人者或隸京營或送各邊隨軍效用既以收拾遺才用備緩急又可隂窒禍變銷沮姦雄至於薦舉之途近亦稍狹請令文武官凡到任後各舉一人自代及查復洪武十五年朝覲官各舉所知一人正統年間方面知府有缺在京三品以上保薦事例斟酌舉行庶得以廣朝廷之耳目助銓衡之明揚是或補偏救弊之一道也劾太監閻洪疏臣等奉敕清查各馬牛等房頭畜會同御馬監太監張鼎及户部分管委官親詣各倉場將見在馬牛駝驢逐一查驗除臕壯堪用者存留外其揀退不堪者照依户部題奉欽依內事理就送本部與兵部給散軍民操備耕種行間準兵部車駕清吏司手本該御馬監太監閻洪等題稱在外壩上等各馬房馬有曽經上用及馱過金鞍賞名選記披甲成對等項內有患病倒死尚且具奏埋瘞牛有耕藉擠乳驢頭并瞎瘸馬匹聽候聖冬等節茶飯取用若一槩給軍騎操恐內外馬匹印號相雜真偽無别乞要止照數過實在數目會計料草其點退馬匹免行送部等因到臣看得馬房之設肇于永樂年間當時司牧得人畜産蕃息誠有資於軍國之用自法久弊生人情玩愒虛增數目冒破錢糧積有嵗年浩無紀極兹遇聖明在上深欲節虛費以資實用特敕臣等清查中外人心孰不稱快以為曠世稀有之盛舉臣等點視之際酌量情法再三詳審定其去留據該管官旗人等重甘結狀見在馬匹數內並無前頂馱鞍披甲等名目其馬匹倒死春冬二季送光祿寺夏秋二季付馬户開剝皮張送順義等縣貯庫亦無埋瘞事例所有耕藉擠乳牛隻并馬驢堪備取用者俱已量為存留其餓損矮小老癩瘸瞎者方行揀退送部今太監閻洪題稱一槩給散騎操恐內外馬匹印號相雜思得臣等初奉明旨因恐馬牛舊印糢糊是以奏請再印比及點視各項頭畜除三嵗新俵馬駒外其餘有印者僅千百之一二亦多細淺不真臣等據該監造報文册內開環吉三尖等字號逐一分别蕩烙其揀退者止是翦記鬃尾原無印號乂何相雜之有切照閻洪係該監掌印官吏司牧政亦既有年馬匹在外印號不明漫無稽考既不能及時奏請處置使姦弊日滋逮臣等揀退乃復假此為辭希望存留其敢為欺罔亦甚矣洪又稱此時馬匹數少若復加揀退廏牧將無孑遺是又為危言以動聖聽冀其所請之必行也夫騰駒考牧貴在精良若多留惡馬適足為同羣之纍譬如治田者不先去狼莠而望嘉穀之蕃烏可得哉况見在馬匹不下數千使司其事者能加意飼養假以數年自可漸致蕃息今乃欲留此羸病殘廢之畜望其孶生以壯觀國家寧有是理原洪之設心實慮馬匹揀退則草料亦從而節省會派之數既少則侵剋之利必微是其望今日存留之多正為他日冒破之地耳仰惟敕諭謂各處輸納錢糧皆小民膏血之餘官無實用利歸姦貪積弊已深誠可痛惜臣等伏誦至此竊歎睿鑒髙明洞悉姦弊洪雖有言亦安能上惑聖聽使其糜有用之財以養無益之物重為民生國計之蠧哉然洪巧飾虛辭萬一朝廷或誤聽之則侵漁之徒因兹得計仍蹈故習將來愈無忌憚其害豈可勝言竊恐聖明節財裕民之至意反為憸人沮壞而已行之明旨將遂託諸空言又何以信今而傳後哉臣等責任所在不敢緘默伏乞敕下户兵二部仍照前旨施行其馬匹除給散騎操外有十分老瘦瘡瘸者既難以供備膳羞又不堪軍人騎坐合無并牛驢俱聽該部從宜處置量行變賣銀兩收貯以備買馬等項支用仍乞天語丁寧戒飭閻洪安靜守法毋輕信下人撥置以共成足國惜民之舉庶幾法令得行宿弊可革而臣等亦得以奉行敕旨少免於失職之罪矣緣係振餘財以足國恤民事理未敢擅便謹題請旨陳馬房事宜疏臣等奉敕清查壩上等馬牛羊房頭畜會同原差太監張鼎并户部分管委官主事賈璘等親詣各倉場案行該管官旗將見在頭畜從實分别毛齒印記來歷具結開報公同逐一查驗除揀退不堪者節經户兵二部題奉欽依變賣并分給皇城四門等處擺隊應用外見今實在馬駝驢騾牛羊并駒犢共三千九百七十七匹頭隻查得嘉靖六年未奉明旨清查以前户部原會派各倉場料草大麥豌豆黑豆等料共一十八萬二千一百九十石草四百九十六萬三千束今臣等查點各項頭畜俱有實數通計一年該用料三萬九千三百一十五石七斗八升草九十萬一千五百八十四束比之原數該減料一十四萬二千八百七十四石二斗二升草四百六萬一千四百十六束已經造册奏繳及造清册送憑會計所據內外官員虛增妄報濫冒侵欺情弊顯然論法俱難輕貸緣節奉敕旨都免查究外臣等看得自設立馬房以來逮今百數十年糜費侵漁不知凡幾根盤勢據莫敢誰何中間雖一清查旋復沮壞兹遇聖明在上方勵精求治虛已受言無復曩時掣肘之患故臣等叨承任使得以粗效其愚勉竣厥事但目前之弊雖已稍除而將來之憂未能逆料苟非深思逺慮立為經常一定之法是塞其流而不清其源豈久安之道哉查得𢎞治年間給事中許天錫等清查事完嘗條陳十有四事該部題覆準行不幸正德初年沮於權姦行之未竟臣等今據所奏參酌時宜謹陳十事上瀆聖聰乞下該部看議采而行焉庶幾宿弊可清久逺有賴而於皇上惜財裕民之至意或得以少裨萬一矣臣等不勝惓惓懇切之至緣係振餘財以足國恤民事理具本開坐謹題請旨計開一稽實數臣等竊惟畜馬以資軍國之用乃以衛民非以病民也今各馬房輸納錢糧皆小民膏血之餘而典牧者任意侵欺浪費無極計一馬豢養之資何止破中人十家之産蓋緣會派不稽其實數放支盡出於內臣是以其弊至此乞敕該部通行各馬房經該官員將臣等今次查過實在頭畜逐一開寫毛色口齒印記來歷置立文簿送部用印鈐記付該管委官收掌遇有孳生倒死及該監取回發下等項馬匹養馬官旗先行呈報委官驗過及報本倉附簿明白方準收除各官攢遇每月赴部注銷之日就將收除實數呈報巡清科道官其草料每月或五日或十日一次委官親自下倉眼同內外官明白放支候至年終科道官會同委官親詣各倉場通行查點造册送部以憑會計錢糧庶實數有稽宿弊可革貪冒之徒無從而上下其手矣一省虛費臣惟引重致逺馬牛之常性今之所畜者老死槽櫪徒費豢養而無一日之用然使所支之芻料盡為馬食猶之可也顧錢糧之糜費不資而馬牛之耗損益甚一舉而兩失之豈不尤可惜哉訪得各馬房馬有支料八升牛有支料一斗及草二束者以一馬牛而兼數馬牛之食誠為浪費皆由內外官員假此多支以為侵剋之資耳臣等查照該部覆題及𢎞治年間給事中許天錫奏內事理參酌損益除耕藉牛曽經上用其料草合行照舊關支及三牛房牛隻見令每隻日支料三升草十斤别無議處外其西兒騾馬并擠乳馬定與料五升餘馬俱各料四升草一束駱駝一隻與料六升草一束其各馬房存留牛隻并驢騾俱照三牛房例定與料三升草十斤已經照數造册進繳合無定為定例通行遵守仍查𢎞治年間該部原題事例申明侵盜錢糧之禁敕御馬尚膳二監轉行提督太監等官嚴督各該官員今後馬牛在房務要加意飼秣除天行時氣外平時一月之間百匹之內倒死三匹以上者將內外官軍醫獸參究送法司治以重罪如提督等官故縱容隱者聽科道官指實參奏使人知警畏則錢糧不至虛費而馬牛亦免橫死矣一免會派臣等看得户部每年會派各馬房料草俱行山東河南直隸順天等府辦納動以數百萬計實用無幾虛費居多今臣等清查明白頭畜已有定數則錢糧宜從減省况前項地方水旱災傷科役繁重合無敕該部將嘉靖七年會派之數除已徵在官外其未徵者量與停止或通融計算準作以後年分之數用紓久困之民抑臣等又有欲言者各馬房草場地土本為飼秣之資頃年嘗遣官閲實計有地三萬三千餘頃其子粒所入姑以一畝三分計之已踰十萬兩之數假令嵗收其半亦自足用比奉明旨差官勘用處置合候完報之日令該部計處每年芻料取給於此其會派之數盡行蠲除以後更不必重徵伏惟皇上不惑羣議斷然行之凋瘵遺黎不勝幸甚一減旗軍看得各馬房旗軍俱從騰驤等衛所摘撥在房專一喂養頭畜近該户部覆題要將多餘之數照先年事例發回原衛所差操臣等查得各房見在旗軍共四千四十九名其間役占買間比比皆是如壩上馬房止有馬牛等畜共二百三十三匹頭隻却有軍六百六十一名冗濫至此極矣夫設軍以為馬也今馬少軍多將安用之且如湖渠馬房先有牛馬等畜共七百五十四匹頭隻今除揀退外尚有四百九十九匹頭隻然軍士止九十二名亦不聞有缺少之患舉此一處以例其餘則空間者之多可知矣國家養軍嵗費糧賞不知凡幾豈容置之無用之地以供私役哉如蒙敕下該部將各馬牛羊房軍士盡行查出照湖渠馬房例視其馬之多寡量為存留其餘悉依原擬發回衛所差操俾行伍充實牧圉專精彼此實為兩便一處牛羊查得𢎞治十七年給事中許天錫等奏內稱西琉璃厰羊房牲口不多用一乘田小吏課五尺童數人牧之有餘今本房添設管事官員數多草場地土占種殆盡日支料草剋減無遺養牲旗軍及民户私役買間頻年糜費財力養此瘦小牲口直至倒死方送光祿寺皮肉潰壞不堪祗待本房官員又恐死盡無憑關支料草以為侵剋之媒間令軍民私自買補或有孶生亦將冒頂舊數多係羸小羔犢日以就斃牲口既無實用錢糧又復虛糜深可痛惜乞敕該衙門將見在牛羊作急取用免致倒死靠損公私草場地土照牛房例給軍佃種銀兩付司局收貯以備光祿寺支買牲口應用民户發回該縣當差及看得司牲司司牲局俱在一處事務甚簡合將衙門歸併或裁減官吏行令帶管等因臣等今次查點本房見在牛羊四百七十七隻據司局官吏開報俱係光祿寺遞年發下寄養臣等目擊其羸弱之狀甚至甫出闌圈即已僵仆而死者有之審得其間情弊誠如給事中許天錫所言除將牛羊量行揀退照依兵部題準事理送順天府變賣其存留者將來瘦損倒死勢所必至宜令光祿寺及時取用仍戒飭本寺今後遇有解納牲口務要揀選臕壯者收用其不堪者退回變易或仍責令本户領牧不必發下寄養以滋耗費之端其餘若給種地土發回民户減革衙門官吏乞下該部查議悉照原奏施行其於國計誠非小補一嚴買補據蕃牧千户所千户蘇鏞呈稱東直門裏外牛房并吳家駝牛房養牲擠乳供應膳羞先年遇有牛隻倒死負纍軍人陪補成化十四年該所千户郝端題準將外牛房并吳家駝牛房草場開墾與軍耕種每年徵收子粒銀一千二百五十兩俱本所收貯遇有牛隻倒死就行買補惟存湯山草場以為牧放之地正德三等年該尚膳監太監張裕題準將湯山牧羊草場開墾一半徵收銀兩修理公廨續該太監王誠又將外牛房并吳家駝牛房二處地畝銀兩俱徵在監收貯本所官員並無干預等因臣等查點過三牛房見在牛共四百五十隻其間瘦損者不可勝計徒費料草而無實用緣前項子粒銀兩歸之內監輸納既無簿籍可稽領買又有剋減之弊內外官員遞年買補牛隻専取瘦小者以充數既利其價賤可以花銷又幸其倒死重復買補此其弊端誠不可不嚴為禁革乞敕該部仍照先年事例將前項地畝并湯山草場子粒銀兩俱令本所自行收貯置立卷籍自今年為始將徵收并支用過銀兩買補過牛隻數目明白開寫科道官每年終查點頭畜之時通行稽考如有侵剋那移等項情弊從重參究其買補牛隻今後務令收糧主事眼同本所掌印官擇取臕壯有乳大牛不許將瘦小者擡價收買臣等又看得壩上壩南壩東金盞兒甸義河北髙湖渠七馬房各有牛隻除揀退不堪外其間略有臕息者量留七十隻但馬房本為畜馬而以養牛既非所宜况此牛又不擠乳供應誠為無用合無行前項馬房將存留牛隻揀選內有堪以擠乳者送裏牛房其餘俱送光祿寺應用以後但有牛隻俱照前處置庶幾不糜有用之財以養無益之物矣一蘋冗員看得各馬牛羊房俱設有內官管理馬匹錢糧每處或七八員或十餘員其多者至二十餘員馬少官多十羊九牧徒為煩擾且今頭畜更減於前錢糧不多官亦宜省乞敕該部查正統等年間各馬房原設內臣額數如有馬少官多去處量為裁革養馬指揮千百户員數過多者一體查明發回本衛所聽候差操其內臣之中豈無賢能有志向上者宜令提督并巡視倉場科道官察其勤能亷靜者具奏旌擢怠玩貪刻者指實奏聞處治每年終仍計其畜産之繁耗以為殿最懲勸既明則人知激勵是亦修舉馬政之一助也一禁饋遺訪得提督等官每年點視馬匹所至內外管事人員盛設酒席欵待及饋送茶果錢多至百數十萬其跟隨識字人役亦各得分例錢習以為常自上而下交相征取苟非掊剋侵欺其財何所自至是以徵收子粒則刻剝佃户收納料草則勒掯商人虛增妄報百計侵漁其源皆起於此今馬匹錢糧既有實數此弊或將不禁自革然當積弊大壞之餘而為改弦易轍之舉立法不可不嚴慮患不可不至宜敕該衙門通行禁約今後敢有仍蹈前弊者科道官及緝事衙門指實參奏處以重法臣等又訪得每年馬匹下場牧放承委官員於各州縣僑户需索銀兩遞年為害非淺合無今後但遇下場時月該部先行奏請出榜曉諭有似前需索者嚴加懲治則人心知警而弊端可絶矣一謹防範臣惟印烙馬牛所以分别公私防間詐偽關繫不為不重頃者臣等查點過各房馬牛雖稱有環吉三尖等字樣其實通無印號間有一二亦多細淺糢糊而太監閻洪奏乞存留乃假印號相雜為辭臣等嘗據所見以折之矣比聞天間在內者亦有盜易之弊若使防範果嚴豈應有此今見在頭畜已經臣等奏請重加蕩烙此後如有各處貢賀及新收孳生馬匹俱乞及時印烙每二年或三年一次提督官通行點視但有文理細淺者即為照前再印庶幾真偽可辨而姦弊不生矣一立公署看得各馬房錢糧户部設有主事分管緣倉場去京或在百里之外俱無公署可居各官逐月下倉寓宿內臣私宅本倉官攢亦無廨宇每遇收糧隨同主事到彼賃住民房或一二日事畢旋即回京以致錢糧之出納通不經手馬牛之肥瘦邈不相關揆諸事體深為未便切見近日在京尼寺拆毁數多變賣未盡合無量為拆卸前去馬房蓋造公廨以為各官次舍之所并官攢亦各造與房屋就彼居住以便收支庶不往來道途致誤公務舉遺賢以裨化理疏臣伏以賢才理道之所先明揚聖哲之上務歷選往朝莫不崇重斯軌陛下天授欽明誕敷文教延佇耆德寤寐嘉猷雖圭璋特達充滿治朝而遺寶在野尚勤物色臣竊見原任山西按察司按察使顧璘竒才卓犖藻思精贍弱冠出宰厥聲清劭洎乎擢守大梁著撫寧之績斥遷嶺海見貞孤之操歷轉藩郡所至有紀剸繁治劇則靡適不宜臨事決機則出人慮表豈直文華醖藉擅東南之美而已哉原任江西按察司副使李夢陽英特雋邁絶類離群昔守曹郎抗節玉立昌言而貴戚沮喪危行而權璫側目若其華國之文焜耀當世固已方軌漢魏追薄風雅海內多士咸共矜式特以風格孤峭不善俯仰流俗背憎端由於此二臣者並曠代之逸才清朝之茂器也方今皇極未臻英雋淪落公卿勤推轂之懷當寧興側席之想稱量之際每患乏才有如二臣不可多得儻使入踐清華備館閣之選出管臺寺任藩維之寄必能贊揚大化翊宣皇猷增廣庭穆穆之風章本朝多士之美伏望敕下吏部再加看詳如果臣言不謬乞將璘與夢陽亟賜起用庶令瓌竒之珍復登天府之藏盛明之代得無遺棄之才矣臣為國之心不勝祈願緣係舉賢才事理未敢擅便謹題請旨乞霽天威以明大獄疏近該都察院等衙門具奏會審犯人張福等情罪陛下責其回護將右都御史熊浹革職令侍郎許讚等將原問官郎中魏應召并張柱等用刑追問臣愚竊謂此等獄情重大自非為刑官者用心周到從容研審未易得其情實今者雷霆之下不惟法司畏罪而大小臣工罔不震悚雖有區區之愚忠誰敢自獻臣待罪言官仰見陛下聖明樂聞規諫言事者雖或不當猶被優容有君如此忍負之哉臣是以敢冒昧而終言之臣聞獄者天下之大命也一成而不可追悔故聖王慎之今張福之母之死自東厰錦衣衛問則罪在張柱在張柱為鬭毆殺人刑止於絞自法司問則罪在張福在張福為子殺母刑至凌遲處死夫子殺母大惡也凌遲處死極刑也非可以輕加諸人者陛下疑而慎之是也然近日法司會審自張福之親族鄰里衆口一詞證其逆狀而其姊之痛憤又發於至情不容偽為者熊浹等既據此定獄然猶謂事情重大未敢專決奏請行提原撿勘官及張福自報鄰佑里老再行會審其慎之亦至矣陛下欲明白此事宜如所奏令拘集證佐隔别審問參互考驗殺人之獄必有所歸矣今一旦遂加譴怒罷黜總憲大臣其餘誰敢自保夫畏威逺罪中人之常性而持法守正雖賢者以為難如近日會審之時侍郎許讃則噤口不言少卿曽直則諛辭附和侍郎聞淵寺丞簡霄俱辭疾不出此無他患失之念重務為自全也矧今又當恐懼之餘非聖明少寬假之安能無所顧忌協心以聽斯獄哉且東厰錦衣衛詔獄所寄兼有訪察之威人多畏憚自來訪拏人犯送過法司往往止依原案擬罪或明知有寃不敢辨理斯實纍朝因襲之患非一日之故矣兹幸陛下乾剛獨斷如日中天洞燭幽隱此輩尚何能為故刑官亦敢據理而與之爭實仰恃聖明在上能容臣子守法故也然陛下所以詰責法司者無非愛惜民命慎重獄情求其至當而已但恐此輩或因而虛張聲勢况四海九州之人難以家喻户曉未免誤致驚疑逺近傳播非所以增光聖德垂示將來也夫美業難終令名易損臣愚重為明主惜之若熊浹之賢否臣不暇論其奉旨會審而不提原問官誠不得為無罪但都察院職司風紀右都御史二品正官今議獄一不當意斥而去之若退胥吏然一人不足惜無乃傷國體乎語曰亷逺地則堂髙比來大臣以微纍細故去者多矣此道不改殆難以厲臣節而尊主上也臣又恐此後為法官者以熊浹為戒依阿苟免無所匡正也然則國家何賴焉昔𢎞治間郎中丁哲辨樂工之獄孝宗皇帝初亦甚怒黜令為民時有吏徐圭為哲訟寃因至罷役未幾上心悔悟丁哲復起徐圭亦蒙録用夫聖人之喜怒猶水鑑之無私而改過不吝帝王之盛節也故天下至今稱明此正今日所當法也臣愚伏願陛下少霽威嚴特降溫旨令許讃等虛心究問無懲前事無拘成案無使罪人幸免不辜蒙戮務協厥衷以稱朝廷庶慎庶獄之意仍將熊浹曲賜矜宥俾得自新以圖後效并戒飭厰衛今後凡訪察事情宜加慎重無得輕忽致有虧枉法司官尤宜從公辨審不許避嫌畏勢自生疑沮使天下曉然知明主之意本如此也既以解衆庶之惑且以慰臣下令守法者無所顧忌刑罰清而民服矣臣實不勝懇切祝望之至緣係乞霽天威以明大獄事理未敢擅便謹題請旨劾張桂諸臣疏臣謹按大學士張璁桂蕚皆以凶險之資乖僻之學曩自小官贊議大禮蒙陛下拔置近侍不三四年位至極品恩寵隆異振古未聞雖捐軀殞首未足以酬知遇乃敢罔上行私専權納賂擅作威福報復恩讎徇一已之見則破天下之公議而不恤快一時之忿則廢百年之令典而不顧陛下有堯舜之資璁蕚不思竭力效忠以輔成唐虞之治而専持苛刻之説凡事之忍心害理人所不敢為與不肯為者無不攘臂為之斫喪纍朝之元氣變亂祖宗之典章敗壞縉紳之氣節使朝廷政務日見紛紜聖心惓惓夙夜望治而斯民不被其澤者皆二人之罪自昔人臣負恩誤國孰有甚於此者夫大禮之成雖由二人建言實本於聖心之純孝顧乃貪天功以為己力凡有奏請動引大禮為辭挾制君父如近日被言官論劾陛下不即加誅但示戒飭待之厚矣不聞其悔過遷善而憤然上疏自陳功伐纍數百言夫人臣為國效勞皆職所當為雖周公之功亦非出本分之外况璁蕚乎就使有功則今日髙官厚祿酬之已過分矣又安得以此自矜哉強辨飾非辭氣悖傲大不敬無人臣禮即此已不容於聖明之世矣臣愚以為君之御臣有功固不可不賞有罪亦不可不誅璁蕚區區之功已叨厚賞則其有罪獨得無誅乎是在陛下斷之而已然張璁雖狠愎自用執拗多私顧其術猶疏為害猶淺桂蕚外若寬迂中實深刻其忮忍之毒發於心如蝮蛇猛獸犯者必死以此較彼則蕚之姦尤甚臣姑舉數端言之尚書王瓊姦貪險惡在正德年間交結權姦濁亂海內罪不容誅自蕚等用事瓊令伊女壻家人潛住京城日夜鑽刺所賂遺蕚等數至巨萬蕚連章力薦璁在內閣從中主之瓊遂得起用乃為之言曰使功不如使過瓊雖有過才不可棄也果若斯言是小人之有才者皆縱惡而無罪共工歡兜不見誅於舜矣引用凶人為國生患豈大臣以人事君之義哉昌化伯邵杰本邵氏養子爭襲伯爵時尚書胡世寧乃邵氏親鄰而杰之主母昌化伯夫人為邵門婦數十年皆明知其來歷蕚受杰之賂力為主張竟得承襲使奴隸小人濫膺封爵勳戚世胄與之同列辱國甚矣蕚素厚醫官李夢鶴假託進書夤緣授職與之所居相鄰內開便門以通往來并序班桂林及蕚之管家吳從周者人呼為念一官尤被聽信三人専一説事過贓道路之人皆知之蕚又引鄉人周時望為文選郎中通同賣選凡好官好地方皆其鄉里以關節得之蕚則容嬖妾納賄逮事發乃銷假銀而退還時望則縱悍妻受贓臨去官猶以受金而反目時望倚恃蕚勢肆無忌憚且如南京太僕少卿已經議裁革欲為已地仍復朦朧具缺即此一事其他欺罔可推自知公論不容乃托養病而去若使斯人幸免姦臣何所懲戒陛下試令吏部查其在任時大選急選過官員有無私厚鄉里其外官推升者比對歷年撫按守巡考語及各官年資淺深該升與否姦弊自見矣且吏部為六曹首文選又諸司首從來皆擇清謹有名者為之今周時望既去代之者胡森并主事楊麒王激三人皆輔臣之鄉里親戚也銓選要地盡用私人升黜豫奪惟其所欲每要職有缺外人竊議謂必江西人與浙人得之既而果然久之亦習慣不以為怪矣先因霍韜建言已議準京堂及外官有缺各部屬相兼推用自蕚在部如戴時宗薑清以郎中徑升少卿丁汝夔以員外郎徑升副使蕭璆以主事徑升僉事他部亦有此比乎故違明旨用市私恩不但不畏人言亦不畏陛下矣官爵者以待天下賢材偏徇至此豈不可為痛憤蕚典選僅逾年所為姦弊不可勝計引用鄉曲故舊如原任工部尚書今致仕劉麟其中表之親也偏躁自用狂譎不情外示矯激以要流俗之名內為交關以滿姦雄之槖雖已罷官猶為漏網禮部侍郎嚴嵩其子之師也始典成均因撥歷而甚招物議尋遷卿二遂感恩而益固私交僉都御史李如圭由按察使一轉而徑入內臺依阿有迹南京太僕少卿夏尚朴由知府期月而遂亞卿寺情狀可窺禮部貟外郎張敔通律歷而假以結知懷金錢而為人請託御史戴金承望風旨論劾大臣公為諛辭形諸奏牘甘心鷹犬之流大壞憲臣之體此皆蕚之死黨相與比周為姦者其他如禮部尚書李時柔和善逢狡猾多智布腹心於羣邪始進之日固黨援於二凶當路之時南京禮部侍郎黃綰曲學阿世虛談眩人由異路而躐取清華負乘可恥倚官勢以虐害鄉里奏訐屢聞右諭德彭澤因罷黜而夤緣改秩致金壺夜饋之謠懷汲引而依託權門玷玉堂清貴之選此皆隂厚於璁而陽附於蕚者諂佞之輩相師成風人心士習壞敗極矣蕚等威勢既大黨與又多天下畏之重足屏息前此莫敢公言其非者天啓宸衷覺悟其姦彼自知罪大惡極無地可容強顔班行希望恩貸不亟去之臣恐凶人之性不移怙終之惡益甚目前決無寧靜之日將來必為社稷之憂伏望皇上大奮乾剛將璁蕚等速加誅竄以謝天下仍將其心腹如周時望李夢鶴桂林吳從周等拏送法司明正其罪及諸阿諛幸進之徒重加懲治以為人臣附下罔上之戒庶幾公道昭明人心痛快天變可消民怨可弭賢材之進用有階海宇之清平可望足以副皇上惓惓圖治之盛心矣社稷幸甚天下幸甚乞致仕疏臣年四十嵗原籍直隸蘇州府長洲縣人由進士改翰林院庶吉士授工科給事中降貴州都勻府都鎮驛驛丞升前職自幼得患目疾見風流淚近因喪妻哭泣過多雙目赤腫疼痛比蒙聖恩授臣前職勉強扶病到任不能僉押文案已於嘉靖十一年九等月節經移關本縣具申合干上司告乞致仕間一向調治未得痊可逮今日加昏眊全不見物又因久服寒涼之藥致傷脾胃見患泄瀉嘔吐飲食不進十分沈危隨據本縣撥到醫生曠世標前來看視得脈息微弱氣血俱虛及兩目瞳神散亂神水漸枯急難療治等因伏念臣本草茅賤士章句庸流荷蒙皇上天地生成之仁使臣得齒列衣冠濫司民社正欲䇿勵駑鈍以圖仰答萬一此臣之志也亦臣之分也但臣罪釁所鍾鬼神降罰致有斯疾已成廢人况臣有母胡氏見年七十三嵗在家老病侵尋不離牀蓐臣妻已亡所生子女俱幼不能隨任零丁孤苦觸目傷心臣若遂死于官必至舉家失所以此日夜憂惶進退維谷若不仰訴於君父更將倚賴於何人用敢披瀝哀誠冒干恩造查得大明會典內一欵自告願退官員不分年嵗俱令致仕伏望皇上憫臣病廢之苦察臣迫切之情乞敕吏部查照前例準臣致仕使臣得生還故鄉沒葬先隴臣死之日猶生之年不勝感戴天恩之至為此具本専令義男某親齎謹具奏聞陸子餘集卷五
