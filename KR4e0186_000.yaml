body:
  text: 陸子餘集目録别集類五明卷一序記注荀卿子序濯纓亭筆記序平越西劉氏族譜序怡老園燕集詩序送同年戚秀夫知歸安序浙江鄉試録序靜芳亭稿後序贈訓導嚴用文之官寧海序仙華集後序贈長洲趙侯入覲序後執法篇贈陳子東之考績贈郡倅常公序翰林文先生八十夀序又貴州按察司題名記思寧堂記鄒氏復節婦墓記卷二傳碑銘墓表戴先生傳陸義姑姊傳給事中李公傳前樂安令顧先生夀藏銘一蘭陳翁夀藏銘福濟觀重建吕純陽祠碑銘雲南按察司經厯劉紹卿墓表卷三墓志祝先生墓志銘貴州楊義司副長官金翁墓志銘亡妻盛氏墓志銘太醫院醫士張君墓志銘天池山人陸子玄墓志銘張時濟墓志銘怡圃朱翁墓志銘奉政大夫工部營繕司郎中張公墓志銘明故南京禮部精膳司郎中南丘先生陸公墓志銘旌表節婦吳母陳氏墓志前儒林郎大理寺右寺副王君墓志銘錢均卿墓志銘先母胡夫人墓志附七十夀序一首卷四行狀祭文明故資善大夫都察院右都御史盛公行狀祭王文恪公文祭亡妻盛氏文祭邃翁文祭外舅盛公文祭王履約中丞文祭僉事方公文卷五奏疏處置邊防疏法祖宗復舊制以端治本疏去積弊以振作人材疏劾太監閻洪疏陳馬房事宜疏舉遺賢以裨化理疏乞霽天威以明大獄疏劾張桂諸臣疏乞致仕疏卷六書簡奉外舅盛公書奉太常錢先生書與李仁甫書與聶文蔚太守書與華修撰子潛論修史書與嶽厚夫書答鄧文度省元簡與楊用修太史書答天水胡公書答黃材伯侍讀簡答王濟美提學簡與吕侍御信卿書與羅狀元達夫簡與永豐聶公簡與王道思參政簡與尹崇基太史簡與蕭太守國材論家禮纂要書與太宰羅公論困知記書卷七雜文子家子贊子胥論讀莊子讀鍾離意傳書劉氏先墓記後題趙松雪溫日觀畫書姑蘇雜詠後題貞逸處士卷書鄧尉山志後題墨客揮犀録本又題題湯氏小宗圖卷書大理卿胡公遺詩後擬上備邊狀詔修濬通州閘河議名宦祠議卷八詩詠史樂府二首畫虎行鄭卿歌李侯行邊軍謡擔夫謡朐岡行贈遲戶部兼簡馮汝強伯仲賦內閣芍藥送待詔文徴仲先生致仕送魏師召之蕪湖遊大酉洞天贈朱民部使君還朝寄謝趙醫士漫述三首幽蘭篇名都篇名姝篇為友人作太息行贈平湖謝贊府贈别王直夫二首贈沈元材門有車馬客行贈張户部留别金生送翁德宏二首憶家君寄葛太守子中送祝參政之雲南答朱僉事贈顧參軍之都勻攝郡秋水亭送陳太僕謫教海陽六首上饒道中送汪僉事之湖南三首送人入蜀三首長門怨臣等謹案陸子餘集八卷明陸粲撰粲字子餘一字浚明長洲人讀書貞山人稱貞山先生嘉靖丙戌進士由翰林改授工科給事中上書論時政下詔獄廷杖又疏劾張璁桂萼謫都勻驛丞稍遷江西永新縣知縣尋乞終養致仕粲詳於經史訓詁尤熟當代掌故受業於王鏊傳其文法徐時行稱其出入左氏司馬遷無論魏晉彭年以為專法馬班雄深雅健東漢諸家所不及俱推許太過惟黃宗羲云貞山文秀美平順不起波瀾得之王文恪居多乃歐陽氏之支流斯為能得其實矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
