body:
  text: 陸子餘集巻二明陸粲撰戴先生傳戴先生諱泰字嶽宗世為江西之永新人先生少頴異日記千言為文援筆立就以家難避之襄陽襄陽人未之知也獨居敝廬中躬執㸑滌旦暮手一編朗誦不絶口旁舍人窺見異之就問曰客何為者自苦如是先生不應居久之士人有知之者延致之家為塾師遂占籍襄陽補縣學生同輩見所業驚服稍稍從問難因折節為弟子先生故治易諸為易學者爭願従先生游當是時先生名聞江漢間成化戊子薦湖南魁其經辛丑禮部試中乙榜授蜀之南川教諭地雜夷獠士鮮知學先生日夜親督教之數年乃有領薦者調大足應聘考浙江鄉試稱得人秩再滿乞致仕不待報輒去當道者强起之又調金壇而先生自顧老矣益不樂亡何竟歸諸生留之不得涕泣送之歸十年卒年八十二先生性敦厚質直繼母性嚴事之以孝聞仕二十餘嵗不過校官所至未嘗以私干人自言吾無過人者顧平生不能言利耳既老家赤貧服御單陋有人所不堪者終不問産業所著述務以理勝嘗教學者屬文當先治心無徒支離其辭為也君子以為知言先生之先本蕭氏元季有宗濂者為廬陵判簿當天下亂糾義旅捍鄉社髙帝聞其名召授節鉞不屈死金陵市中至其孫為戴氏甥因冒姓戴至今自判簿以節死鄉人髙之其後子孫寖顯若代長史禮蜀伴讀弼汀州守禧及先生皆起科目為名人先生子梧今嘉善令忠信好修世其家陸粲曰余聞之太史遷言漢祖滅項氏令諸故項籍臣皆名籍獨鄭君不奉詔被逐死至其子荘官九卿諸孫為二千石者六七人今觀判簿之死偉矣其後世貴盛略與鄭氏等天於忠義之報固有意哉梧與余同進士舉相善求傳其父平生得判簿死事因附著云陸義姑姊傳陸義姑姊者吳郡陸粲之姊也婉嫕有識鑒歸蒋氏而寡其弟粲舉進士為給事中疎戇好言事一嵗中章十餘上數譏彈用事者過惡竟以是得罪謫西南夷徼外地荒逺不能以家從粲既行數月而其妻病歿有一男一女皆幼母胡夫人老且失明方悲號嘑天莫知為計姊聞之曰嘻此吾責也顧其子曰善視而室吾往與二雛俱存亡矣亟走弟舍抱持其男若女以泣日撫視之且教以學書記及女紅恩意甚篤男若女皆忘其母之沒也他日粲得稍遷為縣令過家戀戀不能别姊曰行矣有而姊在何憂粲亦遂慨然辭去不復顧家曰有吾姊在何憂久之粲致事歸其男若女則皆長矣姊又日為縫紉衣被飭治奩具視畢婚嫁乃辭去復従其子以居於是吳之大夫士凡與粲兄弟友者聞之莫不髙賢姊之行曰昔者魯婦人遭亂舍已子而存兄子時號魯義姑姊今姊行足追配若人宜遂曰陸義姑姊云或曰姊其有所聞而興起者歟姊未嘗學問顧自其少時喜従諸弟説史傳故實及覽稗官小説至古人壯節事輒拊手稱善為吟誦不釋口夫其嗜義也固天性然耶然姊居貧足不出閫閾又其諸弟及子皆賤士不能藉交於四方之賢豪長者以談説游揚其名故姊之事獨其鄉人知之耳令世有良史如劉中壘者録寘之列女傳中安知不與魯義姑姊者並傳也雖然姊之始願則豈為區區之名哉於是姊年且六十其弟粲将率其男若女往為夀而書其事以視之曰俾爾後之人無㤀焉作陸義姑姊傳給事中李公傳給事中李公者大梁之祥符人也名濙字宗禹一字原潔其先自燕来居大梁世有顯人稱衣冠家公早孤力學被選為校官弟子員美鬚眉儀觀豐偉好倜儻大節舉成化辛丑進士久之拜南京户科給事中㑹敬皇帝初即位是嵗六月朔日有食之公上疏勸上飭躬修政以銷弭變異因陳慎始保終之戒上嘉納焉都民當供雜調者其髙貲富人大抵為貴勢家私役而官中百需特倚辦下户公令所司覈實而均其征有挾私干請者痛斥絶之於是宿弊盡蠲上下稱便中貴錢能素饕詖時典留鑰兄弟為姦利暴横都城中公奏劾其罪狀又論刑臣不宜干紀與政辭指尤峻切用事者怒俄有盜取土於孝陵壖中者公廉得其主名以聞用事者因指擿以為誣㒺非所宜言有詔鐫一階補肥鄉丞肥鄉小邑去京師差近朝貴往来境上每有所發取守令不能距違公至則一切裁之以法其後遂莫敢妄求皆曰無撓彼彊項丞為也是時左降官多簡傲不省事獨公盡心吏職推情與下先諭教而後笞罰民大信愛之惟恐其去也一日集數百人走闕下上書言願従明天子乞李丞惠養小民書報聞而公以母憂歸矣比終喪年纔五十餘遂無仕進意家居日夕手一編絶跡公府部使者以下造門不輒見既見語不及私所居湫隘或請更諸爽塏者謝曰先人安焉余不足以嗣之余保此足矣巡撫都御史孫需陶琰先後列薦于朝使郡守丞即其家勸之復出譬説良苦公弗應既而拊心笑曰此中乃堅過於石何可轉也因署所居曰石菴以著其志中貴廖鏜鎮守河南勢張甚蔑視士大夫獨心敬公間為具召之時賓客滿坐待公舉酒公不得已彊往酒一再行即據席睡大鼾鏜慙顧左右曰李公老人也不勝桮杓矣少選公起拭目理髯長揖徑去鏜為㒺然自失自是不復召也論者儗之宋廣平待王毛仲事云素輕財居官所得俸禄悉分遺族人未嘗營立産業既老益貧常飯脱粟猶時時弗繼獨居一室土牀葦蓆而已然無不足之色遇良日乘小車従子姓出游茂林廣野靡所不之意欣然樂也正徳癸酉年七十一乃終公善書所為詩文皆有思致今存者若干首陸子曰班固書稱朱雲著節漢廷後不復仕常居鄠田時乗牛車游衍自適雖宰相欲延致之東閤弗屑也余觀李公仕盛明之朝數上書顯譏貴勢亦矯矯壯激矣其謫也非上意令異時復起必且馴致大官乃泯迹里閭優繇終老遭有力者相援而執志弗變方諸槐里令屈彊衰世者雖所遇不同然風操則髣髴似之矣抑吾聞馬文淵有言凡人既貴當使可復賤也今之仕者一日去其官即愁沮喪志如魚失水喁喁然死耳若李公者食貧不悔為人所難所謂可使復賤者非邪公子世徳為禮部郎坐小法謫吳邑博士間述公行實視余余為列其大者以傳前樂安令顧先生夀藏銘先生姓顧氏名蘭字榮甫其先家吳之香山國初始遷郡城臨頓里今為里人父倫母薛氏先生少則儁朗不羣未冠已博綜羣籍補長洲學生𢎞治戊午占應天府鄉薦累試禮部不第正徳丁丑謁選得山東淄川令淄川小邑而賦役繁重富人子大抵出貲為省府掾以夤縁規免先生按籍鉤考令諸科讁一視資産為差吏徒抱案受署不能有所前却上官聞為下其法於旁郡邑行之無弗稱便他雜調為民病者一切放罷邑故有鄭康成祠久廢亟為繕治率學官弟子以時行祀事毁僧尼廬即其故址作社學簡少俊立師教之民駸駸嚮化俄改知江西之樂安樂安俗尤靡薄人死泥堪輿家言積十餘嵗不葬子弟未冠而婚女婦夫死不持服輒嫁先生以禮風曉其士民且白監司嚴設科禁俗用丕變里胥豪奪鄉民不令受事先生察其利病為參停均適常使孤逺者得所民喜相傳告自山谷爭出應役長老驚歎以為數十年来所未有也是時輩類為州縣者多超取顯美先生治兩邑更七八年以不能樹援當路故名秩不進而其意亦已倦游因力請致事以歸時年才逾五十耳所藴蓄葢什不一試談者至今惜之先生受性介潔自為舉子抗志食貧不苟取予或要與俱請事於官曰不能少屈意以自潤耶先生不應拂衣徑去其人慚語人曰是子固狷士也居官益自矢清白自淄川入覲單車上道囊空無一錢父老為率邑中得數十緡以獻竟賦詩卻之樂安民長鄉賦者嵗餉令五百金先生亦峻謝焉比歸足不入公府所居委巷中有小圃雜蒔花木果蔬培壅灌沃勤而適時久之皆蔚然成林日徜徉嘯咏其間不一問世事喜讀書每得一編披玩不暫去手間為小詩辭致清婉亦善繪事而不輕作早嵗頗少容晩更夷曠與客談讌常雍容欵洽雖率然啁笑亦雋永有味云粲與先生同里居為後進亦以仕齟齬早退而骯髒寡諧意獨親先生先生亦折輩行與交時時相過従輒解衣槃礴竟日語笑飲酒相樂也至是自治夀藏於白蓮涇之世墓語粲曰吾年過七十旦暮従先人於是子為吾銘庶吾猶及見之也先生故所與游最善者文内翰徴仲徴仲為著傳擬之陶元亮當世以為知言銘曰望其外臯如即其中廓如是維先生歸全之區徯後百年乘化以徂有知徳者過其下尚曰此古獨行士之墓也而式諸乎一蘭陳翁夀藏銘一蘭翁作夀藏横山下語其子曉曰吾老無所覬慕獨念欲得當世之君子有道而能文者銘吾斯藏吾庶以是不朽矣小子盍圗之於是曉詣余告曰是莫宜子者因出所著事狀再拜以請余不得辭也為撮其略而書焉翁名綱字宗憲姓陳氏世吳人大父本仕為蜀羅江教諭子姓從宦學者因占數漢州以便進取父昌太學生母水氏兄經中蜀省鄉試髙等翁生州之寓舍幼岐嶷不凡従其父兄受尚書若毛氏詩輒了大義既而隨父謁選京師道出華隂父暴病死逆旅中逆旅人不聴殯将野墐之翁長跽哀號竟得成殮潜丐縣令䕶其喪間闗達蜀翁時年十有五嵗既壯乃克奉其母以父喪歸吳葬焉家儲無擔石所親有哀其貧者頗賙給之始出従事貿易久之足跡殆徧天下常經渉險阻瀕危而濟一日慨然曰奉先人遺體數履畏途以徼尺寸王陽獨何人哉自是不復出取故所讀書稍尋繹之里中人爭迎致為子弟師蓋翁雖嘗服賈而其韻度固蔚然儒者也居家孝友念其父客死言輒灑泣養母極滋味每食必親省具乃進諸兄弟前卒者為收恤孤嫠咸令得所族子以罪戍邊翁為所詿累盡喪其資無幾微見顔色平生非其義弗苟取嘗適濟南有袁丞者寓以百金道遇盜従者迸散翁獨彎弓射盜却之或説使匿其金曰第以盜為辭足矣翁不聴卒歸之他事多類此翁生天順壬午正月四日今年七十有九而聰明不衰娶蘇氏子男二人長曉縣學生次晴先卒女一人惟陳之先蓋有隠徳學諭君尤稱篤行夀且百嵗至翁起孤童奮自樹立雖食貧以老而不隕厥問殆難能也已曉方發藻儒林有禄養之望焉天之報翁将在是乎始翁嘗讀琴史至猗蘭操意若有感焉者故自號一蘭余為銘以著其志銘曰蘭生幽遐蹇獨芳兮弗紉而佩亦何傷兮有美若翁庸比徳兮其𦙍則嘉秀而碩兮終為國香媚于后兮干禄百福用滋茂兮君子刻銘播厥芬兮後千百祀其永有聞兮福濟觀重建吕純陽祠碑銘福濟觀建吕僊純陽祠葢成化中道士郭宗衡始為之而武功徐公記其事云夫神僊窈惚不可知然觀王大猷所遇則又甚顯妙化𤣥蹟龍升霞舉孰能測識之哉余嘗聞純陽舉進士不第棄去遂學為僊是以乘三光逰帝庭為可致而土苴文章芻狗富貴視吾儒之論著琬琰勳勒鼎彞者果不足尚乎然真風靈惠又往往足以濟世而福民是故神明之異貺生人之别造也嘉靖甲申吕祠火道士周北山再建焉棟宇鮮勝丹堊互照中設僊像旁翼嶐廡洞門神室鬱然雲開於是復為真境矣北山名以昂少學道獨扣𤣥宗洞究至理其閒神曠思翛然塵外而世之文章富貴舉無以溷其中然又慕儒行習孝友之綱敦禮義之節為時所重又嘗與髙逸者逰詩酒彌日樂而㤀倦然問以神僊事則黙且笑嗚呼是誠窈惚不可知邪抑有之而顧難測識邪若北山可謂學道而有得者矣祠成請銘於余余未暇也葢又十餘年始克為之其辭曰閶闔東褎虹橋西絡真苑崇開新宫載作神居鸞峙靈堂虎躍雲搆髙翔天工巧削雄柱含虬文題引鶴日抱璇梁霞流珤閣邃宇芝成洞房綺錯采絙周廊麗張夏幕銀牓初輝金函廼託館伏蒼龍門呵朱雀星攀桂户風揺蘭薄蔽檻千禽翻階萬萼絳府嵯峨𤣥蹤綽約龍駟天行螭衣霧落鳯銜紅節鱗吹紫鍔瓊女鳴簫玉童捧勺来往太清逍遥真樂祥光一臨仁飇四廓福溥下民惠同上藥極夀乾坤永標丹雘雲南按察司經厯劉紹卿墓表紹卿自太學生得按察司經厯銓注雲南先是余以給事中言事謫貴州都勻驛丞雲貴接壤皆古西南夷地貴州地尤瘠惡非人所居余行數月乃至境上屬盛夏暑雨所經由皆大山長坂下上勞憊盡日道無行人俄有騎而自後至者紹卿也與俱憩坐林樾間語相勞苦仰視山兩崖斗絶數百千文色如積鐵霧氣浡浡起山巔虎跡交錯道上紹卿憮然不樂余顧笑曰子悔来耶丈夫不經此當何由知艱難子行矣紹卿亦笑且頷之上馬去余至都勻㑹驛舍久廢僦居平越平越者雲貴往来孔道也諸自雲南来者時時傳説有新官劉經厯彊執不受請託蠻酋武官放恣淫虐不畏大官府獨難劉經厯耳余聞之良喜自余去平越及歸吳中三四年間與紹卿不相聞既而紹卿上計京師自廵撫大臣而下署其考為諸幕官㝡當遷秩矣廼有飛語聞吏部於是以不謹罷則聞有按察官以細故相恨望實隂中之云紹卿自失官家居十餘年病卒卒後若干月且葬其子瑊詣余泣請表墓余許諾因為道往時事曰吾知若父久矣忍無以慰其死哉紹卿諱某先世家臨江國朝有編戍蘇衛者今為蘇人自其従祖父刑部尚書與清始起進士至大官父某母某氏紹卿生有至性十四喪父執喪循禮而力學工書事母以孝聞在雲南涖政明决上官才之事多倚成焉數平亭疑獄土官楊訓殺人帥府桀黠奴髙璧亦坐事當謫戍兩人要重貨投之不納卒案致如律千戸胡學詩戕其妻行賕要人脱罪一訊得實状論死王髯者圉奪殺人道中郡吏名捕之一兵官子亦王姓而髯疑懼自髠為吏所録既誣服成獄矣紹卿往覆案立得殺人者而出兵官子嵗饑督視平糶計㑹詳密而賦授必均民以不殍死閱視迤東諸郡庾積姦蠧為清他所建易尚多不悉紀令任職差久其功緒當益有可觀者顧僅逾一考輒以晻昧之過去談者惜之或曰紹卿平生剛急少醖藉用此觸忤貴人卒見廢退斯自取之也非耶余謂不然夫仕在不失己耳乃禍福則有不可知者昔人有言秪繫其逢不繫巧愚信矣今世仕者或工於語言日蒲伏公卿户下拜起候望顔色然其人固自有利不利利則躐取華要不利則亦放棄流落死耳要之榮達有定分非必以諂傲為通塞也如紹卿輩蒙垢泯黙以終者世亦何可勝道哉紹卿之卒以嘉靖丙午四月九日年五十二其葬處曰靈巖鄉桃花塢室人郭氏余族姑之夫之女也一子即瑊吳縣學生秀敏有文世其家陸子餘集巻二
