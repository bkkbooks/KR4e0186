body:
  text: 陸子餘集卷八明陸粲撰詠史樂府二首俎上翁廣武城邊列旗鼓重瞳拔山氣如虎手提老翁坐髙爼漢王嫚語項王怒俎上老翁心獨苦心獨苦兒不聞兒言但索杯中羮兒自生翁自死三軍縞素為何人幸有君臣無父子由來久假終必歸機心一發不自知匆匆數語殊可悲漢家創業何草草誰云雜伯未為非君不見當日隂山沙磧中彎弓鳴鏑親射翁擁篲行漢困楚阿翁忍死登髙俎楚和漢阿翁歸來依舊戰吁嗟翁歸方立炎漢基三年為虜生無幾功成不記翁危辱但記曽嗔無賴兒泗上亭長作帝王宫中老翁猶布衣翁生不知皇帝貴家令一言翁始畏兒來朝翁擁篲須臾趣詔尊上皇家令歸來金滿牀昔為田舍公今為天子父擁篲一迎真有助嗚呼擁篲行何足嗤猶勝當年俎上時畫虎行山人視我畫虎圖邀我為作畫虎行我生城郭不識虎向來浪説真無憑自從謫居傍夷落時驚夜嘯風生壑似聞行旅遭搏食往往白骨撑叢薄朝來擊鼓驅獵徒於菟中箭人歡呼兒童奔走我亦俱近前諦視摩其鬚初觀據地疑未死金睛熒熒吻血紫却歸更與展圖看意態猙獰宛相似畫手爾何人誰遣為此筆丹青淺事何足問物理試思堪太息我聞太平世野獸恆避人吁嗟猛虎今為羣渡河無復逢劉昆黃公赤刀倀鬼竊裴旻李廣俱澌滅書生徒手無寸鐵對畫空令雙皆裂還君畫為君歌道上虎迹今轉多鄭卿歌君不見閩中鄭卿湖海客十年跨馬燕京陌公車昨獻三千牘玉陛新投萬言䇿詞章翰墨清朝珍何况相術稱絶倫閲人千百一無失往往髙談驚縉紳古來能相各有名近代無過袁四明伊昔抱藝王門上軒眉抵掌何雄壯龍顔真人四尺鬚虎頭將軍一品相君臣際會豈偶然遺事流傳定非妄鄭卿絶學自天授著書且欲排荀况長安公卿走相問門外日髙車幾兩我初識面自南省三百人中見英宕把臂謂我風骨竒愧我豈是廊廟姿誰言黃扉玉堂上用此野鶴孤雲為從來賢聖困草澤騰踏升天終有期祗今世途多汩沒塵埃誰是封侯骨牝牡驪黃未足憑驊驑騄駬空超忽蔡澤噤吟笑唐舉今我低徊猶乞汝男兒紫綬不在腰磊落崢嶸徒自許吁嗟鄭卿勿言聽我歌終曲秋風漸髙白日促與君且倒杯中緑他年我訪希夷生石室瑶編手翻録靑天招爾騎黃鵠李侯行李侯古介士皭然冰雪姿平生藜莧腸不受膏粱滋南山柏葉苦猶咽首陽薇蕨甘如飴官厨廩米不盈掬糜薄吏卒常苦飢頃來單車臨絶域豪酋悍吏俱惕息盤餐對案欲揮去苦為蒼生憂菜色此心炯炯天應知俗士聾瞽何由識山中夷獠胡為者眼不識字心腸直指天畫地説李侯依稀似謂今難得紛紛冠蓋看塞途誰哉肉食能逺圖西南兵役况未歇萬物癃病何由蘇持梁齧肥衆所羡志士茹藿翻見迂可憐李侯今腐儒一官白首仍邊隅范丹魚釡久寂寞李侯之節世所無吁嗟李侯之節世所無邊軍謡邊軍苦邊軍苦自恨生身向行伍月支幾斗倉底粟一半泥沙不堪煮盡將易賣辦科差顆粒那曽入鍋釡官逋私債還未足又見散銀來糴榖去年糴榖揭瓦償今年瓦盡兼拆屋官司積榖為備荒豈知剜肉先成瘡近聞防守婺川賊盡遣丁男行運糧老弱伶俜已不保何况對陳臨刀槍宛宛嬌兒未離母街頭抱賣供軍裝閭閻哭聲日震地天逺無路聞君王君不見京師養軍三十萬有手何嘗捻弓箭太倉有米百不愁飽食且傍構欄遊擔夫謡擔夫來擔夫來爾何為者軍當差朝廷養軍為殺賊遣作擔夫誰愛惜自從少小被編差垂老奔走何曽息祗今丁壯逃亡盡數十殘兵渾瘦黑可憐風雨霜雪時凍餓龍鍾強驅逼手摶麥屑淘水餐頭面垢膩懸蟣虱髙山大嶺坡百盤衣破肩穿足無力三步回頭五步愁密箐深林多虎迹歸來息足未下坡郵亭又報官員過朝亦官員過暮亦官員過貴州都來手掌地焉用官員如許多太平不肯恤戰士一旦緩急將奈何噫吁嚱一旦緩急將奈何朐岡行贈遲户部兼簡馮汝強伯仲君不見朐山之岡矗立千萬重髙者盤躩如虬龍下者偃蹇蹲踞如貔熊中起雙尖屹相向青天突兀安屏障靈棲仙宅信孤迥碧𡼏紅泉亦清壯東州遲侯愛山者茅堂窈窕岡之下飢鼯緣屋蘿雨垂老鶴啄階松雪灑時登巉巖入幽絶萬壑隂霞倐興沒天風蕭蕭日欲墮野色蒼然上睂髮一從獻䇿金門去寂寞岡前舊遊路竹户留詩碧蘚封石牀散帙紅霞護朅來持節下三吳樓船伐鼓凌江湖酒邊向我誇故山令我耳熱歌嗚嗚遲侯爾勿言且復共飲酒我生夙抱山水癖往曽楚粵窮林藪祗今潦倒意未衰決䇿東行定非久朐岡之遊亦何有泰岱雲松落吾手海門虹月踏飛梁蓬閣煙濤坐虛牖因君寄語大小馮肯同躡屩追從否賦內閣芍藥金門柳色縈深緑上苑春餘雜花撲夭桃已歇穠李衰紅藥翻階正芬郁此花初種自宣皇百曲雕闌七寶妝融風窈窕昭陽殿暖日輕盈白玉堂玉堂學士看花早賦成藝閣留詩草卷幔頻看碧霧流揮毫正耐紅雲繞憶昨宣皇居法宫太平樂事君臣同宸逰每出濯龍裏曲宴偏臨翔鳯中是時南苑飛霓旌爛熳仙葩綺繡明臨風宛轉如矜妬俯者如愁仰如訴半沾微雨妖紅濕太真泣憑闌干立至尊一顧六宫回茜裙霞帔俱羞澀華蕚樓頭雨露偏芳容贏得美人憐君恩為與分春色詔許移來種閣前閣前復道連金谷翠輦經過幾回矚內家敕進賞花詞昭容傳制黃門促沈吟此事六十載當日繁華宛然在紺幰金輿絶幸臨黃扉紫禁留風采不羡揚州寶帶圍長安紅紫競芳菲五侯七貴同邀賞寶馬香車疾若飛爭似名花出天上霧閣雲窗儼相向浪蝶遊蜂未許窺酒徒詞客空惆悵江南三月足豪華繡幕圍香富貴家亦有幽姿在空谷風雨憔悴天之涯燕山遊子江南客獨對名花感今昔草木何知人自憐逢時亦復升沈隔世間榮辱偶然事不獨此花何嘆息送待詔文徴仲先生致仕文星南指斗牛遙先生拂袖歸江臯平原蒼莽晨車發霜天突兀玄雲髙憶昨先生登玉堂千鈞筆力開混茫手翻翠虹霓翰飛赤鳯凰隂崖絶海垂絢練文章不獨詞林羡琴瑟真諧清廟音圭璋已備明堂薦却從綸閣夢雲林山水長懸故國心燕山東望渺吳越草堂何處間風月茶磨峯前緑樹低行春橋畔花如雪杖屨今來續舊遊顧盼溪山增秀發先生雅志追古人有道何嘗羞賤貧平生氣與秋冥迥未肯低睂事要津山巔水際從自得龍騰鶴起誰能馴我師太常更清真一官白首從明禋錢漕湖先生諫書三上排紫闥釣竿歸抱漕湖濵共爾完名宛雙璧况也意氣同膠漆丈夫要自能勇退人生富貴何終極我曹胡為空役役蟲臂鼠肝爭得失君不見林屋山人名世才蔡九逵幾年為客雞鳴臺消夏灣前畫樓起木奴千樹煙花紫主人不來誰對此君歸儻為寄雙魚好共相邀弄雲水送魏師召之蕪湖魏子昨捧分司檄與我青瑣門相逢朱袍皂帽氣遒逸佩刀左右盤雙龍燕山雪消河氷泮玉節辭天春未半江東花滿姑孰溪君到春衣應未換謝公宅前芳草生李白墳頭江更清日出靑山看舞鶴月明采石聽流鶯多君俊邁今無匹四十為郎頭正黑文貞遺笏世珍竒知古流風本仁直都門送爾惜離羣日暮行歌潞水雲明年躍馬東城陌楊柳青青正憶君遊大酉洞天疇昔覽山經名迹稱大酉乾坤遼闊吳楚長倚劔青冥只翹首誰云萬里今獨來快意兹遊信非偶主人亦清真同余紫霞想旋披榛莽度巉巖細窺隂洞琅玕長側身初下覺黯黑却立斯須忽爽朗千年古壁玉為色垂乳晶熒翠猶滴仙人去後石函空緑煙銷盡藏書室金燈閃倐知有無瑶草紛蕤亂朱碧吁嗟此竒觀乍到神欲竦盤渦嵌竇深不測鳴流泄瀨驚奔澒臨崖拄杖聽猶疑白晝或恐風雷動我從放逐西南陬裹糧遍入名山遊桃源逼側嶽麓小眺逺未得開雙眸終然靈境諧夙好造物似為畸人謀根盤路轉更礧砢石田如掌琪花嚲奮衣欲往心翻然水深泥滑愁無那何當秉炬破幽暗淨掃雲牀相對坐髙秋晴日儻更來待余為啓青銅鎖贈朱民部使君還朝使君慷慨青雲客落落英標世無匹朱暉行業自傳家劉晏才猷本經國昨者辭天下紫廷手持尺一東南行軺車驛路驅甘雨旌斾江天拂使星東南列郡瘡痍積遺黎半已溝中瘠使君催科靜不擾藹藹溫言宛仁惻四野歡騰衆相語卧安衽席由慈母徴書忽報日邊來狂走吳儂淚如雨山人病卧茅茨下草深窮巷無車馬君行駐節欵寒齋坐語藜牀意傾寫九月霜華落岸楓蒼然秋色滿江東送君官道臨當發浩歌悵望髙天鴻兹行會獻公車牘應知重為蒼生哭囊封願與綴新圖丹青遍寫逃亡屋寄謝趙醫士憶我初住清虛天笑吹龍笛蕊宫前時騎蒼鹿繞殿戲撞摧玉柱驚羣仙仙班不容共訴帝帝遣謫來東海邊人世溷濁蠅聚羶舊遊恍忽心茫然帝呼六丁下戒敕丁寧莫遣隨塵緣粗人獷暴失帝旨欻從雞肋揮熊拳排門顛倒齒著闔血濡狼藉唇雙穿父憐母惜救不得驚呼婢子成狂顚庸醫信手亂塗藥瘡成贅結唇珠懸當筵每遭惡客笑撲鏡欲絶將軍咽趙家王孫今國手早從紫府窺真筌靈心昔飲上池水禁方獨受神龍傳三吳來往走汲汲秋蘭一葉江湖船金箆或刮眼中障玉斧欲斫頭風涎刀圭為我輕點拂須臾贅落如增妍梁公神針不足道華陀刮骨何須憐夜夢乘雲歸上玄謁帝稽首陳前愆臣非此翁此疾無由痊疲癃四海今沈痼為翁乞活三千年要令赤子無顛連帝為首肯低一笑歸來月落仙華巔仙華山髙杏林赤爾家舊業青芝田俞跗越人今已矣此翁絶藝誰爭先揮斤削堊妙手不易得賦詩為爾重續南華篇漫述三首藹藹都城內甲第開中逵赫赫相國門雜遝賢豪馳五更中扉闢來者肩相差良久磬折入俯仰前致辭一言得所欲喜氣生鬚眉誰云行多露進趨當及時儒生不解事六籍空覃思白首著書成依然卧茅茨翩翩青雲士才敏復辨強新除得壯縣三年理歸裝侍者繡羅襦內子八珠璫輜車闐道周徒御生輝光俄聞謁帝閽臺省從翺翔問之何能爾貴人親薦揚不惜千金資自喜紫綬長顧笑范史雲守志徒糟粳杞子憂天隕祗為智者嗤賈生亦無賴痛哭干明時出身奉聖主誓言報恩私九關虎豹嚴白日雷霆施小臣不自量抵死陳狂辭朝為朝堂客暮為路旁尸棄捐誰為收妻子不敢窺一身既灰滅安用虛名為所以漆園翁甘心效塗龜幽蘭篇嫋嫋幽蘭姿悠悠芳氣結采掇入君懷佩之顔色恱君心一朝異棄捐不復察昔與瑶華姸今同蔓草沒春陽不回光孤根恐蕪滅寂寞空谷中馨香為誰發名都篇名都天下饒閭里藏豪雄蹮蹮輕俠子結友相追從依憑董君寵著籍期門中聯騎出近郊翩翩若遊龍擊毬平樂觀逐獸長楊宫縱橫馳道上意氣輕王公司𨽻不敢呵斂手避其鋒暮投北里館張組陳歌鍾嘉肴列千名酒醴旨且豐坐擁燕趙姫巧笑姿芳穠轉喉變新聲折肢舞回風為歡竟永夜揮霍千金空天明掉臂去復會平陵東日月信徂邁淫樂何終窮名姝篇為友人作名姝産西州皎皎氷雪姿結褵事夫君修姱盛光儀入宫見猜妬衆女憎蛾睂承歡不敝席故寵忽已移掇蜂誤尹公掩鼻殘楚姫由來讒言昌涅素易為緇所嗟奉仁明中道成乖離白日流髙天妾心炯如斯君恩儻可還枯稿生華滋誓言敦諒節素髮以為期太息行贈平湖謝贊府太息復太息悲風動河梁浮雲翳中天白日不回光謝子廬江來修髯宛清揚伏闕三上書雅道陳虞唐九重天聽髙臣愚不自量臣有肺腑言譬彼俗醫方和緩儻見收足使疲癃康退謁相國門持書立堂皇卑之無髙論咄爾書生狂歸來逆旅中哀歌不成章顧余伸前議意氣何慨慷聽之重為歎淚下沾我裳紛紛肉食者俯仰隨班行而子飯藜藿抗言一何張坐令吾徒慚喑默中自傷嚴冬霜雪集子行返南疆薄宦棲逺邑别路悠且長握手為子言努力慎所將明明闢皇闈元化方日昌嘉謀會當酬良賈善深藏勢位無崇卑名節要自臧空言顧何施令德有遐芳贈别王直夫二首商飈激疏牖蟋蟀鳴牆隂志士恆感秋况乃違所欽之子役王事逺適閩江潯攬衣起追送渺彼川塗深少小從子逰方軌馳文林時去志願違素髮忽滿簪撫景慨今昔惻愴情難任願言顧離索惠我瓊瑶音威鳯天際翔潛虬澤中蟠嚴子時閉肆貢公乃彈冠顯晦豈必同各以性所安子行樹逺績奮身青雲端鄙人棲蓬藿蹇拙聊自完丈夫志千載飛沈何足歎相期保貞素嵗晚同金蘭贈沈元材迢迢逺行客驅車薊城隈薊城何鬱紆前有萬古臺昔時燕昭王千金收逸才英風灑六合霸業何雄哉往事久消歇遺墟滿蒿萊無人市駿骨騄駬空虺隤烈士多苦心行歌相顧哀仗劔出國門白日飛黃埃援琴為子彈弦急商聲催一為黃鵠調惻愴摧中懷門有車馬客行贈張户部門有車馬客垂組懷銀黃自言鄴中守攬衣升我堂問客今安適云暫返東方家本自海濱樂土風泱泱窈窱丹崖深蔥蒨崑崙蒼靈聖此棲宅龍鸞蔚騰鏘中有不死藥服餌凋三光聞言向客嘆撫心增慨慷人生若蕣華何以待朝霜苦心雕蟲藝螢爝同微茫神仙差足慕沖舉多竒方三山亦跬步誰謂鯨濤長願乘扶搖翰與子俱翺翔留别金生去年楊山宿懸燈照華觴今年發楊山燈影如舊長黯黯照離人戀戀情難忘豈不念良朋客心懷故鄉感子禮意勤援手徒倣徨後會焉可期一别永相望願言慎加飱慰我愁思腸送翁德宏二首之子越中俊英姿間且都蚤通瑣闈籍靈鳯儀韶虞一鳴乃見斥踏翼天南隅朅來冠惠文揚旌萬里途嶺海非荒遐王澤今播敷志士樹勳烈無為憚馳驅所嗟離别難握手心煩紆炎方積埃鬱慎爾千金軀及時懷好音慰此山澤臞羅浮神仙宅乃在南海堧連峯三十六一一鸞龍鶱窈窕勾令居丹竈餘青煙逝將枉車蓋稅鞅兹山巔念夙抱竒癖遐覽窮幽玄要言在獻嵗及爾同周旋飛泉濯煩襟古洞窺冥筌陳詞為先驅儻結山靈緣憶家君白髮人千里朱門月半扉燕山雲去逺澤國雁來稀無夜不成夢有書空道歸遙憐北風徑尋便寄寒衣寄葛太守子中憶爾投荒日依依戀翠華亦知行萬里不是為丹砂郡古留銅狄堂深繡土花勿須憂瘴癘意逺即煙霞送祝參政之雲南官髙仍外省地逺更南荒十月繁霜白千山落葉黃虎應窺日沒鳥亦倦天長夷落知迎候單車見祝良答朱僉事慘淡江天裏何人識歲星衆嘲揚子拙公愛屈原醒昨日傳書札殷勤問勒銘朱以書來求作憲司題名碑文平生無健思多病况飄零贈顧參軍之都勻攝郡斗酒别城闉天風吹馬羣落月度山箐野人迎使君地逺多暇日樓髙宜望雲知公解蠻語終復作參軍秋水亭夷門秋水亭梁王古臺下臺前舊堤路盡日無車馬送陳太僕謫教海陽六首十載臺郎滯爾身白頭重作嶺南人祗緣汲黯憂時切不信虞翻骨相屯世情應笑賈生疏諫草誰傳太息書惟有潞河南柳色暖風吹上逐臣裾蠻中千嶂啼猿裏海畔孤城匹馬過却望瀧江更南下月明雙淚聽夷歌大庾嶺頭日欲低曲江祠前行客迷一過韶陽倍惆悵刺桐花裏鷓鴣啼鱷溪南望海雲生韓山花開千樹明玉序橫經周柱史鵠袍端拜魯諸生天涯芳樹綰離旌遷客遲回戀聖明曉夢依稀度閶闔尚隨殘月聽流鶯上饒道中桃花參差柳葉多新雨灘頭生緑波一夜東風吹驛舫榜人齊唱弋陽歌送汪僉事之湖南三首分司冠動神羊影江渚舟衝白鷺羣見説武昌風日好楚王宫殿藹晴雲驄馬長鳴飲碧流花銀鏤帶鷫鸘裘行人大别山頭望雲外雙旌下鄂州漢上春風吹驛舟漢南簫鼓作春遊夏口鶯啼虞帝廟江陵花滿仲宣樓送人入蜀三首有客乘驄蜀道行江天秋色動雙旌巴山水月和煙照劍閣雲霞映日明浣花溪頭花欲然花葉參差俱可憐錦衣烏帽來遊客笑繫玉驑髙樹邊樓船捩柁浪花生百丈雙牽黛色明夾岸兒童齊笑語嘉陵江似使君清長門怨金屋承恩事已非玉顔憔悴度春暉無因得似宫前柳時有長條拂御衣陸子餘集卷八
