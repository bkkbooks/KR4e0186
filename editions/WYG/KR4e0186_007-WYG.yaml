body:
  text: 陸子餘集巻七明陸粲撰子家子贊有序子家子魯公族之賢者也仕扵昭公昭公庸愚無足與有為者而子家子從之何久也已為同姓之臣君且親之義不忍決去也故寧周旋焉迨君死而已矣始昭公與羣小謀季氏子家子諫之不聴及意如被攻屢請而欲以五乗亡也豈其誠心怒私黨而驕君志緩公徒之攻以待變耳子家子知之故勸君許之許之則季氏之謀益懈意如雖不成亡而昭公亦可以無出一與之盟而國定矣此子家子之心也比其從亡在外謀事發言度禮處義無一不中節嗚呼賢哉公薨䘮至自乾侯従公者皆自壞隤出奔畏季氏讎已也若子家子則意如知其賢且許以従政矣乃不受而逃之従君七年卒而不以利疚其志可不謂仁乎衛獻公失國十有二年而復子鮮子展二臣者有力焉然孫甯之得民未若季氏之専且甯喜有志扵逆君矣又當時齊晉尚强國有賢者可動以義不如范鞅梁丘據之貪以無君也而二子乗之易矣不然以子家子之賢得中主輔之雖以强霸可也而復國扵何有夫其力不能康君身而又不足以誅權臣故亦潔其去就爾矣孔子稱志士仁人者扵斯人見之然吾惜其終不著扵傳豈自壞隤之後遂長往山林以没身耶又怪太史遷書所為賢卿大夫列傳甚衆顧獨遺子家子曽不得與曹沫専諸者比何哉故重論其事為之贊贊曰魯多君子抑有世臣誰歟遺之自其先君周公伯禽尊賢親親藹藹子家既忠且仁君亡我従君没我遯明王不興孰反我讎我志弗遂而終無尤豈無材賢内恤其私從讎如忘棄君如遺我思古人愛莫起之嗚呼子家百世之師子胥論楚平王無道其臣伍奢以諫死奢之子曰子胥者奔吳得其政卒以吳破楚入郢扵是平王死矣發墓鞭其屍走其嗣君楚幾亡陸子曰嗟乎君臣之變一至此乎當是時周衰甚矣晉為盟主亦孱焉不自振故使一夫恣行而莫之問也苟時有桓文之君舉義以行伯則子胥者其誅首與公羊子傳其事而曰父不受誅子復讎此為敵以下言可也非所以論於君臣之際也夫苟至於君臣之際未有可以報復言者也父者子之天君者臣之天一也父受誅而君誅之則其分也不受誅而君誅之則其命也吾為臣子之不幸也死之可也逃之可也怨吾且不敢焉而何有於報復哉夫伍氏者非楚之世臣乎自參若舉以來立扵其朝也幾朝夕矣一不受誅而幾亡其國人臣之義不如是也故奢之被戮棠君尚歸死焉父以君死子以父死死正也雖子胥之成功吾以為不如尚死之之安矣雖然父兄併命焉己又繼之一朝而尸三雋猶無益也故為子胥者亦逃之而已矣擇逺國而自託苟以庇身存其𦙍嗣寢苫枕塊没吾世而無怨言焉其可也率讎國以伐之覆國都而迫其君以瀕於死又無禮於亡者人臣之義不如是也于時昭王奔鄖鄖公辛之弟以父怨將弑王鄖公止之曰君而討臣何讎之為若皆讎君則何上下之有乎舉斯言也足以蔽子胥之罪矣方子胥自楚適呉以䇿干僚而光沮之子胥知其心因進鱄諸焉窟室之兵魚炙之劍尸之者子胥也夫畜老猶憚殺之而夫夫也欲報其私讎之急乃不難於教人以弑君乎扵呉則操刃焉扵楚則鞭屍焉一人而讎兩君何其悖也夫其好勇而未仁有匹夫之節而無儒者之道是以猖狂至此與夫屬鏤之禍世皆悲子胥之不幸然吾以為雖無是子胥猶不免何者以人臣甘心其君固天所不容也雖然子胥之伐楚也謂夫身有父兄之讎也孝而非也其以諫死也謂夫君有先君之讎而不可忘也忠則至矣彼視其君有先君之讎而忘之而安坐以食其食徒為髙談以眩世也者其衣冠語言儒者也而中實匹夫之弗如也彼又子胥之罪人哉讀莊子莊子之文為其學者所謂要言妙義也然吾有惑焉夫知道者不言道其不得已而有言也一二而足矣凡莊生之論其大㫖不過數端是一簡者足以盡之而多言何為哉彼其數數然若曰我能知之者然則淺矣語曰雖小道必有可觀若莊生者吾取以備異說焉謂無叛於孔子則妄也或謂訾孔子之說昧者𠞰入之今觀其書誠然然而昧者誰與非莊生之徒而誰為之彼以李斯之罪罪荀卿則彼狺狺然吠於孔子者之惡莊生何逃焉謂夫列數諸小道而不及孔子云以尊之者尤非也馬醫夏畦之徒之無敢與吾君父匹也愚者知之呼若人焉與之坐而無及吾君父曰吾以尊之也則人笑之矣孔子者若天然不俟贊也夫贊天者贅矣又惡用夫狺狺然吠者之尊之哉彼謂莊生之文有中乎其志而取之可也并與其訾孔子者諱之非也讀鍾離意傳建武永平之間政理苛切當是時士之脇肩側足碌碌如轅下駒者可勝道哉若鍾離尚書陳寛博之謨以抗嚴察之主可謂大臣矣世衰道㣲士為一切之行以趨時好非徒避誅責也乃以徼恩澤焉悲夫悲夫吾讀史至意與宋均傳反復其文為之流涕書劉氏先墓記後劉生竒𦵏其父扵外氏之墓次陸子曰何居我未之前聞也或曰生有為為之也劉之外族逺徙而遺墓不葺生之父念之以屬其子曰我死則扵是𦵏焉子孫以吾故乃無忘外氏矣故生之為此以卒父志也陸子曰生可謂不死其親矣言合於禮則未也昔者曾子稱子従父之令為孝仲尼非之楚屈到嗜芰將死曰以芰薦我其子弗従君子曰違而道今夫念其外氏而以身殉之雖篤於親其於禮也逺矣如之何從而弗違也曰如墓之不葺何曰存則謹視之殁則書其言著其不忘之意以示子孫而已子孫而賢也不忍忘其親而忍忘其言乎其不賢也雖以身殉之無益也然則為生之道者奈何曰夫孝者必以禮處其親以禮處其親則不憚改作為生之道無亦卜地而遷諸猶為善也生聞之曰諾將遷矣題趙松雪溫日觀畵趙松雪畫馬温日觀畫蒲萄聯為一巻提學侍御石磐先生所藏也先生以粲為門下士俾識一言松雪繪事之妙夫人知之固不俟論若日觀一僧耳然南村野史稱其憤楊髠之發陵見輙詈之此其志節豈直緇流中所不易得哉彼膚敏祼將之士宜有深愧之者矣先生寳此其意蓋不特在乎區區楮墨間而已也書姑蘇雜詠後鄉先生太史髙公季迪所著姑蘇雜詠一編古今諸體咸備論者謂可考見呉中故實不徒詩之工而已公既坐魏守事以卒同時有周正道者亦作雜詠於公頗肆詆訾又摘龍門一詩謂其身貽黨禍所行非所言余竊惑之方公之在朝也與魏守寔同事史局及魏來治蘇因與往還豈有意為李膺之客者哉夫士之處世其所遇禍福大抵有幸不幸如太史者君子哀而不譏也正道所云亦少恕哉若其辭視公孰為工拙則知詩者必能辨之里人某重刻公雜詠以傳余為題其後題貞逸處士巻余讀楊隠君敘貞逸處士事未嘗不太息也古今稱文人多窮自唐柳柳州以髙才擯扵時其弟宗直亦善操觚牘號為竒峭博麗然卒不試與其兄相隨死南夷中迪功之有貞逸曰柳氏之類也非邪雖然巧宦善趨持粱齧肥偃仰睢盱得志一時者身死而民不思寒士羸餓生不一伸眉其没也賢者傷之又振耀之以文辭俾流聲無窮若貞逸者足以死矣亦何憾哉亦何憾哉書鄧尉山志後鄧尉吳之名山也前此未有志沈君潤卿始為之讀者謂其詳贍得體非苟作也余少時嘗一遊兹山今二十年矣間者再至雖巖壑之勝不殊而梵宇荒落頓異疇昔其間幽棲邃構往往為勢家所據而長松古梅揃伐殆盡問之山僧云苦更賦繁重鬻以償逋負矣余聞而憮然比得君志讀之則往時秀傑深迥之觀猶歴歴在目為之太息不能已抑盛衰相尋固物理之常未足深論余獨慨夫横政亟行而人力之日單竭也雖浮屠氏自謂修出世法者猶不能一日安其居以保其所有矧夫齊民者邪君子即是編以考其廢興之故可以占時政焉不徒觀游之細而已而君所為區區纂輯意亦有在於斯乎故書其後以俟夫觀民風者録焉丙申端陽日題墨客揮犀錄本是書吾鄉人沈生所藏沈有題識援邱翰林語以為彭乗譔按陳振孫書録解題稱墨客揮犀十巻續十巻不知作者名氏而邱公云然盖必有據然余考彭乗者蜀華陽人大中祥符五年登第仁宗朝為翰林學士羣牧使卒官與熈豐諸公自不同時今此本於涑水半山六一皆稱爵諡且及東坡海外歸事則建中靖國初也距乗卒時逺矣而其文直抄取宋諸家小說若筆談冷齋夜話之屬湊合而成亦頗雜以舊書所記如解叔謙魏舒張華等事皆是蓋坊間淺妄者偽譔以射利非彭氏本書也余少時嘗見宋刻本扵友人家惜不及録今不復能記憶未知與此本同否戊申新春病起偶讀一過漫書又題彭乗蜀人淵材江西新昌人今瑞州屬縣元非同族亦非同時此本所記淵材事皆僧惠洪冷齋夜話中語也淵材名攀龍扵惠洪為叔父云題湯氏小宗圖卷湯氏世以髙貲稱呉中子衡生負竒氣挾策走京師遊諸公貴人間語不合徑歸家徒四壁立晏如也間獨喟然太息顧其友曰余之先蓋多樸茂耆碩之士今族姓衍大而譜牒未立先人遺徳殆將泯焉吾何以逭後死者之責哉乃僅紀其所自出者繇乃髙祖而下四世為小宗圖又出遺像摹寘巻中而手録所受制詞若銘誄之屬咸具曰姑著吾志其他則非吾力所及矣余聞而悲之今世富人子能辜較財利斥廣田廬輒自謂賢人亦賢之語及其先世鮮不懵焉者傳有之禽獸知母而不知父野人曰父母何筭焉今冠裳而邑居積鏹貫朽臥起其間至扵老死而㤀其身之所自出也此何人哉子衡雖濩落食貧君子矜其志曰湯氏之賢子孫可也書大理卿胡公遺詩後昔在宣徳初吉郡胡公槩以大理卿巡撫南畿威望甚著論者或頗譏其苛刻然余長聞諸長老言當是時天下乂安江以南人物浩穰鄉里渫惡民大抵漁食百姓以致富羨而彊宗右室所為多踰禮制朝廷患之賜公璽書有祛除民害之語惟公亦以為莠盛苗穢不可不鉏故其為政尚嚴雖所誅罰不必皆中然一時并兼豪植之徒蔪除略盡姦宄革心小民得職去之百年而其名聲猶赫赫使人畏仰農甿走隸皆知胡卿云若公者方諸漢吏蓋趙京兆尹扶風之流非耶自承平久而法抏敝也流俗之論以容養姦蠧為寛厚従政者雍容簡貴日坐官署黙數嵗月得美遷即去苟少出意見有所建易則衆口諠譁流言飛文上下交搆必擠而去之甚者䧟之死然後快嗚呼可悲也已令胡公在今日身且不保安望其功名發聞若是乎公所著有芝山公餘二集皆未行扵世此詩僅數十字盖初仕時為吾鄉人作者余間得觀之乃因論公之行事而竊識其所感者如此士之有志當世者或扵吾言而太息焉嘉靖庚戌長夏日陸粲題擬上備邊狀館中作臣伏以頃者敵人不道擾我邊陲將士出戰或全軍覆没累使告急至扵上勞聖慮特敕本兵蒐練戎卒簡命文武大臣待報出師以為應援臣竊惟國家設立鎭戍委任將臣凡以防遏敵人保固邊圉也宣府重地為國北門密邇宸居尤非他鎮之比先事預防臨機應接實惟守邊者之責其不可他諉明矣且以古準今中國之勢誠莫尊扵我朝而敵衆不能當吾一大縣自有敵人以來亦未有衰扵今日者也以全盛之勢御極衰之敵宜其戰勝攻克所當者破而事乃有大謬不然者彼稍為鈔掠我輒已不支令赤子創殘疆埸侵駭是豈獨一時邊臣之罪哉其患之所從來久矣臣聞書曰惟事事乃其有備有備無患兵法曰無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻也自頃邊防廢弛將吏偷安平居則玩愒而度時有事則張皇而失措比其事解兵休即復泰然不以為意譬如濵河而居者不能預築隄防一日水潦奄至則挈家室乗髙避之希冀水退復還故處歲歲遷徙苟且支吾謀國如此可謂疎矣臣竊覩事勢不勝憤懣惟昔賈誼弱冠願以尺組而繫單于終軍妙年欲請長纓而致勁越彼之二子豈為好名良以感一時之遇思效節扵明主也臣以菲才荷國儲養受恩無量自惟疎賤性資駑劣進不能陪廟堂之末議退不能備數戎行効死一障區區之忠無以自列謹條邊事所當施行者以聞盖將為久逺之圖而非以副目前之急也臣誠愚闇不識大計伏惟陛下赦其狂妄特垂采納臣不勝幸甚一曰明賞罰臣聞御軍之法莫先於紀綱紀綱之存莫要扵賞罰賞當功罰當罪人主所以駕馭英傑之大權也賞罰一失雖有良將勁卒尚安得而用之夫守邊固圉之臣天子所屬以一方安危之寄者舉措一不當則為國大患此其用之甚不可以不詳也今也受爵公朝輸欵私室仗鉞邊境借勢禁闈無功則冒濫陞遷有罪則朦朧幸免故雖有忠勇果毅之臣一言不中節則呵譴斥去不復顧惜而庸鄙饕餮者乃得以坐享富貴此忠臣義士所以扼腕而不平者也夫賢者不必用而䝉無辜之罰此其中必有沮之者用者不必賢而享非望之福此其中必有佑之者陛下亦嘗察之否乎天下之患起扵因循而成扵䝉蔽苟不能一振作而剗除之未見可以善其後也陛下聖質髙明略不世出屬者親讞大獄天威所臨臣下震悚誠推此心以憂邊事一日慨然思起積習之弊數御便殿延見大臣従容咨訪決壅隔以開聰明核名實以定黜陟以至臺諫之論列撫按之舉刺察其果出扵至公亦當虚心納之屈意従之使喜怒之私無以蔽是非之明愛憎之言不能亂邪正之實凡諸將中賢否勇怯莫不瞭然於聖心有功必賞不以疎逖而遺有罪必罰不以貴近而免録用命之士厚死事之家正逗撓之刑嚴掊克之禁恩足以懷勇夫而義足以激死士又何患武功之不立哉夫齊威王不過一諸侯耳能奮其威斷封即墨大夫而烹阿大夫與左右之妄毁譽者則四鄰聞之不敢加兵齊國大治曽謂天下之主有不能乎苟有意焉一轉移之間使將吏革心士卒生氣區區敵兵臣見其不足滅也二曰廣召募臣惟敵衆深入我軍遇之衆寡不敵遂至戰没故議者多患邊兵之少而欲亟發京軍與之協助然臣以為近日之事若使諸臣守禦者能以地方大事為念不分彼此而并力協謀互相䇿應縦無大利自可保全我軍不至盡没於敵然則所以致敗者或不專在於衆寡之故也古云徴兵滿萬不如召募數千今邊郡土人多能戰者亦往往入堡與軍士相兼守禦臣請益募以應敵此其賢於京軍逺矣盖土兵生長邊方熟知地利耐寒苦習戰鬭内欲為其室廬墳墓之衛外欲報其父兄子弟之讎人自為戰勇氣百倍但患將帥不能撫恤而虐使之是以憚於應募宜懸示厚賞資以器械優其糧餉許以事定之後復業歸農不籍其名有所得扵敵即以予之則勇徤者争出為用矣若夫京軍平時豢養驕惰不經戰陳道里非所諳勞苦非所習况大將一出叅隨之類動輒數十百人名為報効從軍實則因縁圖利故臨陣則退縮不前失利則争先竄匿幸而克捷則攘人之功以為已有且首級之利武夫所貪今彼以性命得之此以談笑奪之使邊人解體戰士離心率由於此為將者亦私其所愛或因權貴所屬明知其壞事而不加禁戢致失軍情誠非細故臣請自今每遇邊警不必動調京軍或止命大將將之駐劄近地遥為聲援使敵知吾内外有備亦當聞風遁去必不得已而往尤宜禁約部下叅隨親兵不得侵奪邊功沮壞軍法仍戒其不得邀殺被虜逃回之人以冒功賞如有犯者雖主帥所甚愛必斬於軍門以徇若將官任情回䕶聽紀功御史指實叅奏庻幾可革前弊雖然兵難隃度今日之事臣豈敢必京軍之可以無出乎昔成化間滿四之亂議者多請自京師發兵討之大學士彭時力持不可或以危言怵之時不為動後滿四卒平於土兵之手前事可徴是固當軸者之所宜熟計而審處也三曰嚴教練臣惟今日軍士坐食者多能戰者少加以私門多役占之夫尺籍有詭射之弊内則宿衛單薄外則營堡空虚近者明詔特開投充之科以收爪牙之用斯亦權時補弊之一䇿也然臣聞兵貴精不貴多多而不精亦徒然耳乞敕兵部并選差素有風烈給事中御史三四員公同各營將官將見在軍士通行簡視凡其老疾者去疲懦者去游手無賴詭名冒籍而實不堪用者去抽選精銳與投充之人新舊相兼什伍相比嚴加教閱以備緩急至扵操練之法止是教以坐作進退分合疾徐之節外雖整肅可觀其實臨敵無用况與敵人戰如獸伏鳥散豈暇從容應節哉自今操練務須人習一藝藝必精通又須每人兼之以射蓋弓弩實中國之長技而兩軍相遭必長短之兵兼用乃能取勝臣請於各營將士中及附近州縣選取善騎射者不拘軍民官舍立為教師分領團隊使專一教射定為賞格以十矢為率能中八矢者為上五矢者為中皆有賞三四矢者為平不賞不及三矢者有罰合格者月糧之外别加賞給其教師亦視所教之人合格之多寡為賞罰凡軍士有争訟則射有過誤則射有所請求則射視其中否而予奪之其他技能以此為準仍行下各邊悉倣此格施行其器之良者如廣中猺獞及唐鄧等處所用藥弩之類皆取其法俾軍士演習以備用語曰一人善射百夫決拾使人人自勵於武勇則雖京軍亦可用之於邊不二三年可以得志扵外夷矣四曰脩馬政馬政之不善未有甚扵今日者也牧扵官者名存而實亡牧扵民者有損而無益兩京畿山東河南之民編户養馬已不勝其困順天等府縣又有寄養騎操馬匹孳息不蕃倒死相繼秣飼之累陪償之苦動至竭産而不能支比其俵散騎操類多疲病羸瘠馳騁内地力已不堪出塞禦戎尤非其任昔晉人謂冀之北土馬之所生杜牧亦稱河北産健馬下者日馳二百里今安在耶民有養馬之害官無得馬之利不行先王之法而襲宋人保馬之政是法也亦可少變乎夫馬所以蕃息者豈有他哉主之有人牧之有地食之有法而已比來士大夫選華擇要不喜親考牧之職在内則太僕長貳遷轉不常既難望其誠心經理在外則苑馬等官類取資格稍下聲望不揚者為之間有能自振㧞者盖亦鮮矣是主之非其人也自永樂以來各處草塲及監苑故地大抵侵據扵勢要昔之建言者蓋屢及之近日明詔亦俾經理顧未及施行而不逞之徒已倡言沮之自非聖心獨斷扵上而當事者能以身任怨不為浮言揺奪未足以議此也曽此不圖而因襲故轍重困吾民民之力有限馬之害無窮卒之人馬俱斃而已是牧之非其地也古之畜牧皆有政令有司者掌之自㳺牝去特騰放調習莫不有法今皆無之且一馬而朋牧扵數人今日在甲明日在乙牧無恒主姦弊日滋燥濕寒暖之不調饑飽勞逸之不節而馬日病矣是食之非其法也三者之患不去求馬政之舉終不可得矣夫七年之病求三年之艾苟為不畜終身不得及今不為至於不可為而為之得無已晩乎昔唐初馬少及張萬歲領羣牧在官數十年不遷置八坊四十八監於隴右河西地廣千里募民墾田數千百頃以給芻秣其後馬大蕃息至七十餘萬匹今其地固在前史所稱肥饒而善水草者宜不異於古誠能依倣舊迹斟酌時宜立為通融經久之法務使上不病公下不妨民擇廷臣中有才望者俾專經理其事委之重權假以嵗月聴自舉其屬惟務得人不限資品俟其事稍就緒然後推行於山西遼東諸路其在兩畿山東河南者必如先朝大學士邱濬所謂於民養之中而寓以官牧之意又自今歲以前宿逋一切蠲之與民更始而後可為也臣聞有治人無治法法豈有無弊者哉變而通之亦存乎人焉耳矣為今日之計誠莫有要扵得人者苟扵是而加之意是固修舉馬政之大端也五曰作士氣用兵之道以氣為主强敵在前援枹鼔當矢石喑嗚叱咤而三軍披靡者氣為之也古之善御將者必先厲其氣鼓舞振作之術有出扵爵賞刑戮之外者故士也踊躍奮迅而願效其死自承平日久士大夫鄙薄武臣雖位鈞體敵猶蔑視之事有相闗任意徑行不相咨覆稍下則慢易凌辱無所不至武臣亦不自貴重曲意奉之若中朝貴人銜命出鎭者勢尤赫奕將吏奔走俯伏奉事稱呼之間眞與厮養無異其間頑鈍無恥者固不羞為人下而英偉磊落之士宜亦有忸怩不安者矣非惟觀瞻不雅體統有失且使士氣因此銷沮盖人之氣槩激之則日伸挫之則日屈譬如文臣初出仕者類多英銳及其沈抑扵州縣奔走扵送迎往往志氣頽靡鋒鋩略盡又况武夫素無執守尤易摧屈者哉議者必謂此曹麄獷恐假以顔色易生驕慢臣謂奬與太過使桀黠之徒得志横行固非盛世之福而摧抑過當使英雄之士垂首䘮氣亦烏得為便計哉要在適其中而已乞敕所在鎮巡藩臬等官此後接遇將官必加禮貌自非違法生事非禮害人者不得輕肆凌辱事有應共議者平心易氣與之商㩁彼所執苟是即宜樂従或有竒材異能自當優為之禮虚心以下之至誠以動之庶幾士氣日昌國威可立六曰拔異才言當今之患者皆曰才難上自朝列下至郡縣皆有乏才之憂而軍旅之任尤患不得其人是豈果無人哉夫天下未嘗無才而用才者類不足以盡之限以資格則豪傑之在下者不進拘以弓馬一夫之技則智略萬人之敵見遺取人而求備則倜儻不羈之才以詿誤而棄去者有之矣及其有急寧取潦倒龍鍾貪鄙闇劣者使當大任不知求才之方而猥以為才之難得亦甚不思也且夫英雄特達之士其中必有以自負苟非上之人深知而異待之則彼固未有樂於效死而盡其能矣昔李愬攻淮西獲其降將李祐用為心腹諸將疑忌流言上聞而愬力保持之祐至感泣卒用其䇿以擒呉元濟故夫士不素厚而輕使之未有見其成功者也今偏裨行伍之中豈無異才而不能自達扵上者多矣惟本兵若行邊大臣慨然思為明主求才有賢勞者不必限以下位有智略者不必問其弓馬有材氣可使者不必計其小過虚心訪求多方蒐採或督令管軍官員各舉所知叅伍考驗果得其人即不次拔擢待以殊禮推赤心以置其腹加厚賞以勸其勞使有以自異扵衆三軍之士屬目向之而彼不思所以自效者非人也至扵軍士亦擇其勇銳機警者異視之俾凢有技能皆得以自見而不至雜然扵儔伍之中平居感奮思赴功名之㑹緩急之際必有可使者矣臣又聞昔之行軍者必多置介貳叅佐以廣耳目咨計畫且以收遺逸之才杜意外之變聞今軍中亦自有諸名號但或非朝廷所位置故士得之不以為榮臣以為士之智勇而嘗有功者宜别立異名以居之若古所謂叅謀典籖行軍司馬之類者使其禮秩體統稍與衆殊以示寵異儻以為可行自京營推之各邊是亦激勵人才之一䇿也七曰恤將士臣惟守邊之卒百戰傷夷終年勤苦視内地坐食者勞逸苦樂不可同年而語在上者不加優恤如陸贄所謂怨生扵不均者既所不免矣而將帥又従而朘剥之計其平居怨望不細而一日驅之使冒白刃難矣幸陛下憫念邊兵灼見此弊特扵詔條中嚴剋減月糧之禁禁之誠是也然臣愚以為苟未有以易之則此弊終不可革何者朝廷恤將帥然後將帥愛士卒自然之勢也臣觀昔之人主稱善任將者莫如宋太祖太祖之用李漢超郭進諸人使守邊也皆厚以闗市之租饒以金帛之賜家屬在京仰給於縣官貿易往來不問其商稅故邊臣皆富於財得以養士用問洞見敵情時有宼鈔亦能先知預備多致克㨗終太祖世無西北之患蓋恒人之情私計不足則常怠於奉公况將帥捐一身以當安危之衝此尤不可不恤其私矣彼其區區之俸禄不足以自給則百計漁獵以資賂遺之不暇又何暇為明主養士以收竒功乎竊見國家無名之費嵗以萬萬計誠能捐其半以厚邊臣俸禄常賜之外别有以優之俾得多收智勇之士以為心腹巧慧者用之間諜拳力者用之戰陳明扵術數者用之以知氣候熟扵韜略者用之以叅謀議山川險易敵情虚實行兵調度皆講之有素不至臨事張皇又將帥既饒於財自然優假士卒國家養兵之惠得以下流雖素觖望者亦感恩而知愛其上矣昔李牧為趙將居邊軍市租皆入幕府為士卒費遂能破走東胡魏尚為雲中守出私錢三日一椎牛饗士是以匈奴逺避使今之守邊者能然敵雖有十倍之衆臣知其無能為也八曰擇主帥主帥者三軍之司命而一國之禍福繫焉故用兵之道擇師而已夫秉鉞而專行握機而立斷類非簿書筐篋之才弓馬一夫之長所能辦也精神志意足以折衝威稜氣槩足以懾敵定力雅量足以任重逺心曠度足以用人長筭碩略足以濟變而體之以忠誠將之以愼密兼是數者可以稱大將之任矣今諸將中有名者不過數人亦可當一面之寄若具文武全才堪為大將者其誰與竊以為威望素淺者則臨事難以服人人品不髙者則所為必多顧慮是未足以當推轂之首選也惟聖天子恢𢎞雅度不以小過而舍干城之器不以浮言而廢有用之才大臣當選將之任者又能竭誠體國取其才望之過人而不憂其名位之軋已則可為大將者出矣且擇將非難任將為難為將者非如州縣米鹽之吏可以歲課遷也苟其人可任近則十年逺則二三十年甚者終其身而已今月改而嵗移坐席未暖又更他鎭地形未識土俗未諳軍情未接而已去之雖有韓白為帥無以成功矣夫有非常之人然後能行度外之事漢用陳平捐黄金四萬觔不問其出入遂以滅項羽今之邊臣動支一錢榖拔用一將校稍破常格則文法吏且操尺寸以議其後顯效不録流言亟行彼方求免於謗訕之不暇又何以責其有功設令將得其人任之有道調停糧餉厚恤邊民以裕其力廣開屯田疏通鹽法以豐其財無以貴倖之臣間之以一其權假以歲年不為人言沮奪使得展布以盡其才養威蓄銳以待事㑹之來雖一舉取敵可也臣又聞之天下事有本末邊境末也朝廷本也昔已已之變有一于謙遂以安靖近孝宗晩年信任劉大夏則北鄙雖或跳梁而終亦無患斯治其本之效也今夫富人之營居室者刀鋸斤削之工豈必一一擇之亦惟求工師之良者而委任焉指使羣匠各當其能則其室易成而難壞兵者國之大事非特居室也不為之擇良工師可乎今舍大圖細計其末而忘其本也雖終日汲汲豈有益哉伏惟聖明深為社禝至計憂其所當先者天下幸甚極本窮源之論誠莫過於此故臣條邊務而以是終焉愚忠所激不知忌諱幸陛下矜而察之臣不勝祈懇之至詔修濬通州閘河議閣試具官臣某言伏奉敕㫖以某官臣某所奏脩濬通州閘河事宜下臣等詳議奏聞者臣伏以通惠一河乃前元都水監郭守敬所開國朝自文皇帝定鼎北方嵗漕東南租賦以給京師其始因濟寧州同知潘叔正建言命尚書宋禮平江伯陳瑄開通漕河以代海運而自通州至都城四十里間陸輓為難乃議濬守敬所開故道置閘蓄水以通漕舟然嵗久廢弛河日淤塞仍用陸輓車輛脚價所費不貲遂至加耗日重東南民力不勝其困當純皇帝時嘗議脩復而豪貴不便訛言沸騰假造妖異以動上聽其事遂寢識者恨之迨今又數十年矣國計之屈民力之困又非曩時比脩復之計誠宜亟行而不可緩者幸賴陛下聖明俯従言者之奏特命大臣相度可否詔㫖諄切期在必行凡有志於經國者皆以為希世之遇而異議之徒猶藉藉病其功之難成非特不智蓋不忠也臣請得以備折之今之議者曰風水之說世所恒言通恵泉源出自西山流經大内今欲開導慮於諸陵及京城形勢有妨臣以為是特卜史鄙淺之言君子不道也就令有之則河道山陵地絶遼逺於其所謂隂陽向背之說亦邈乎不相及矧今不過因循故道稍加濬治非有鑿山通道動絶地脉之患也而扵京城形勢亦何損乎難者又曰國家財力方困公私耗竭驟興大役何以堪之且水道之遲孰與陸輓之疾乎臣以為成大事者不計小費而不一勞者不永逸陸輓之費嵗無慮數十萬誠令捐三四年之貲以就此役猶將為之而况故迹尚存泉源不竭功可計日而成所費未必至是乎且舍陸就舟所省十倍水道淹留不過數日雖有剥載之勞而無雨雪泥濘之阻以其費之多寡而當其行之遲疾利害亦較然矣難者又曰京城内外㳺手何啻萬人藉輓運僦直以餬口一旦罷之將使失業恐生他變臣又以為不然夫所謂濬河者非曰遂廢陸輓也謂與陸輓並行也河成之後立為禁例惟以通軍民之運船餘若商賈之負載官民之往來仍従陸行則舟楫不至壅塞車輛可以無廢一舉而兩利存焉民方便之何變之生哉凡悠悠之談其大指不出此三端而自明者視之皆不足憂也夫天下事謀之貴詳而斷之在獨詩曰如彼築室於道謀是用不潰扵成惟廟堂之上剛斷不惑而任事之臣能一心為國無怵於人言則功可成矣彼倡為異議者特世家大姓利僦直之入而已朝廷之威令苟行彼亦何敢囁嚅其間哉若夫修濬之法要在相度髙下竊聞京城地勢視通州為髙而水勢就下蓄洩為難河身淺則遇旱易涸而難行閘坐卑則泉源迅疾而難積今宜於近京之處大東橋迤東挑掘令深去髙就卑使略平坦増置閘坐多為板級土去則河平板髙則水深而挽舟逆上者無艱阻之患矣仍添設治河之官重其責任時常加疏濬凡諸乘勢射利之徒假以尚方供用為名放舟挽阻運船者坐以違制之罪啟閉有節蓄洩以時此河一成而不廢則脚價可除加耗可減東南之民庶幾有瘳乎且昔者置倉扵通州正以輓運艱難不能全達京師而為此權宜不得已之計有識者盖深為朝廷憂之已已之難嘗用言者計焚馬房之芻粟矣斯實前事之明鑑也此河既開通倉可罷軍士之受糧於官者免往來擔載之勞而太倉陳陳之粟深貯嚴城可無意外之虞矣豈非萬世之利哉抑臣又有私憂過計者國家財賦出自東南所賴以通往來者一河而已沛水淤塞漕舟遂梗藉令有不測之患過扵此者又將何以待之是以先朝憂國之臣如大學士邱濬者嘗建海運之䇿其慮雖若迂逺而其說不為無徴臣愚以為漕運之法固當萬世無廢而海運之舟亦可預習以備不時之需宜博求諳知海道如元之朱清張瑄者使熟議而行之萬一有他故此不來而彼來亦國計之一助也國家太平之業與天地無窮而杞人之憂竊有不能忘者是以愚衷所懷承詔輒發猖狂妄言答所不問惟陛下不以為迂疎而棄之則社禝之幸也臣不勝大願臣謹議名宦祠議謹按蘇郡學名宦祠所祀古今監司守倅通若干人而其間有不繫扵蘇者蓋六人焉王魏公旦富韓公弼歐陽兖公脩蘇端明軾陸文安九淵李文靖侗皆賢者也而得祀扵蘇則知禮者疑之夫祀國之大事也將昭勳徳勸忠孝示愛敬以為民質也不可不謹聞諸古曰鬼神不歆非類又曰非其鬼而祭之謟也諸君子未嘗涖官兹土雖聲實顯著而恵之流扵蘇也不専其祀之也越於禮矣或曰諸君子之言行功伐合於祭義所謂以勞定國法施扵民者將天下得祀而何有扵蘇粲以為非也在禮惟天子有天下其祀無所不通諸有國者山川百神之祀皆不出境衛成公欲祀相甯俞曰相之不饗於此久矣不可以間成王周公之命祀楚昭王有疾卜曰河為祟大犬請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也河非所獲罪也皆不果祀今之祠者郡守丞實従事焉郡守丞秩不過古諸侯諸侯之祀不敢踰國而郡守丞得祀他境之賢以為禮也亦有據乎今之制惟孔子為師儒宗得天下通祀自餘若臯陶伊尹伯夷太公之倫猶不得與孔子比其祀皆不出扵其鄉與其所封之土禮之節也諸君子㣲有孔子之聖雖賢亦不能當臯陶伊尹伯夷太公而祀非其地也越扵禮矣原其始所以得祀不可知殆邦人之好賢以是寓其愛敬或其門人子弟有官扵蘇者以其私附焉而後人遂襲之與知禮者亦改而正之矣或曰諸君子之祀列於學宫邦人習聞之三百年矣誠一日撤焉將駭民聽而傷忠厚之道夫與其過而去之也寧過而存之乎粲又以為非也夫非禮之禮君子有弗貴者焉孔子曰曾謂泰山不如林放乎以死者為無知又焉用祭以為有知夫亦忸怩而莫之顧也君子愛人以徳細人愛人以姑息今為非禮之禮以瀆賢者又拂先王之經而踰當代之制非小過也不亟正焉而襲細人之姑息以為忠厚亦陋矣又蘇自漢以來監司守倅賢而不得祀者尚多謂宜擇其人進之而罷諸所不當祀者於誼為允且使斯民知禮之嚴若是雖賢者不得僭冒庶幾禁滛祠黜非類以示風教之本也由兹祠始謹議粲嘗因是竊觀之今名宦鄉賢兩祠所列猶有未當扵後學之心者鄉賢姑弗論名宦所祠止扵宋而不及前代則狹而未盡俎豆其間者既未必皆極選又雜以二三寓公則汎而不専若魏文靖楊文元固寓公之賢者然文靖已敕祀於書院而文元則吳學嘗有祠矣本朝夏周二公亦自有専祠而復位於此似亦近瀆至扵王㬇者姦檜之妻兄以聚歛酷虐聞而亦預焉諸賢有靈宜羞與同食矣蘇為名郡四方扵是乎觀禮而祀典一事已鹵莽若此此而可苟其何所不苟也故嘗過不自量因郡乘所載諸賢為撮其尤者得若干人疏之如右晩生膚學見聞未廣輒議及此誠狂僭矣雖然有意扵風教者或見采焉相與愽議而行之固一方之盛舉也名宦事略已祀者不列漢第五倫長陵人守㑹稽變其俗無滛祀以已俸業貧民坐法徴民為守闕下上書得免歸後官至司空鍾離意山隂人郡督郵也歳大疫意獨身巡視為民嘗藥所臨護甚衆他日守出省災民逆謂曰公無出獨得鍾離督郵來可耳官至僕射王充上虞人為郡治中自免歸閉門作論衡㫖不皆粹亦恢然成一家言張霸成都人守郡以經術化其民野為之無宼遷侍中卒私諡憲文右四人皆在吳㑹未分郡時晉鄧攸襄陵人初守河東没于羯南奔拜吳國内史為政清明飲吳水而已罷任民酷留之不得歌思之終右僕射攸棄子事為世所短然治吳之績不可揜也唐韋應物洛陽人起環衛折節為儒名能詩刺蘇清脩寡欲後數十年有白居易居易政不見紀述然蘇人尊其名應物今有専祠在學宫獨其扁書集賢太守者可疑王仲舒祁人為諫官與陽城同論裴延齡事坐貶稍遷為蘇州化成為天下最卒官江西觀察使贈散騎常侍李徳裕趙人先刺蘇後又觀察浙西相端陵有功拜太尉爵衛公獨頗狥所憎愛以故逺貶死海上然涖南方最久有名本朝姚善安陸人建文中守蘇最有聲績以忠死朱勝金華人寛然長者民安而化之去久思不衰擢江西右布政使以卒百餘年來循吏殆未有先之者王恕三原人成化末以尚書撫南畿有妖人從巨閹横江南恕奏斬之還閹于朝内降旁午數執奏罷之忤㫖致仕歸再起為吏部稍不合又竟去得年最髙贈太師謚端毅恕忠諒世莫與比當士習頽靡中獨秉羔素之節有古大臣風陸子餘集巻七
