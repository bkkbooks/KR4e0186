body:
  text: 陸子餘集巻四明陸粲撰明故資善大夫都察院右都御史盛公行狀曾祖佖妣徐氏祖昕皇贈通議大夫都察院右副都御史妣朱氏贈淑人父瓘皇贈通議大夫都察院右副都御史妣胡氏繼妣蘇氏俱贈淑人貫蘇州府吳江縣范隅鄉儒林里享年六十二公諱應期字斯徵别號值菴其先與周同姓春秋時有成伯或稱盛伯子孫蓋以國為氏或曰召公奭之後為奭氏在漢避元帝諱更姓盛云唐末有諱璫者仕餘杭令始自虞城徙家于浙三傳為宋參政文肅公度文肅之後自浙徙汴又自汴徙蘇之吳江今居郡城入國朝若徵士景華御醫啓東皆為時聞人累世事行之詳具載公所輯家乘公自少資性穎異稍長治易成化丁未年十四補郡學生遭家中落能感奮力學讀書至達旦不寐𢎞治壬子年十九中應天府鄉試明年癸丑登進士第奏乞歸娶俄丁母憂丙辰服除授工部都水司主事奉使涖濟寧牐牐當孔道公約束嚴整啓閉以時舟艦無敢亂行者軍民便之吳文定公以少宰被召北上時公方封牐蓄水以濟漕船文定鄉先達又尊官也舟至猶停旬日乃得過然文定不以為忤亟稱諸人曰為人臣守法當如此矣聞者兩賢之中貴人奉使往來皆聞風斂戢有挾重貨以行者輒没入之時太監李廣李興鼎貴用事聲勢赫奕諸中貴既不得逞相與愬于廣興廣興固銜之㑹其家人載私醝數十艘南來聞濟寧主事嚴悉投諸南旺湖中廣興益怒合辭譖于孝廟曰是浮薄不遜者何可輕縱也上不應有間曰河道官不易為若曹知之乎二閹意未慊隂嗾太監秦文誣奏以阻滯薦新船為大不敬奏入孝廟猶持之諸大閹環跪榻前愬不已乃詔逮公及詞所連及者主事范璋皆下錦衣獄訊治嚴酷公無撓辭賴上仁明得從薄譴降雲南安寧驛丞雲南去京師萬里驛地荒陋居之三年敝衣麄食晏如也其人或遣子弟從游經指授者後往往取科第前後臺諫名薦者章數十上輒報罷辛酉始遷雲南禄豐知縣禄豐古之禄琫甸白地民素頑梗公不鄙夷之為設條約教以禮讓群盜阻山險累嵗莫能平公至則首弛逐捕之禁益示以恩信使得自新盜感悅讙呼集數百人伏縣門外自言頃縣官仇視我曹不能一日安故竊出為非今官善遇我我曹得更生自今誓革舊習為良民矣於是一邑清謐他日隣境有盜其民亦縛以獻公謝曰而自有主者其人曰彼不能為政詣之何為不得已為杖而釋之癸亥遷四川順慶府通判專理糧事姦民乾没嵗久蠧弊不可剔洗一旦案得其狀悉論如法積逋為清民苦運餉松潘破産不能支復為經畫事集而民不困丁卯聞父通議公訃奔䘮還道陞湖廣武昌府同知正德己巳起復入京時逆瑾盜柄方煽虐素嫉公名人皆危之公自如也瑾卒無以加害復除長沙府同知督理赤籍不事鈎摭而宿弊頓絶嘗攝郡篆聽斷詳明防撿吏卒毫髮無敢欺者前此王府官校及衛所官軍俸糧多不時給吏胥旁縁侵牟出納具文而已士卒坐貧困將吏出怨言將生他變公召善筭者授以意稽覈其出納之數參合分劑具悉其利弊所在推而行之郡以無事他所興革尤多去郡日民送者涕泣遮道追思甚至設位於六君子堂生祀之辛未陞雲南按察司僉事分廵金滄洱海二道所至武弁夷酋帖帖畏伏景東府土官陶姓者世知府父子信讒搆怨將至讎殺公偕瀾滄兵備副使晁必登馳入其境縛諸讒人寘之重辟曉以大義俾父子如初一方底寧謀慮皆出晁意表晁為驚服武定軍民府土官知府鳯英死其妻攝政子朝鳴素兇悖至謀殺縣令侵奪民田掠子女財帛民累奏訴寃部符下所司積數十通皆憚不敢理癸酉公當奉萬壽聖節表入賀總戎沐黔公與撫按議留之以其事屬焉公單車造其所治鳯氏母子震慴伏謁輸情簿責其黨抵罪各有差歸所侵奪於民民踴躍呼道上曰盛公吾父天遣來耶公知鳯氏終必為患請降其秩為同知設流官以制之因㑹奏于朝當道重其事格不行後鳯氏卒叛如公言諸礦産銀有嵗課其後鎮守者苛取之往往以啓釁公復建議奏請封閉以絶禍源户部尚書安陸孫公手其疏歎賞不已覆奏力言封閉便上許之鎮守太監梁裕肆為貪虐責將校及土酋饋獻徵索方物動以千計嘗一釀酒至供米八百石公具陳其害於廵按御史張璞請加禁制張亦剛毅人也慨然從之是春陞本司副使命未至而梁已誣奏公及張晁二公罪遂俱逮繫錦衣獄張被杖死諸大臣臺諫連章請宥㑹乾清宫災赦復原秩甲戌還任專理清軍及屯田風采益振乙亥陞河南按察使鋤治强暴扶植善良憲度肅然鎮守太監孫清濫受訟牒豪猾縁此為姦利公請見面數之曰公國家肘腋臣乃下侵有司職耶孫隂喝不能對即日罷之公察其官屬生事病民者輒加搒繫或荷校通衢孫益不堪將有奏訐今御史大夫毛公伯温時廵按其地聞而諭之曰盛使君賢者公為此不愧清議乎乃止丙子秋陞山東右布政使胥史每稽滯公牘以要賄吏民守事者連年不得去時適缺左轄公至則視篆剖决如流案牒出入皆有程期召吏民立庭中面授之無弗稱便者舊有賦入羨餘及贖金别貯以備公用悉屏去之曰名公實私吾無用是諸汎征横費一切停格吏屬聳惕而同官後至者頗以侵權見疑屢有嘖言公不恤也戊寅轉陜西左布政使鎮守太監廖鸞縱其弟鵬姪鎧百計漁獵民財黠吏席守成與交關假進奉侵盜官銀帑藏為空諸方岳初至者例先謁鎧公獨不為禮廉得守成姦狀捕寘之法黨類股慄廖滋不悅思中傷之㑹造上供職罽其費鉅萬廖檄公取直辭甚峻實以嘗公也公受檄則閉户發籍稽按得所侵費已數萬金明日詣廖廖方盛氣以待公從容出其數視之因問更費若此計所造者當有若干匹今皆安在願以上聞廖出不意汗下被面長跪謝乃止中貴趙林傳㫖採取方物數百千種直可數十萬公力拒之卒不得施而去武廟廵幸將至榆林人情洶洶藩臬㑹議加賦以備供億公持不可乃議於正賦内每户以丁糧為差出銀米若干聽准來年賦入之數比迎駕至邊士馬滃集鉅細百需咸有調度而處之裕如若無事者民間晏然不知勞費諸嬖倖扈從者勢熖薰灼自鎮廵以下重足屏氣莫敢與抗公既雅負重望風聲所被遠近振肅而臨事整暇屹然不撓羣小望而畏之比終事無敢以非理干請者故尚書嘉魚李公時為右轄亦在行歎曰李承勛嘗自謂一世俊傑今日服矣惟上亦知之亟稱曰盛某好官也還省所過村邑老稚焚香迎拜夾道歡呼曰微公我輩為溝中瘠矣至今追思不輟云己卯陞都察院右副都御史廵撫四川初吏部奏議以都御史伍符居首公次之有詔用公蓋出聖意屬江西有宸濠之變上親帥六師南討一時權倖縱横所在官吏多務括克以資遺賂公至蜀首嚴其禁非奉臺檄不得擅科一錢役一夫凡假進奉以市方物及稱軍門問安有所徵索者悉痛以法繩之蜀土險遠諸夷多梗化天全六番招討高文林及其孫繼恩尤獷悍數攻圍城邑殺掠吏民流民謝文義文禮亦糾合僰蠻為亂先後督師勦平之自是諸夷讋服始遵約束矣亡何丁繼母憂歸辛巳今上登極以疾乞休不許壬午起廵撫江西值兵燹之後加以饑饉民物凋殘公以癸未二月至所在寇盜充斥鄱陽湖尤稱淵藪公知漁船為賊鄉導乃令置籍于官騐其出入而命守備都指揮一人專守其地率官兵晝夜廵邏又設團保之法以統鄉兵寇至則互相應援失事則鄰伍連坐能獲賊者各以多寡受賞盜無所容匿一時迸散兊運事嚴為抗疏請減米之半以銀代之用省轉漕之費及蠲免諸雜調緡錢各以萬計時省中當輸銀京師及湖廣者凡數萬復奏留之以備賑濟用且廣為規畫擇方岳之勤能任事者俾分詣諸州縣設法賑䘏政令齊肅賞罰明信屬吏無敢怠事者所全活甚衆是嵗始獲豐稔而南畿大饑公督完逋賦銀至二十餘萬兩例當易米輸之南京乃奏言銀散之則易收之則難輾轉之間徒資姦弊以為民病請即以銀充米直與所徴糧四十七萬石俱運赴所司輸納詔報可是時留都缺食諸省轉餉多未至惟江西運舟絡繹而下六軍百姓賴以全濟户部尚書秦公疏論公有裨國計宜被嘉奬上良說特賜羊酒幣帛仍播告諸方廵撫示激勸云廷議儲穀備荒詔格嚴切獨江西所積數盈百萬秦公復以聞賞亦如之甲申冬進兵部右侍郎兼都察院右僉都御史總督兩廣軍務時兵政久弛土酋玩易而群蠻肆出刼敓幕府號令殆至不行公慨然思一振起之大閱諸軍一時逋蕩者以次復伍因益務廣儲蓄作舟艦繕城堡部分將校俾各守要害紀律嚴明群酋始知懼而奉法民獲安堵歸善縣劇賊李文積據桃子園為亂公督率守廵諸臣進兵生擒文積及其黨李萬金等斬賊首一千一百三十餘級俘獲男婦四百餘思恩府土官劉召聚兵據險誘執兵官勢甚猖獗復奉敕調遣漢土官兵分命守廵及諸將校授以方略進攻岜梅諸寨破之召被創赴火死斬賊首一千九十七級俘獲男婦五百餘招撫被脇良民四千餘口咸令復業田州府土官岑猛淫虐慘毒屢出兵攻燒州縣刼府庫屠良民前後鎮廵諸臣累奏乞討之詔下公體量公與廵按御史謝汝儀及諸藩臬籌度數四咸謂猛稔惡逋誅若容養不問勢將益熾而一方之民塗炭已極不容不拯乃積糧選兵以備進取而上疏具陳方略大率欲誅首惡而赦其餘疏下兵部覆議而公已被命改官矣初太監總兵二府多私役士卒相沿以為常公至稽按尺籍盡勒歸行陣而痛抑其官屬之暴横者檄下兩省及湖廣諸路凡所調遣徵發皆關白乃行於是二府禁不得逞隂使其私人騰謗於中要語聞吏部欲調停其事乃改公為工部侍郎提督易州山厰公遂引疾乞休得㫖致仕時乙酉冬也丁亥河決徐沛漕渠淤塞役民夫濬之費以萬計終不治朝廷憂之敕吏部㑹官舉能治水者僉以公名上遂進都察院右都御史總提督南北直隸山東河南等處河務且戒不得辭璽書至家公曰事不避難臣之職也吾敢崇虚讓以誤國事遂行是時尚書李公承勛胡公世寧皆建議欲於昭陽湖之東自留城以接沙河别開運道而江僉事良材議亦略同及黄少卿綰霍詹事韜亦各陳便宜俱下提督大臣看詳公至與新命郎中柯維熊員外郎王大化山東叅議劉淑相等共議昭陽湖東自汪家口南至留城地延袤一百四十里宜改運道仍親詣其地再三相度延訪故老皆謂地形平衍可以就功而劉公且以為天相我國家留此地以俟改作贊之甚力公又謀諸山東廵撫都御史王公堯封暨三司之長議既克協乃上疏大略言黄河所至古今未嘗無患而中原之地平曠夷衍無洞庭彭蠡以為之匯故遷徙不常為患特甚而其性避高就下自非多為之委以殺其流未可力勝也𢎞治以前河東下潼關即分三大支其二大支俱出汴城以南東行由泗水經淮入海維時河南郡縣受害為甚其一大支則經汴城以北東行至於兖州又分二小支一出沛縣之飛雲橋一出徐州之小浮橋俱入運河徑下邳州㑹淮入海正德以來汴城以南二支湮塞併入以北一支於是全河東下至於徐沛俱入運河自是汴河無患而徐與豐沛適當其衝泛溢瀰漫百姓乃罹其毒近年河漸北徙小浮橋旁支亦已湮塞自曹單城武等縣楊家口梁靖口諸處奔潰四出徑趨沛縣漕河横流昭陽湖東而水半泥沙勢緩則停遇坎則滯致淤運道三十餘里為今之計大略有四曰疏曰濬曰築曰改疏者疏上流而殺之也濬者濬故道而順之也築者築長堤而障之也改者則改别地而不與之爭耳夫上流不殺則決口不可塞長堤不可築而河防不可成矣河防不成則淤不可濬故道不可復矣此改河之舉所以不容已也奏下工部集廷臣㑹議咸以為便詔乘春和興役時公已命柯維熊等督工修治舊河俾漕船通行而堅築堤岸以障黄河之衝決又濬趙皮寨孫家渡諸處以殺上流之勢既被命乃量地授工分委屬吏之賢能者以董其役時其食作公其勸懲聨絡相維統攝有序初議成功以六月為限公綜理微密撫恤周至役夫競勸甫四月工完者什八九而讒言横興大功頓廢識者恨之初用事者以私請不遂致憾而朝士有不恱公者從而搆扇其間謂改河非計柯維熊者閩人素隂險自其鄉里皆畏之且狂躁自用臨事動欲紛更公稍加裁抑輒怨懟至是聞用事者之意虞禍及已乃具密啓投之辭多詆讕將賣公以自解而東昌郡守某前此嘗斂郡人銀數千兩請以為治河用公曰吾經畫百費備矣惡用是為且病民招怨咎將誰執笞其吏移文切責之某懼亦潛投謗書略如柯所云用事者益惑焉遂因災異獻言力請罷役詔從之且召公還時内閣二三臣力爭不能囘户部尚書鄒公文盛覆奏有曰大臣用事於外群言沮撓於中市虎成於三人投杼起於屢至宜念漕河關繫之重體大臣幹理之難雖發言盈廷莫執其咎必信任無貳方克有功不聽公上疏略曰𢎞治間如都御史劉大夏理河之疏有云好逸惡勞者怨謗易興聽聲躡影者議論難據以大夏之清忠名德當時已不免於騰口况臣才識聞望逺不及前人萬一者哉速謗招尤知其難免矣因引疾求罷優詔不允公又疏論柯維熊姦險反覆挾私誤國之罪且移咨吏部疏未上而咨先至用事者怒遂論奏公與柯俱奪職一時議者雖知其枉而莫為伸辨獨胡公世寧抗章言改河之議寔發於臣今聞盛某因此罷去臣猶疑其人之見謗惜其事之中止欲奏遣廷臣忠實不欺者一人詣其地覈實以為行止賞罰且自昔國家凡遇大事之誤必追咎首議之人以盛某之廉勤果毅受任數月沛縣舊河既通黄河上流亦治宜録功加勞而乃因臣妄言請開新河之誤得罪以去使後之任事者以斯人為戒而莫肯盡力臣之一言誤國甚矣罪當罷黜上雖不問然天下聞而壯之公家居七年更赦復職致仕大臣言官相繼論薦海内士大夫方冀其復用而公以痰疾不起生成化甲午八月二十一日卒嘉靖乙未九月十三日元配沈氏繼顧氏俱贈淑人子男二人長之材府學生娶王氏次之榮娶王氏繼沈氏女一人適前進士陸粲俱沈淑人出孫男五人長茂勲府學生娶陸氏次茂熙紹祖茂濤茂然孫女一人許適吳治公没後之材告哀于朝上聞而悼惜賜諭祭者再命有司治葬事皆如制以卒之又明年丁酉十二月十六日葬横山感慈塢之原公為人脩眉豐下容貌威嚴見者起敬天性剛毅自為小官忤貴近直聲震一時是後屢躓屢奮而氣不少衰有所欲為必達其志不以毁譽得䘮為欣戚憂國奉公之念寤寐不忘自律甚嚴非其義一介弗苟取好善嫉惡皦若黑白所以致怨謗亦多繇此撫江右鎮兩廣屬吏憚其風采雖深山下邑丞簿卑官無不改操自厲者然虚懷好問勇於從善每行一事悉心延訪反覆論議以求盡事理未嘗獨徇已見亦不以所長加人故雖風格峻整而賢者多樂親焉家居孝友嘗念早嵗居約二親甘㫖或不豐備及貴顯有禄賜而弗逮養以為至恨嵗時享祀極盡誠潔晨興必冠帶謁家廟一物未薦不先入口二弟早孤携以自隨教育備至比長皆為娶婦授以田廬待諸妹甥姪咸有恩意族黨貧者助之資鰥寡者助之嫁娶死者助之殮葬又出賜金買田祖墓之旁以供時祀族人戍邊者例有嵗餉亦於是取給焉自奉儉薄仕四十年家無長物飲食止陶器無金銀追琢之飾凡聲色竒玩卉木禽魚圖畫琴奕世所躭恱者一無所好居常進止皆有恒度不失尺寸雖燕閒必正衣冠自家人未嘗見其有惰容與人交際一以誠信終身不能妄語至於市井里巷浮媟戲笑之言不一出口臨終命家人啓户焚香正襟就枕而瞑無片言及亂云所著奏議若干巻藏於家惟公以書生奮自樹立平生宦轍所及幾徧天下觸霧披荆備嘗艱阻晩致位九列不為不遇矣顧其所欲為而未竟者世或未盡知也矧横遭多口齎志而終天下後世有遺恨焉嗚呼惜哉粲無似自少辱公知愛妻之以子當公無恙時嘗俾撰次其平生履厯為傳而弗果至是之材屬粲為狀將以請銘於當世之立言君子輒以平日所知者綴緝如右備采擇焉謹狀祭王文恪公文維年月日門生陸粲謹以柔毛剛鬛之儀敬奠于先師震澤先生太傅文恪王公之靈曰嗚呼粲生垂髫始誦公文越十五年乃登公門公本天人游戲域中諸所紛麗莫嬰其衷而獨愛才飢渴飲食聞人有能若自已出顧我謭劣辱公之知待以國士千載是期公於斯道篤學躬行不立門户渾然天成發為文章金聲玉色晩益臻妙居然古則刋落華繁獨造本原取材左漢規摹王韓豈無名家斂衽退懾愚不自量跪獻所業誦而首肯俛為指評曰此不怠莫之與京文貴意勝辭乃其枝苟辭而已夫人能為再拜斯言廓若發矇佩服終身用之無窮六籍之餘九流百氏浩如煙溟不見津涘公鉤其𤣥發矢破的考古辨疑忘食與息我效其愚公曰起予不蹈故常爾見卓殊故事舊章朝野罕習傳聞異辭譌舛踵襲公核其實引繩貫珠纂勒成編淡墨細書我獻所聞公曰有徵士貴識務不惟專經退則語人此我輩徒加以數年吾且避諸壬午之冬乞銘先君衰絰拜稽太湖之濆公聞其來喜動眉宇山亭篝燈從容欵語吾得子晩實獲我心斯文之傳非子誰任在昔昌黎殷勤籍湜我非其人敢忘公德公曰子來無渝斯誼申之婚姻用篤世契爰以弱息字公元孫我辭非耦公命寔敦聞公屬疾往候榻前猶為申眉諄諄誨言日傒康寧杖屨隨逐木壞山頽百身何贖見諸夢寐音容宛然覺而失之中夜涕漣巍巍我公豈其云亡將乘風雲陟降此堂公來此堂若聞我辭我辭有窮而痛無涯嗚呼哀哉尚饗祭亡妻盛氏文嗚呼吾妻其遂至此極邪自子從我二十餘年未始一日相違也吾忝竊科名列官于朝往來南北子皆余從頃以言獲譴投竄萬里念吾母高年兒女皆幼子又素多病不任道途之勞故弗果與子偕子意戀戀不能相舍臨發之夕倚牀歎泣吾心惻然然自顧與子皆壯年今雖暫違終當久相與處故寧舍子而獨行耳嗚呼孰謂一别而不復相見也邪吾自去家䟦履山川險阻艱難無不備嘗幸而得達貶所魑魅之與居虎豹之與鄰家人强壯者皆病垂死吾亦脫死如毫釐耳子誠往必死無疑也吾方以子之不行自慰孰意子竟不免死乎藉令子往雖不幸而沒然得握手一訣猶勝於生不相從而死不相見也吾之悔恨其又可追也邪子病脾泄已踰十年吾每憂之然亦未意遽至此也以子之孝友賢淑宜享遐壽而遽至此天實為之謂之何哉子昔嘗為我言有日者推子命云壽不過三十五吾以為誕謾不足憑子沒之月其朔日吾晨夢過家入室而不見子徒見兒女擁衾而泣吾覺而心怪之然亦以為夢寐不足憑也嗚呼孰意其果騐乎子沒以前年之八月至去年二月吾始聞訃其七月吾以公事如京便道過家母子骨肉復得聚首尋䝉異恩遷官近地顧子不及見也自子之亡吾母與吾大姊皆遷居汝室撫汝兒女汝父兄又為汝兒擇名師教之苟自今無廢學庶幾可望其有成也子而有知亦差足以自慰矣吾為子擇葬地未得又迫王命不敢久安於家今舉子柩攅殯先塋依我祖考吾力能即得地則葬而後行不則行而還葬耳嗚呼吾以疎狂自取罪戾鬼神弗宥以為子殃子病吾不及視子斂吾不憑棺生而惡衣菲食無一日之奉死而吾不能備送終之禮悠悠蒼天此恨何極中夜念之痛摧五内追惟往昔遭罹家難吾父既亡母又病目門户殄瘁外患沓來吾又數竒屢困塲屋㷀然一身百責攸萃隆寒盛暑風雨泥塗朝出暮歸不勝勞憊驚憂困辱惟子同之今幸仕有官矣其得甘食安寢者幾何時而子則又死也悲夫吾尚忍言之哉吾尚忍言之哉自今而後吾無復有意於仕進矣先人之薄田可耕敝廬可居行且謀歸養我母以盡孝誠撫我兒女以待其長立以畢吾餘生而已矣祖奠在前與子長别哀號之言出自肺腑子其聞邪其不聞邪嗚呼哀哉痛哉祭邃翁文維年月日學生江西永新縣知縣陸粲謹以特羊酒果之儀致祭于先師邃菴先生楊公之靈曰粲少也賤思御公車壯而登朝乃辱公知昔嵗丙戌濫竽詞林公自西還再秉化鈞一見其文曰此國器士不徒學所貴用世丁亥之冬拜官諫省内慚闇劣憂畏交併公曰朂哉功業由兹古人逺矣文莊爾師惟其疎戅不善自謀猖狂妄言以速愆尤人曰由公公不自明負罪引慝老臣之誠公無憾言我無愧色烱烱此心天日可質三疏明農拂衣歸來二䜿助虐俄遘凶災我竄蠻荒死與為期萬里訃傳五内痛摧優詔量移匍匐生還還不見公有淚空彈今夕何夕我來哭公山川寂寥草木號風古人有言士死知已恨不從公先驅螻蟻幽明茫然一慟而已嗚呼哀哉痛哉祭外舅盛公文維年月日子壻陸粲謹率男延枝以柔毛剛鬛之儀哭奠于外舅右都御史盛公之靈曰嗚呼傷哉豪傑之生曠世一逢屈指今日孰如我公昔也弱冠筮仕曹郎直道忤時竄徙遐荒﨑嶇滇蜀辛苦流離衆所蹙頞甘之如飴不卑小官恪勤吏職莫非王事余敢怠忽濩落十年稍遷臬司夷獠荒殘極力拯綏旋觸權閹再下請室諒節弗渝臣心匪石總憲作牧陜洛是經屬時險囏嬖倖縱横力遏其衝執誼秉正萬姓喁喁恃公為命六飛臨邊上下震􅋏豈無時賢首鼠惴恐從容籌畫不激不撓百需具完民罔知勞士女歡呼闐隘衢陌甘棠之思儷美召伯既陟中臺保釐三方敓攘屏息姦宄摧藏鶡弁貂璫煽虐恣行一裁以法安我窮甿禁不得肆乃搆讒慝誰歟吠聲逞其私臆公曰歸哉臣敢賴寵抗疏明農返余故壟維是漕渠繫我國脉帝詢廷議屬公于役公曰行哉臣敢避難夙夜經營心力並殫鉅績垂成忌者側目一唱百和群興謗讟我身可絀而道無貶浩然言旋俯仰奚憾惟帝知公曰爾端介公以名堂式嚴訓戒居閒七載薦剡屢馳可屬大事舍旃其誰輪帛方來胡不少待人之云亡邦國殄瘁遡公入官四紀于兹位亦匪下未究厥施才大數竒乗危履艱百折不囘屹然如山謀國孜孜寢食可忘恤怨愛身我則未遑彼哉何人燕燕居息生叨顯榮死濫恩澤公獨驅馳盡瘁匪躬坎􅇄一生齎志而終人亦有言不容何病在昔聖賢困于憸佞粲曩壽公擬古名卿漢惟汲直唐則廣平其在近代安成李忠文河津薛文清考德論世寔相比倫小夫潝訿螢爝明滅達人令名終古日月凡公大節峻絶難攀乃至百行罔弗粹完施於家庭孝友敦睦滲漉之恩沾被九族居無惰容燕無媟語衣冠儼然鄙薄銷沮忠信待人毫髮無欺綜理細密小物不遺屬纊之言凛乎嚴整闢户焚香正襟而瞑直氣貞心之死靡忒彼蒼孔昭鑒兹忠實嗚呼傷哉粲昔少小始壻公門三十年間獨荷殊恩警我昏惰拯我顛危豈直我舅寔維我師我生不辰遭罹厄屯謫官萬里䘮我内人兒女㷀㷀零丁艱苦仰賴提携吹煦摩拊多病疎慵獲遂歸休杖屨追隨鄉社遨遊亦喜兒女漸底成立幸公未衰承歡有日詎意一朝厭世長辭四海之慟矧於吾私不見公顔殆將五旬中夜夢之宛如生存有肉在俎有酒在樽叩地呼天公聞不聞嗚呼傷哉祭王履約中丞文維嘉靖二十九年嵗次庚戌冬十一月庚寅朔越九日戊戌故都察院右副都御史王君履約之喪既歸自南都其同年友陸粲方居母䘮聞之爰以特羊庶羞奔奠于靈筵之下哭而告曰嗚呼君昔家食伯仲聨鑣並馳蓺苑蜚英揚翹既奮甲科補官浙左再朞政成入踐青𤨏校文南楚閱武西陲誕奏嘉績重瞳屢囘洊膺簡擢進秩清卿徊翔兩都遂陟中丞新命鼎來綰章留院峩峩惠文總國之憲人之為言仕路嶮巇揆厥初終疇罔騫虧君仕則優雍容寛衍履順無愆以躋通顯跬步公台胡年弗延孰䃣于成造物忌全嗟君好修威儀濟濟終日凝然莫窺涯涘篇翰精工醲郁遒媚麟角鳯毛世所珍貴余始從君投分猶淺偕薦南宮相知恨晩廷對萬言金石鏗鈜顧慚謭劣瓦缶同鳴鼎甲之選僉期雙璧誤遭擠落群公歎惜暨官諫省先後參差君初拜命我竄南夷自是廿年隱顯異軌懷思日長合并能幾方傒晩嵗文酒尋盟如何一朝遽隔死生痛罹閔凶㷀㷀苫土訃音忽傳慟摧肺腑在昔劉子南紀宅憂銜哀著辭恫傷栁州我獨何人敢忘斯誼雖言不文亦抒其志言則已矣哀寧有窮君靈不泯儻鑒微衷嗚呼哀哉痛哉尚饗祭僉事方公文維嘉靖二十九年嵗次庚戌冬十一月庚寅朔越二十六日乙卯孤哀子陸粲聞改亭先生方公之䘮將葬乃銜哀扶疾以特羊酒脯哭奠于几筵之次曰嗚呼士在天下以相知為難自古則然矧于今日惟公父子祖孫於粲家有三世同年之誼契分至深然公之知粲乃不待此公豪邁恢達素少許可自當世所謂賢者或未當其意而庸劣如粲顧辱厚遇焉不惟折輩行以下交而已又奬借稱揚每過其實嵗時投贈短札長篇惓惓記存愈久彌篤粲也何以得此於長者哉方幸公康豫獲數從杖履以承誨言孰意大山流黄竟踐李侯之夢郢人亡質遽興莊子之悲手墨猶新而英標莫覩也痛哉公今已矣貴富壽考融朗俶終子孫象賢趾美仕路諸福備具海内鮮儷斯可以無憾矣粲所謂悼恨者自罹窮毒跧伏苫土於公病弗及省視沒弗及永訣葢不見顔色者僅半嵗而有死生之隔焉一念及此涕泣横流聞古之人有居母䘮齊衰而往哭其友者曰交義隆篤故也况受知之深重以世契如粲於我公者乎薄陳樽俎以展衷誠哀疚荒迷言不盡意公而有靈庶幾鑒之嗚呼痛哉尚饗陸子餘集巻四
