body:
  text: 陸子餘集巻三明陸粲撰祝先生墓誌銘先生諱允明字希哲蘇之長洲人也其先出古太祝以官氏或曰黄帝之後封於祝以國氏云七世祖碧山勝國時由松江来守郡後卒官一子留於蘇遂為蘇人祖顥皇正統己未進士終山西布政司右參政父瓛母徐氏大學士武功公女先生少頴敏五嵗作徑尺字讀書一目數行下九嵗能詩有竒語既天賦殊特加内外二祖咸當代魁目擩耳染不離典訓稍長遂貫綜群籍稗官襍家幽遐嵬𤨏之言皆入記覽發為文章崇深鉅麗横從開闔茹涵古今無所不有或當廣坐詼笑雜遝援毫疾書思若泉湧一時名聲大譟嵗壬子舉於鄉故相王文恪公主試事手其巻不置曰必祝某也既而果得先生文恪益自喜曰吾不謬知人自是連試禮部不第當道竒其才㑹修史將名薦之弗果初仕興寧令地介嶺海民尚譁訐惑於禨祥先生示之禮簡進秀異授以經學親為講解遂一變其俗群盜竄處山谷時出焚敓為設方畧一旦捕得三十餘輩邑以無警稍遷通判應天府亡何乞歸又五年卒春秋六十有七夫人李氏鄉先生太僕少卿應禎之女子男二長續進士入翰林累遷陜西按察副使次側出幼未名女嫁潮州府經歴王穀禎先生簡易高曠不樂拘撿在衆若無能者然黙而好深湛之思時獨居著書解衣槃礴游心𤣥間賔客来者叩户呼之若弗聞也性善書出入魏晉諸家晩益竒縱或購得之輒藏去為榮喜奬掖後進終身不言人過其為家未嘗問有無得俸禄及四方餉遺輒召所善客與醵飲歌呼費盡乃已或分與持去不遺一錢故其没也幾無以斂云先生少有意用世既濩落不試一發於文雖聲實閎振猶非其志也所著書合詩文集為數百巻藏于家陸粲曰斯文之用與天地準由漢氏來纘言之士臻于斯極者亦僅可數已明興百年士猶膠守章句未覩其恢然者也乃憲孝之際始彬彬矣祝先生由諸生起覃精發藻横逸踔厲超追古昔盛哉若其湛浮自得龍變不羈大觀逍遥廓然離俗矣夏侯湛贊東方生云明濟開豁包含𢎞大拔乎其萃游方之外者殆先生哉殆先生哉先生没以嘉靖丙戌冬十有二月二十七日又明年戊子冬閏十月十六日葬横山丹霞塢太原王寵撰次其事行粲為之銘銘曰維聖有文自天啓之其卒敝刓孰振起之猗嗟先生發天之明達聖之經播為渾鍠舉世震驚維時弗逢食貧以終獨昌其辭以燭群䝉横山之原崇四尺者先生之墳後勿壞傷視此銘文貴州楊義司副長官金翁墓誌銘貴州蓋古牂牁之域今其地為戎衞者以十數平越最大自平越之境所通為安撫若長官司者以十數楊義最大楊義地可數百里其所治曰楊山其為之長者曰金氏金氏之先世雄於其土明高皇帝時遣大將軍出師下滇僰諸夷道出平越金氏母聞之率所部詣軍門降且以羊酒獻大將軍喜承制慰勞始奏更其司曰楊義以旌之命金氏母之子孫世為副長官領其衆其衆咸喜曰嗟吾君之有此爵土乃吾媪力也迄今稱之以擬冼高凉云三傳至翁翁諱洪字某自始仕即以才諝知名每有寇警方鎮大臣以檄調諸司兵諸司狐疑相視莫先發檄至翁翁捧跪戴首起讀一二行已即瞠目援弓刀上馬令其衆敢後出者死及戰又甚力所嚮有功常為諸司最至他賦稅徵發率先期辦集以故方鎮大臣咸愛重翁迨其老猶不聽卧家遇重大事常以屬之有姦民造偽印謀據城為亂翁詗知之密白上官以計縛其人餘黨驚潰一境獲全翁既曉暢世務又多權略臨事翕張人莫窺其際頗喜讀書為奏牘若文移操筆動數千百言自老宿吏誦之未嘗不稱善也嘉靖九年十二月十六日以疾卒得年六十有七妻某氏子四人長鰲襲副長官次鳳衞學生次某次某鰲等以某年月日葬翁楊山之原貴州去京師殆萬里諸酋豪依阻阨擅殺生自娛一方僴然謂中國孰與我廣大卒乃犯天怒至舉種殄滅無炊火焉若金氏有土數世矣恭謹不懈子孫相傳聲光益榮曰為善之福非邪陸先生曰語有之順天者存余於金氏睹其效矣是故録焉以勸忠也鳯治春秋學自余以謫寓平越寔始來從游余銘翁亦以鳯故銘曰楊山峉峉閟此𤣥室夫人不死我銘在是匪夫人則銘以訓臣子亡妻盛氏墓誌銘亡妻盛氏故御史大夫斯徴女也盛在吳家世衣纓其先蓋多鉅人長者至大夫益以剛毅大節聞天下孝宗朝大夫年始冠擢進士第奉詔歸娶元室沈夫人亦出郡中名族其生吾妻也大夫適被選為工部郎故命曰選及歸余余為字之曰德媛自余舉進士為翰林庶吉士工科給事中吾妻皆從京師亡何余以言得罪再下詔獄天子仁不忍誅僅謫貴州都鎮驛丞都鎮地逺且荒惡非人所居弗能以家從吾妻乃留侍吾母於家故病脾至是增劇又加痰眩竟不起踰年余䝉恩量移永新令尋致事歸又久之始卜地於虎邱之西以葬云吾妻自為女子貞靜柔婉其祖通議公竒愛之不欲與凡子通議公者亦傑魁人也與吾先父如隱府君有世契嘗過府君府君觴之酒中以諸子見時余始六七嵗通議公於坐命之屬對語輒隨口響應通議公為之唶唶嗟賞罷酒辭去他日府君聞其女孫賢也使請婚焉通議公聞之則大喜曰彼聰明兒邪即報許受聘已乃寓書大夫曰為若得壻矣比吾妻來歸時年纔十有四府君及吾母胡夫人憐其少視如己女而吾妻亦執禮盡孝至接遇内外婣戚恩誼咸備自奉儉薄食不兼味衣被簪珥無華靡之飾於所生子女雖甚愛之然未嘗徇其欲御家衆特寛簡每以余性卞急易怒為戒曰是累德亦傷生奈何不自愛邪至今憶其言而愧之余之校文浙中也大夫適奉璽書治漕河相見於濟寧歡甚時大夫綜畫諸務過勞貌殊瘦吾妻見之悒然進曰仕可止矣大人盍歸乎先是大夫已疏乞致仕聞其言良悅曰真吾女矣及余逺謫吾妻初欲與俱曰夫安樂同處患難相違人謂斯何余謝曰吾母在子豈可復去左右哉乃止將别雖極悲愴終不以余黜官為懟其賢而有識如此然竟不免天没傷哉余結髮讀書困於進取且二十年中更家難豪族侵侮賦役交并困厄驚憂有人所不堪者吾妻實相與同之今往事猶若在目也而逝者不可作矣矧病不與知没不與斂痛可言邪吾妻之生為𢎞治丙辰十月十日其卒為嘉靖庚寅八月二十一日得年僅三十有五其葬為丁酉三月十八日子男一人延枝郡學生娶毛氏女一人適王有壬太傳文恪公孫也以䕃為尚寶丞銘曰嗟余放逐兮于貴之陽薄言還歸兮蘭先委芳爾命寔蹇兮終焉永傷爾德則嘉兮子孫其昌太醫院醫士張君墓誌銘余外祖山西叅議胡公仕有廉直節弗究於用既謝政歸吳益高簡杜門不與人通獨里中醫師朱廷用氏以世契故得數請間燕語時吾先父如隱府君方館於公家吾伯氏子徴生始數嵗而廷用之壻張君汝聲亦有女年相若也繇是始相與為婚姻而張君與吾父亦相得驩甚暇日輒過從飲酒歌呼為樂往往逾夜分始散去若是者葢三十年吾父既不幸棄諸孤又數年張君亦卒矣君為人闓爽尚氣義與人言輒披瀝底裏不少囘伏自廷用以瘍醫名吳中君傳其業又遍讀素難諸書得其肯綮旁涉史傳皆曉暢大義㫝疾處方什不失一雖廷用自謂弗如然君性簡倨郡中多豪長者貴人君與語常爾汝之豪長者貴人弗樂也有疾則迎他醫他醫技能大抵出君下或耳剽方術謾讕以射利然造請者其門晝夜常滿君業雖高不為人知設藥肆於門日危坐其中無過而問者以故家益落晩乃以薦入京例試禮部奏名入太醫院為醫士亡何以事乞歸後再至京待次得寒疾死逆旅中年五十九諸嘗與游者為治棺殮歸其家君諱鎛汝聲其字先世汴人從宋建炎天子南徙家於吳父謹以君之兄欽貴贈中書舍人母李氏贈孺人子出朱氏者六人男三潮瀚濤女三長歸吾伯氏次歸沈某次歸石某側出子二人男渙女幼未行孫男四女二君没以嘉靖乙酉閏十二月二十五日後十年乙未十一月十五日始克葬於花園村青龍塢之世墓潮屬余銘君之再至京師也益濩落無所遇聞余舉于鄉當赴省試喜語人曰子餘今來吾事濟矣子餘余舊字也尋病且革或問後事時舌强語不能了了猶若曰子餘今來云嗚呼君之望余深矣矧吾父所親厚者吾忍辭銘銘曰生吾不能恤其困死吾與之銘嗟張君之藏其永寧天池山人陸子𤣥墓誌銘天池山人陸子𤣥者吾弟也名灼更名采世吳人吳之西境有山曰天池蓋道書所稱可以度世者也君意慕之因自謂山人云君生踔厲英發始為校官弟子不屑守章句縱學無所不觀從其婦翁故太僕少卿都公游銳意為古文辭尋以例升太學益務精進視當世顯人名能文章者輒往蹐門自通䞇以所業皆一見賞愛其名遂隱然以起自江以東學士多延頸願交者而君意獨自許用世謂功業可立取時時於廣坐中奮髯抵掌論天下事語多觸時禁客不樂聞稍稍引去或目笑之君色自如不為止在太學二十年累舉輒躓遭世玩侮中不能無少望日夜與所善客劇飲歌呼為樂間出游或經月忘返槖中裝無一錢從者以告若弗聞也東登泰岱賦游仙三章慨然有輕舉之志南踰閩嶠徘徊武夷諸山語人曰世無知我者吾聞京師天下豪傑輻輳又燕趙多慷慨士吾且往觀焉儻庶幾乎行半道病還及家意頗惘惘夜中數起東西行謂余曰日者言吾嵗行在酉當厄今吾形神不相攝矣吾殆將死也因屏人屬余後事其言悽愴不忍聞兄弟相對歔欷泣數行下居亡何竟不起傷哉是嵗嘉靖丁酉九月廿二日也年四十一後八年乙巳十二月十三日乃葬其地寔天池之麓於君初志亦若有㝠契云陸於吳為著姓宋季始家陳湖之上吾先君諱應賓母夫人胡氏有三子君最少先娶都公女繼娶鄒氏子男二長舒枝都出府學生次敬枝側出女一鄒出適太學生陳沛孫男一嘉觀君性儻􅛅不羈與人游處輸寫心腹無所隱匿每揚㩁今古品藻人物機辨鋒出莫能窮者而彊執自信不肯詘折徇俗雖故所親善一弗當意則面斥之或致怨懟不恤也於文喜稱六代詩初規摹盛唐晩宗謝康樂造語往往似之居閒弄筆游戲為近體樂府若啁笑率然之作亦醖藉可喜獨好習國朝故實所至延訪勤切率多聞人所未聞者他如幽㝠物恠黄冶變化之言靡不采獲著之編録黠者或謾言以中其意君亦傾聽弗疑聞有竒人異士不逺數十百里走求之其篤好如此余與君俱侍吾伯兄子徴學議論下上自相師友而嗜好略同方賴焉以時規切庶有益乎而君棄余死矣銘曰吳有竒士陸氏子𤣥生不逢時又弗永年嗚呼悲夫張時濟墓誌銘東西兩洞庭山皆在太湖中包絡市井居者駢坒其上田賈畝數十金民食指稍衆者輒出為商賈然其人大抵纖嗇雖家埓素封齪齪愈甚張君時濟東山之産也性獨倜儻高亮輕財好施能立然諾可以為難矣君始業儒既而棄去従事廢舉嘗南浮江漢北涉淮泗歴齊魯燕趙之郊輩類皆高貲富人貨布充羨君所操視之不能什一且時有利鈍然意常豁如也與人貿易一以誠信雖累百金不刻契傳終無所欺而人亦無欺之者嘗得遺金於道物色其主歸之族黨有鬻産者君畀之直而還其産不取友人貧流寓逺方為具衣資將䕶以歸他行事率類此論者謂君蓋有古節俠士之風焉不特賢於其鄉人而已至於家庭之行尤多可書者父孟昂病臚鼓臍下出水醫云其味鹹生淡死君亟取嘗之母劉年過八十君亦班白矣孝養彌篤母没孺慕毁瘠人以為難早嵗嘗學武事善射絶人正德間游京師會有詔舉材武士所知者具草薦之君以親老固辭乃止居常手不釋巻喜養生家言著書一編以老氏致虚守靜之㫖為宗斥黄冶容成之術曰此去道逺矣亦善談禄命時時竒中一日忽為書以貽其子曰今嵗吾將觀化壬辰則吾逝日矣及期果以疾卒亦異哉時嘉靖庚子二月廿九日也年六十九以是嵗九月二十六日葬俞家山之原君諱淮時濟其字娶習繼陳再繼鍾子男一人本孫男一人餘烈女四人曾孫女一人本篤學好修嘗游王文恪公之門與余善而餘烈亦従余游且葬以君之甥肇慶守朱全甫狀來請銘銘曰誰謂服賈而寔才武亦敏而藝弗庸以試其卒有聞在其子孫怡圃朱翁墓誌銘吳郡朱元吉氏將葬其父怡圃翁自為狀數百言以視其游陸粲而屬之銘粲撮其略而書之曰翁諱某字某其先吳江儒林里人也始徙洞庭東山再徙郡城父某母某氏翁生天順壬午三月廿九日閲世七十有八年以嘉靖乙亥三月二日終于家辛丑闕月闕日葬梅灣山世墓娶王氏有内行二子元吉貞吉皆縣學生翁天資樸茂居家能孝於親而睦于二兄妻死不更娶故族之人歸其仁於所知者有過未嘗不盡言規之不屈撓辭色以徇人故里之人推其直少嘗治進士業中嵗棄去以其學授鄉之後進生而内以教其二子其既也後進生之従游者業皆有成而二子為名士蓋晚因厭事去即郡城之北闢地為圃種樹養魚以自適不一問世故或薦與鄉飲亦謝不往故郡邑之大夫稱其潔君子謂翁蓋古所謂一鄉之善士也者非歟或曰昔朱長文居吳有高名以經術授學者世稱樂圃先生翁豈其苗裔耶乃其行固髣髴似之矣陸粲曰翁殆有意於希長文者其號怡圃也蓋若以自况云故卒成其志而為之銘曰嗚呼呉逸人怡圃朱蓊之墓奉政大夫工部營繕司郎中張公墓誌銘孝宗皇帝之時吾吳人仕於朝者最盛自卿大夫有功德著聞當世弗論若其位未顯而名迹可紀者亦甚衆也其在工部有兩張公焉曰都水郎中嘉玉營繕郎中守之皆峭直清刻風軌行能相似也當是時天子仁明能容奬臣下守法雖左右貴近臣毁譽之言不輒聴以故兩公者得行其志而成其賢名及正德初逆瑾盜政兩公遂相繼得譴去都水公戍遼左瑾誅乃宥還中人猶忌之卒擯不用死營繕公亦除仕籍廢于家士之有志當世而惜夫人才之難者至今恨之營繕公之卒也屬粲以後事及葬則其孫衍慶來徵銘張陸世婚姻家公粲父行也為敘其事行而銘焉敘曰張公諱約守之其字吳之長洲人也世為士族考翥始起進士卒官雲南按察使母吳淑人公𢎞治庚戌進士初授虞衡主事監竹木税于杭及于蕪湖所至剔摘姦蠧課入充羨自尺寸以上咸籍而歸之有司無所汚染進都水員外郎久之吏部以營繕劇司非公不可乃進郎中尋奉璽書督造汝王府於衛輝量功命日節縮浮冗省費三十餘萬還掌司事張真人以建第請中㫖且許之公言嵗歉國貧而勤民以飭異流之居非王政也事竟寢京師浮食竒民關通中人為姦利常所輸材木不能什一則以足告受直累巨萬曹司莫敢詰公嚴為限列非經覈實者不得輸每宫省有所發取若諸藩府陳乞非令甲所有一切格罷羣小側目憚之相謂曰尚書易與耳獨無奈彼張郎中何也最後治外戚慶陽伯第瑾新用事將奪民居數百千區以益之公爭之彊瑾怒會考察京官遂屬吏部以不謹黜公一時臺諫皆知其枉而畏瑾莫為論捄者公家居蓋三十餘年中更赦復故秩致仕以今皇帝之十九年嘉靖庚子六月某日卒春秋八十有五某年月日葬城西金芝嶺之原元配宜人浦氏繼宜人錢氏子男一秉仁太學生前卒女二縣學生楊宸太學生陳道復其婿也孫男三餘慶承慶隸校官並秀慧而有文早夭最幼者衍慶女三曾孫男一夔公面目嚴冷外若椎少文内實好學雖耄年不廢讀書善飲酒多而不亂其居家治生自雞豚蒔蓺莫不有法而自奉殊儉飲食菲惡冠服故敝能安之平生無讕言謟語嗚呼其所謂篤行君子者耶銘曰張公質木守道敦篤式法従政思竭毣毣彼閹饕詖干國之紀扞其銛鍔迺黜以死曰此臣職雖黜奚懟而或隳之寵不塞愧天維顯思錫公夀耉高朗令終福則亶厚金芝峛崺公墓在兹孰為詭隨視此銘詩明故南京禮部精膳司郎中南丘先生陸公墓誌銘明嘉靖辛丑三月二十日葬我南丘先生吳郡陸公于華麓山世墓其従子粲謹敘公事行之大者而銘焉敘曰陸之先自齊宣王少子元侯通封平原陸鄉以為氏漢豫章都尉烈嘗為吳令卒葬胥屏亭子孫因家於吳末裔蕃衍為郡著姓宋季朝議府君千九始家陳湖之壖公九世祖也曾祖諱守道以公再従弟少保公貴累贈光禄大夫柱國太子太保吏部尚書祖諱瑄考諱溱更徙居郡城之閶門外以公貴贈工部主事妣王贈安人有五丈夫子公其仲也諱應龍字翼之南丘其所自號云公生而風神清茂自少敏悟過人弱冠游郡膠為文下筆立成而辭理鬯達累舉于鄉輒不利𢎞治戊午應貢入太學是嵗始中應天府鄉試明年登進士第授工部虞衡司主事監税荆州嵗滿羨餘累千金悉歸之郡帑尋以疾請告家居正德初逆瑾盜枋讎視士大夫諸在告違常期者並勒令致仕而公與焉瑾敗乃召復故秩補屯田司轉營繕員外郎又轉都水郎中奉璽書領漕河事諸所興革公私稱便而要束明信無敢以情撓法者内侍劉潮奉使還載私醝道索資送搒笞屬吏且挾刃傷人公抗疏列其罪狀忤㫖被逮下錦衣獄踰五月而得釋鐫三秩謫為浙江布政司理問理問視古法曹掾專治獄訟公平心剸决不以笞罰立威經訊鞫者咸自以不寃或譌傳得代囚聞皆慟哭其得人心如此久之稍遷應天府推官尋陞南京禮部主客司主事再陞精膳司郎中公時已無意仕進即疏乞致事少保公在吏部持之曰少需之當為兄易金緋公曰是禍余也再疏得請不待報亟歸當是時少保貴傾中朝仕者爭願出門下公親其兄乃僅以一郎官歸老士有遺望焉而公意恬如也其後逆濠搆亂少保為忌者中傷闔門逮繫得禍甚烈公獨超然免於訾議當世高之素康强無疾戊戌冬十二月十七日忽神思不怡越三日遂卒春秋八十有四元配闕贈安人繼配徐封安人先卒子男三長耿亦先卒次炫縣學生次烶今更名太沖女三長適姚奎次適張禾次適南京刑部員外郎陳椿孫男三女六公忠信寛和自束髪至白首不為卓詭之行以立名迹其在衆中言呐呐若不出口而簡易直致略去邊幅賢愚皆樂親焉居家孝友奉工部府君及王安人依依弗忍去左右事伯兄如父待諸弟有恩嘗夜有盜入室刼持府君公跣而趨出欲以身代聞既釋乃止他日郡獲盜贓貨不貲盜自承以為公家物郡守召視之公曰非也長揖去之守為驚歎仕且二十年所至專以誠長者處官吏卒服其恩信亦不大欺性不喜華靡雖貴布衣疏食如寒士奉身之外無長物焉晩益與世抹摋日端坐一室諸公貴人造請至門輒謝弗見時時幅巾單衣遨遊閭里人不知其有官也同時有以富貴自矜大者嘗誚其簡樸公應曰人各有性長短自裁若子所為吾不願學也孔子謂木訥近仁太史遷稱鞠躬君子者公蓋似之銘曰古有君子秉心無競萬石建陵醇謹篤行悛悛我公實維其儔含和養恬不忮不求亦既升朝暫斥而復其卒遄歸以逺殆辱小夫乾没多財益愚睢盱自賢與跖為徒達人大觀視彼腐䑕従吾所安其樂栩栩夀考令終福則具全勒詞貞珉以詔後賢旌表節婦吳母陳氏墓誌陸子曰劉子政列女傳稱魯寡陶嬰者養孤守節作歌以自明其辭慘怛哀傷讀者悲之頃余得鄉人吳鏜之母陳節婦事乃䀌然為太息曰嗟乎賢哉若人夫其操行危苦視陶嬰加難矣而世或謂古今人不相及豈其然哉豈其然哉節婦者長洲人陳賢之女也嫁為同邑吳宣妻以柔令孝謹聞宣為郡史得危疾時未有子而節婦妊五月矣宣且死意悽愴而無言節婦謂曰吾知子不悲短命而痛嗣息之不續也今吾方妊所生男也固大幸即女也吾且長育教誨之為擇壻屬以烝嘗子無憂乏嗣矣宣死後節婦免身果得男即鏜也而宣父清所娶後妻王氏性嚴且意有所屬數説清云新婦年少盍使更嫁節婦聞之號慟呼天矢不貳志自是蓬首毁容日居䘮帷中人莫見其面既葬宣因廬於墓所其嫁時衣被簮珥悉為姑所留乃獨紡績以為食既而聞有謀戕其兒者或謂有所受也節婦憂危惴慄晝夜保抱兒不暫舍每拊之哀泣聲感行路而其兄陳容者亦有氣義人也為往來䕶視之語人曰有籍吾妹若甥者容得以血湔其衽矣卒其母子得全者容有力焉鏜少長有知識節婦訓教之特嗃嗃嚴厲鏜用感奮自修敕稱克家子既冠娶婦莫氏生男曰一桂而家亦駸駸充衍節婦乃時為破顔一笑云鏜念母節未白亟請諸學官弟子為言於部使者列上其事於朝竟得旌母為節婦嘉靖甲辰九月十三日節婦卒年六十九後闕年闕月闕日葬金鵝鄉之原合其夫兆於是鏜詣余拜且泣以墓文請余哀而許之既為誌其事于石又擬陶嬰為歌使并刻之異時有復傳列女者庶幾采獲焉其辭曰有鳥比翼兮于飛頡頏中道失雄兮孤雌徬徨秉心貞壹兮終不再雙有雛唲唲兮在母旁天命不可期兮憖與此俱存亡雛翾飛兮毛羽襂褷以長室家具完兮母心則降嗟嗟義烈兮志士為閔傷著之歌謡兮千載不忘前儒林郎大理寺右寺副王君墓誌銘君諱延喆字子貞姓王氏其先世家吳之東洞庭山考文恪公諱鏊始起高科致位館閣為時名臣母夫人張氏君生卓犖不羣自幼侍文恪公居京師則已開敏習事公性高簡其為家未嘗視簿書仕既隆貴産業無所增益君年未二十歸吳即慨然欲恢拓門户當是時吳中富饒而民樸畏事自重不能與勢家爭短長以故君得行其意多所興殖數嵗中則致産不訾諸貰貸子錢若罏冶邸店所在充斥起大第西城下前堂列優笑鐘鼓筦絃後庭比房數十歌舞靡曼窮日夕為娛樂時出従所善客馳騁讌游輿馬鼓吹縦横道中貴游子弟望見君側行屏氣不敢疾驅君視之蔑如也然遇士大夫逡循有禮中嵗愈更約敕為恭儉罷諸辜𣙜妨細民業者益市古彛鼎圖書充牣於家有嘉客至則陳而觀之従容竟日悛悛若書生客退相語曰人言王公子伉健也今視之謹厚人耳初以名隸校官正德間繇廕敘升朝拜中書舍人奉使頒詔閩中今上時再使淮揚諸郡既又持節册封徽王妃所至能恪䖍以蕆事滿九載進大理右寺副而涖中書職如故久之復以使事過家會考察京官當路有不悦者署其考才力不及坐外補兖州府推官未行而疾作竟以嘉靖辛丑正月二十六日不起年五十九其年十二月二十二日葬洞庭馬塢之原娶毛氏封孺人有内行後君一日卒無子諸少房生子男五人長有壬尚寳司丞次有霖有翼有承有嘉女七人長適吳縣學生葉獻臣次適馬學詩次適太學生安希堯餘在室孫男一人女一人君長身偉鬚鬢魁梧悍堅不類南産家居事文恪公孝養隆備撫幼弟延昭有恩常日用財若纎嗇至有所規剏必盡觀美而建文恪祠工費最鉅壯麗嚴潔鄉人稱焉尤善經畫世務操縦弛張不露機穎一時名有權略者皆自以為不及也若其觀時低卬壯老異操卒以昌大其家而免於悔吝太史遷所謂以武一切用文持之者耶然今之游閒公子大抵困於晩節君自結髪知名逾四十年標望不衰當世談賢豪間者往往以王氏為稱首即其所成就亦足為一時之傑矣余少為文恪公所知愛為其孫娶余女即有壬也及是以諸弟來請銘銘曰穆穆文恪履貞涵醇靖共三朝貴而能貧卒恢于家在其嗣人矯矯大理始騫以揚博謀敷施業是用昌乃戢而藏不隕其光孰不貴富乘高僨疾之子優繇亶厚福澤衎衎施施燕樂飲食五十九年既豫既豐訖無艱虞以獲考終刻詩墓門昭示無窮錢均卿墓誌銘吾吳有道德純一之君子曰文懿先生錢公先生有兄子曰均卿其少也侍先生學當是時先生以經術為四方學士所宗仰弟子自逺至者甚衆均卿日在左右藐小若不勝衣而秀朗卓達每先生有所指授輒能不逆於心操筆為文辭尤雋永有思致又性度温密可親諸弟子咸愛重之相與游處如兄弟既而被選為縣學生嘗與輩類俱試郡中名第差後黙自念曰吾不熟耰而望穫可乎亟歸襆被入奥室塞墐其户獨留一牖以通食飲讀書晝夜不暫輟乃至發病家人破壁負出之病數月乃已蓋自是學日益進一再舉應天鄉試不中士子傳誦其所為文諸中選者自謂弗如雖先生亦為太息曰若之不第命矣夫先生既升朝官太常擢丞鴻臚以歸歸數年卒而均卿亦且老矣於是先生二子道卿文卿皆績學有名庠序間而均卿之子應龍繼起名尤藉甚均卿一日慨然曰余髪種種矣尚與兒子輩爭進取乎即引疾不復出督學使者聞而嘉之檄授冠服非其好也所居瀕漕湖繞屋種竹數百竿日徜徉其下有良朋至則呼酒共飲飲少輒醉醉則歌古詩辭折竹枝叩石為節間以象戲往往竟日㤀倦遇風日清美漾小舟湖中觀雲水交映魚鳥來親人意欣然樂之家産故薄有田不滿四百畝晩以分諸子益謝家事令無復關白而足跡不入城市雖鄰里燕集不數赴也性孝友事二親能備色養伯兄行迹頗跅弛極諫之繼以涕泣而終不失歡當析産父别授之田若干畝以資佔畢固讓弗取遇人翼翼恭敬平生無忿言厲色蹈義履方壯老一致人無賢愚皆信服之里有悍少年率衆造其仇家將甘心焉望見均卿在坐即逡巡為好辭引退語人曰吾不遇君子幾䧟於不義吾乃今知改矣其以德感人如此嘉靖戊申九月二十日終于家距其生成化辛丑闕月闕日春秋六十有八後闕年闕月闕日葬闕之原均卿諱徹世系出呉越武肅王大父腴贈文林郎太常寺典簿父賢母朱氏配樓氏子男五人應良慧而早夭應龍應元應登並校官弟子員最少者應召女二人適某某孫男七人女二人余以童子従文懿先生游今四十年數過漕河之上每接均卿則歎其風格淵雅而今不可作矣既為敘其事行又著楚聲以洩余哀其辭曰若有人兮湖之濱坐嘯咏兮蒼筠紉蘭佩兮蕙纕忽超舉兮乗雲蹇追逐兮臨湖而延佇孰揚舲兮其濟予蒹葭兮叢深鷗鷺兮來下湖水兮潺湲望夫人兮不還羌日暮兮徙倚攬余涕兮汍瀾顧反步兮丘阿鬱墳壟兮嵯峨嗟死生兮夙暮而反其真兮余何為愁苦風清泠兮宰木水洄洑兮高土宜子孫兮逢吉千萬嵗兮安悆先母胡夫人墓誌嗚呼吾先母夫人之卒至是十有五月矣其孤煥粲始克奉柩葬吳郡華麓山陸氏世墓啟先考府君之兆而祔焉粲以兄命輒忍死敘次夫人事行之略為誌納諸墓中吾陸世居吳之長洲為著姓先考府君諱應賓行義具少傅王文恪公所為墓銘夫人胡氏同邑祥符里人考諱琮仕終山西布政司右㕘議娶恭人闕氏無子有五女夫人最長自少明慧若淑誦小學女誡諸書能諳曉大義㕘議公竒愛之擇婿得府君因館於家公剛方介潔仕久名位不進而家益貧府君夫人年皆未二十相與營立生計間值儉嵗藜羮不糝與家衆同辛苦府君常戴星出入而夫人自内持管籥視出納治紡絡組紝無斯須自暇逸每乳子女在蓐僅三日即起操作冬夜雨雪従府君御燈火披校計籍至漏深雪簌簌撲窻紙盡穿破寒氣襲人肌膚為皴裂猶不暫息如是積十餘嵗家稍稍温贍而參議公謝政歸夫人日娛侍左右奉進饌具至他服用百需無不豐給公與闕恭人皆優繇以老每自喜曰吾無子賢於有子矣公晩被疾府君為擇其兄子為之後悉舉田宅授之别築室迎公及恭人以養比其終為治殮葬甚厚蓋夫人實贊相之常念先大父工部公大母王安人不得朝夕承事以為恨嵗時省候供饋孝敬尤隆篤云府君好為義舉夫人善承其意飯飢槥䘮多不勝紀諸凡祀饗婚嫁慶弔往來其費皆先事斟度使豐約中適下至僮妾衣履亦豫為飭治以時給之必均性識高朗臨事裁剸明决逺謀大慮有丈夫之志焉平生嚴潔自將起居進止咸有恒度閫政肅謐庭無譁言撫諸孤慈愛備至而誨之必以正自米鹽猥冗若戲媟無益事一不使經目府君喜讀史暇輒手一編得古人忠孝節義事為誦説不已夫人諦聴良悦時舉以詔子姓曰立身當如此矣嵗辛巳府君棄諸孤夫人亦病目䝉䝉不覩物然持整如故操聞人履聲即知為某某端坐終日内外無敢䦨出入者後數年粲舉進士被選為翰林庶吉士尋授給事中以言事再下詔獄報至家人惶駭夫人夷然曰吾兒為言官以言得譴固其所也吾何憂粲竟坐謫為都鎮驛丞稍遷永新令未幾乞致事歸夫人益喜曰兒幸不隳大節足矣安用禄仕為哉士大夫聞者皆曰賢哉母也嘉靖己酉十一月八日以疾不起距生天順辛巳六月九日春秋八十有九以又明年辛亥二月十三日葬子男三人長煥娶張次粲娶盛次采娶都繼鄒煥采皆由鄉校升太學采先卒女三人長適蔣璧次適王世榮次適姚泰孫男六人舒枝府學生本枝庚子舉人延枝培枝翹枝皆太學生敬枝尚幼女四人曾孫男五人女七人嗚呼以我府君夫人之仁孝篤誠而不獲胙於天府君纔及下夀夫人得年差永然早歴艱難中嬰痼疾其為歡愉之日幾何矣痛哉粲仕於朝嵗淺不及徼天子之封命為吾二親榮矧庸劣惰窳行業不立無以顯揚徒抱愍銜戚以終身而已夫人格言懿行著於家庭被於宗族婣䣊者尚多方求名筆以表揭墓道粲哀荒眩瞀弗能悉書也痛哉不肖孤粲泣血謹誌附七十夀序一首袁袠陸子浚明謫官都勻便道出吳下還上母太夫人夀袁生登其堂跪而進觴曰太夫人春秋七十矣幸無恙都勻去吳萬里羅鬼險惡浚明獨無意乎浚明曰吾王事也庸何傷太夫人曰爾命也庸何傷初浚明之官京師也太夫人嘗就養焉袁生以年家子嘗就拜堂下數問遺往來兩家事朝夕相聞知是故太夫人之懿行袁生知之獨詳故㕘議胡公愛太夫人特甚乃館如隱陸公於門下太夫人善事其親相夫子閫外内肅如其經營約束雖婦人猶男子也浚明於太夫人為仲子伯叔皆自邑庠升國學蔚有文譽浚明登進士高第與袁生為同年又同讀書中秘由是二人者特相暱善浚明高材篤學洽聞尤習知天朝故實而袁生者亦頗好竒負氣論議不相下至商㩁今古品藻人才浚明機辨警敏芒穎鏠銳證據曲中袁生未嘗不傫然聳聴自失也既而浚明拜工科給事中慷慨論列嵗終上數千言多見采納乃益自感奮譏彈貴勢詞㫖激直無少遜避兩下詔獄家人方共危之太夫人獨自喜曰吾兒言官職當言言而獲罪其榮多矣乃危之邪未幾竟逺竄太夫人終無怨懟曰吾兒慎之是有令名能無霣可矣縉紳先生聞之者咸咨嗟嘆息曰非獨浚明之賢乃太夫人者賢母也袁生曰噫貞士累至而行明忠臣時危而節顯浚明以書生昌言國家大事直聲震天下可謂竒男子矣然非太夫人孰能成之語曰居仁者祥多作善者夀昌使斯言而信太夫人之夀未可量也陸子餘集巻三
