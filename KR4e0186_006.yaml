body:
  text: 陸子餘集巻六明陸粲撰奉外舅盛公書得邸報知有陜西左轄之命雖官階所進不能以寸而事權之専體統之重乃逈然不同矣顧士大夫之望猶若未滿以為循資敘進非所以待公耳然居今之世拙宦而難進者正未必不佳也至乃謂公宜稍易素守濟之以通則粲竊惑之夫為是説者非以禍福為心乎而禍福實非人所能與力者聞之昔人杜征南在襄陽數餉遺洛中貴要語人曰吾憂其為害耳非求益也至辛佐治乃不肯諂孫劉曰不過使吾不為三公耳此二言皆非也征南陋矣佐治之言亦未為有見者為公與否此身中自有定分孫劉何為者哉先正楊文懿公在館閣最晩達貴近或遣人風意公謝曰我嫠婦也守節三十年矣肯白首改節耶由今視之此言殆為公設乎每以語人首肯而心不然者多矣近欲作數百言奉賀中亦略道此意㑹病弗果然凡所稱引自公所知而復有云者欲達斯義耳漸熱惟保練以膺大用不宣奉太常錢先生書違教踰年不識尊候何似目眚得復豁然否比聞抗疏論列皆人所難言者世之軒眉髙視自詭豪傑其中大抵恇怯無能而癯然寒素如不勝衣者所為正爾落落此未易為流俗言也方當宁虚懐延納之日草茅疎賤欲攄忠益而無翼奮飛懣不得吐者何限先生此舉豈獨使寒蟬之徒愧死而已江西事辭染獻吉朝廷何以處之昔人論孔北海謂當時復有魯國一男子慨然爭之公庶幾不死今日亦有若人焉矣乎吳田向者頻厄於水今嵗乃復憂旱豈往復相勝㣲獨人事雖天道亦固然耶匆遽不備與李仁甫書自丁亥嵗暮言别迄今三載不復聞問縣縣之懐知彼此同之也僕以疎戅獲戾清朝期月之間再下制獄猶䝉異恩得全要領雖沈淪異域固没齒之幸矣惟昔與兄輩周旋玉署行則聨袂止則同席以為燕燕之樂當終始相保而不幾時雲散四方邈焉隔絶俛仰今昔傷如之何比得子潜書知子忱物故敷言勒停景仁削籍同館之厄并於一朝念之未嘗不涕泗交頤也僕仲夏始達貶所地極荒惡而傳亭久廢鞠為丘墟因僑寄此城賴上官不以職事見訶飲食之餘慚悚而已兄卑棲逺邑旋遭大故嵗月徂邁行復即吉計非久趨朝道當出此斯亦天假之良晤矣輒投空牘以當要言未奉徳音努力自愛與聶文蔚太守書兩月來不接𤣥度伏計道履康勝為慰粲自吉水回縣病痔病泄宛轉甚苦歸心益切而未敢申乞者以近日之事嫌有忿懟不平之意耳然野心如麋鹿雖在闌檻而神已馳於豐草長林間矣昨亷夫傳道尊意謂粲不宜遽有此念斯言是也第區區不得已之情在公容有未悉者不敢不一陳之粲多病早衰不任繁劇居此一嵗百務叢脞耳目心思之所弗及為民病者多矣宜去賦性迂疎於世故人情全不通曉遇事任性而行無復還忌若此不已将重得罪於人宜去母年七十有三而失明妻死三載喪尚在淺土弱子幼女㷀然無依凡此皆須身自料理者又宜亟去負三宜去而不果於去遲回至今雖得去亦既晩矣而公猶謂其早邪然此意亦未嘗敢為不相知者道喋喋至此恃髙明之能見信耳近得家報吳中事多如昨惟王履吉以四月終下世恐所欲知故敢附聞餘不備與華修撰子潛論修史書得手書知奉明詔将重修宋元二史甚盛舉也粲也聞之君子曰班固死天下不復有良史矣魏晉而下古意寖㣲然其辭之鄙近猥冗則莫有甚於宋元之為史者夫自孔子修春秋猶援据百二十國寳書馬遷為史記既紬金匱石室之祕又旁采羣籍以就之故凡有事於史不先汎觀博取而能成一家言者未之有也今二代之史乃獨據其當時所謂實録者云爾而實録所據又不過諸家行状碑誌之屬行状碑誌之辭能盡善乎是非善惡能盡公乎乃至全篇載入不復刋削如元史趙孟頫傳曽祖某宋某官國朝贈某官祖某贈某官父某贈某官直當時誌文中語耳此類頗多姑舉其一又不問其人何如凡階級稍崇者輒為立傳其間直敘官職遷轉而事蹟寂寥如一由状然故其書巻帙雖數倍於前史而文辭乃無一篇可與陳夀以下諸人爭衡非但筆力不逮亦以紀載過繁難於撿括故也其他紕繆又不暇悉數今必痛掃去之自立機軸先廣開獻書之路求諸野史小説雜傳記詳覈其異同之故準司馬公通鑑考異例為一書使統體既定然後下筆大抵以正史訂雜書之繆以雜書裨正史之闕凡其人之碌碌不足傳者事之瑣屑者奏疏之冗長而空言無實者皆略去之期於繁簡適中是非不謬而已若祗用舊本竄易首尾姑以了事竊恐後之議今猶今之議昔曽不若姑仍其舊之為愈耳然二書體大自非在上者優假嵗月無求速成而諸君子當事者能任為己責不肯虚過日時則未易為矣至其文體且當以平正通達為主不必如今之為古文者務為艱深詭異之辭反使事蹟鬱而弗明此最大忌也當聖明在上垂情述作諸君子遭不世之竒㑹豈徒受大官酒食藉此為陞轉之計苟且塞責而已哉兄何不與文升輩二三同志以此意昌言於朝使二史之成追蹤班馬為千載之一快也時難得而易失竊重為諸君子願之粲病廢之餘棲伏林壑弗與世事黙黙久矣偶感觸輒為知己者一道惟弗以為迂而俯聴之且無使不相悦者知斯言之出於我而重得罪焉幸甚與岳厚夫書自己丑臨清之别闊焉不聞問者殆将十年歸田以來益與世暌隔海内故人如吾兄輩不獲一握手恨恨如何遥聞守官曲沃猶慷慨疏論邊事丈夫經世之志不以崇庳改易正復爾耳僕鄙人也自惟迂疎之資不適世用甘守一壑無復他望近者不幸為匪人所薦深用愧憤追惟往日與兄冒死進言幸而聖心頓悟國論稍回此正世道開泰之㑹而斯人者忍倡邪説以壊之使憸邪更進重為善類之禍其罪上通於天矣雖其後來或一二能立異同然不過怙寵爭進之私寧有忠信亷潔之實乎藉令萬有一亦所謂舍簞食豆羮之義耳何足道哉世之君子以其小者信其大者更稱為賢僕嘗惡聞若説乃今復欲以腥臊之餘汚辱貞士如僕死即死耳肯以是區區者易吾初心邪每中夜耿耿思一吐露於同志頃嘗以告華兄不知能達諸左右否也巡按徐侍御過訪傳道吾兄寄聲深感不忘久要之誼因便聊布所懐屬有先弟之喪哀苦中言不宣盡答鄧文度省元簡前嵗暫接清論獲遂廿年傾仰之懐良以自慰病冗久闕上記承枉手教讀之知以縣志事横被怨疾良為公憤歎夫直道之不諧於俗久矣非獨行已然也至語言文字為甚昔人謂孔氏修春秋㣲辭以避患難太史遷亦云刺譏褒諱抑損之文辭不可以書見也僕始疑之以為不然乃今知其有意耳是故賢如昌黎公作永貞實録猶為人指摘卒竄定無完篇况風俗靡薄如今日哉公之得此殆不足恠傳云禮義不愆何恤於人言惟公以靜勝之公論久當自明若稍復周章秪増多口為俗子嗤耳使者告歸甚急屬有賓客之事志書尚未能展讀暇日将卒業而請益焉自惟卑賤言弗足信儻遇相知者敢不為公一伸眉論之諸留續布不盡與楊用修太史書粲自羈貫時誦公文章已深嚮往及壮登仕與令弟用徳為同年又同入館每從詢公動定之詳以不獲侍教為恨其後自諫省謫都勻間於一二士友家覩公手書滇中諸作良用歎服歸田以來始得轉注古音略讀之為不忍去手竊謂此義自漢迄今學者皆尊信許氏之説莫覺其非雖趙撝謙嘗言之而未盡惟公卓然有見於千載之下獨持偉論成此鉅編其曰中夾漈之膏肓而起叔仲之廢疾者雖自謂可也甚盛甚盛第其間猶頗有可疑者粲也過不自量嘗欲書之以請質焉顧先達如公以命世豪傑之才而濟以精詣博洽之學論議所及前無古人其著述豈晩末所當置喙是以遲回未敢遽出其説既而思之此書闗繫至大苟纎㣲不盡便成千載之憾所謂不欲以疑網墮來哲固公之盛心也不勝愛莫助之之願用敢忘其固陋而卒陳之惟公察焉夫此書既為轉注而作則當依許氏説文之例以字之偏傍為主凡其轉聲皆疏於本字之下庶幾綱舉目張一覽可盡迺今置偏傍而用韻則有難言者矣蓋一字而每韻皆見則不勝其煩獨於一處説之又未能曲暢如後語所稱再轉三轉以至八九轉者今此書能盡之乎令後來者討尋而莫得其源流恐不免有遺議矣此愚之不能無疑者一也謂傍音叶音皆轉注之極此至論也傍音姑弗論若叶音則吳棫韻補具矣其有譌繆闕遺不妨拈出或附見於後如古音餘之比可也今摘取其一二以羼入諸韻則未知其義為轉注乎為叶音乎其他不録者豈盡無足采乎去取之間當必有意此愚之不能無疑者二也古文竒字如東韻之㔮支韻之􅣺虞韻之䓵􅂒者諸篇中往往見之此等蓋不勝紀載誠欲扶㣲廣異自可蒐輯别為一書而以雜之轉注之列則恐非其倫類也與序文所謂匪徒逞博棼累巻帙者其指得無少異乎此愚之不能無疑者三也其他援證字義或千慮一失尚有可商確者間亦隨文箋注别録以備省覽敬託時川公為之先容然粲猶竊愧懼不敢自安深惟著述之功創始者難而求備之論後出者易矧以粲之譾薄寡聞而輒議及此誠亦僣妄之極矣所敢自同季緒以犯公家徳祖璅璅之譏亦恃公曠度髙識不翅能為丁敬禮也如或恕其狂愚貶示可否使積年之疑一旦冰釋則鄙人之幸大矣非所敢望也惟公實重圖之滇載記方謀校刻俟完即寓上舍甥姚某之官重慶便冒昧布此臨書悚側不知所云答天水胡公書去秋費兵部民獻北上粲嘗有状附上管記手書嘉貺頻嵗洊及領之竊深慙感伏承委撰樂府序文顧粲之鄙劣何敢當此屬有先伯父郎中公之喪方寸不寧容稍定為之不敢負也附録一巻自一字曲以下似尚有可説此諸篇寘之他集自不害為佳作将以尾樂府之後則未稱耳柳河東有言以淮濟之清有玷焉若秋毫固不為病然萬一離婁子眇然晲之不若無者之快也辱公知愛之深敢僣論及此死罪死罪華泉公集編次尤不滿人意平生所見此公好詩多不在而所録乃有甚不逮者如送周子庚使遼左一篇出使比蕭何之句此今之粗知詩與能讀漢書者所不道殆必非公作也辛巳書事七首乃王履吉之作亦混入其中恐更須一校勘何如違逺無由侍教臨楮不勝依依答黄材伯侍讀簡辱手教云方輯翰林志如粲晩學寡聞無能為役獨有仰賛速成兾得快覩而已然竊有欲言於公者武功徐公一代人豪也其生平建立具有本末近時挾私造謗者以于王之死歸罪此翁吠聲之徒不察從而附和輒加醜詆粲每見前輩如守谿南濠衡山諸公論及常為憤惋不平竊欲作一書為翁辨誣自惟文筆短陋人品凡劣雖言無以取信用是因循未果今於公寔深有望焉所願於傳中一為伸雪令翁有知不復抱恨千載則此志真不徒作矣他書未暇悉考獨李文達公古穰雜録所記最為明據蓋文達與武功極不相能其書中亦多所詆訾獨記于王之死無片辭及之可見公論有不容泯者鄉使信如或者所言文達肯為之隠哉今録一通以往即此亦足以破羣妄矣惟公留意委訪諸籍僅得數種緘上近見四明黄南山溥集有袁尚寳行状頗及革除時事輒録以備采擇所諭王玭者考敝郡志科第表乃嘉定縣人字徳瑜永樂甲申首科進士官監察御史江西僉事志中不為立傳未知其人如何當更詢之彼縣人耳粲近作左傳附注史記通義皆粗有次第恨證據未廣别具書目凡公所有者敢丐借録千萬匆冗不備答王濟美提學簡久不奉德音良切企慕伏承不遺鄙劣特貶手書以性對一篇示教粲昔者嘗謂古今論性惟孔子數語盡之聖人之言平實切當自是如此先儒以相近者為氣質之性至於下愚不移乃用自暴自棄者當之似皆未然竊欲以此意見之論述而未能也乃今得公此篇明白詳盡凡愚心之所欲言者皆具始知豪傑之見已先於我矣輒用歛衽興歎而坐病冗久稽布復罪甚他所擬請質者尚多何時得侍坐以畢此願也頃聞北兵以數百騎入蹂内地京師為之戒嚴今既使得氣去矣将來有深可慮者吾儕雖藿食能無嫠婦之憂乎隆冬兾為斯文善自将䕶不悉與呂侍御信卿書舟中獲奉燕談從容竟夜返舍旬日重拜大貺之辱伏惟明公體方雅淵懿之徳居整裁人物之地而情存沖挹勞謙下士小人凡劣猥受眷知屬頻年亢旱公憂念民物為之貶食絶甘疇咨方略而粲秉性顓愚闇於世務雖數承訪逮曽不能少攄志慮輔益尊明内愧而已比日炎暵滋甚禾稼焦巻疲農餓夫束手待盡今欲興發則官無見儲獨有平糶勸分是其次䇿若任屬良吏擘畫有方亦當不至苛擾而所司恫疑顧望卒莫舉行無乃自愛過於愛民恤富人之怨甚於憂貧弱之死乎當此之時百姓嗷嗷待公舉火聞諸道路謂已奏假京儲以充賑貸且請蠲除常賦此當由仁明獨斷非齷齪守文之吏所能仰贊也或者謂公前此已嘗抗章得請今再舉懼瀆且慮版曹之議或有異同将不免譴郤斯又不然夫論事顧其當否耳寧當逆計成敗以為作輟哉竊觀明詔以災害荐臻元元饑敝勅在所賑贍距今未兩月也惡有聖情懇惻若此而主計之臣顧弗将順者乎東南國脈所存自頃求魚竭澤不為長慮今凋瘁極矣復不少存卹之猝有獸窮思攫變生意表計其所喪視所蠲發奚翅什伯而已公能以此意精為天子大臣言之庶幾開許令曠蕩之澤霈然下流溝壑殘民一朝更活其功徳豈有量哉惟公實重圖之承諭以粲嘗窺弄文墨将使効薄技以佐燕閒之娛伏自惟念蕪鄙之辭不足塵累省覽是以逡巡未敢薦其敝帚而邑大夫趙君重致尊指不能卒辭輒編寫舊所著文及在省中時奏草一二用獻諸左右未發之間慚懅彌日前所上先姊傳文儻不終棄斥一惠咳唾令區區者得依託鉅麗以傳無窮粲之願也非所敢望也干冒尊嚴無任悚悸不宣與羅状元達夫簡粲往嵗赴官永新於舟次獲遂瞻承忽忽且二十年矣公道徳聞望為海内學士所宗仰自少有知識者猶願承緒論而粲慵惰因循不及時以竿牘自通於左右獨嚮往之志則未之敢忘也自惟資性闇劣心氣麄浮雖窺竊陳編㣲有管穴之見然望道逴逺竟亦自崖而反又弗能親就髙賢與相切䃺乃今白首無成恒自傷悼恐一旦溘然便同糞壤蓋仲尼恥五十無聞屈子亦悲老至而修名不立粲每念及此汗未嘗不發背沾衣也頃復遭先母棄背銜哀苫土苟存視息屬石磐公令子行因輒寓状少布區區左氏春秋鐫兩册附上用備覆瓿他所欲求正者且有待焉儻執事能貶示教言一二則又望外之幸矣愴怳不次與永豐聶公簡暌逺道範積有嵗年冗惰因仍久缺上記遥聞我公横遭誣搆逮繫請室使草野之人竊懐悁憤然不幾時則彼之怙勢忌賢者其氣燄如石火電光倐焉消滅而我公貞心諒節乃益用章顯粲嘗竊為人言雙江公猶鏡也每被磨瑩皎然益明耳伏承事白南還過吳粲以所居僻左浹旬乃聞則尊舟既逺矣懊惋無及二三友人復傳道公惓惓垂問之意益重慚感粲積惡招殃延逮先母於去冬奄忽謝世粲亦遘危疾雖不即死然為天壤間罪人直戴面强行而已石磐師乃子歸輒附承起居左氏春秋鐫兩册併寓上改教苫伏荒迷言不倫次與王道思參政簡不共談對十餘年矣兄髙蹈海濱韜養沖邃文章行業當世所共尊仰甚盛甚盛粲性資猥下方少壮時其志所欲為者無窮而窳懶玩愒弗自彊勉今顛毛種種百無一成雖耽悦文史未渝故習然精力已大耗減每展巻有得亦復欣然㑹意不數日旋即遺忘或操弄鉛槧有所述作他時更取讀之乃如啖木酪了無適口之味田光有言驥之老也駑馬先之况本非驥乎固知古人惜盛年之難再圖美業之蚤成良有以也交游中如永之文升皆少粲八嵗已奄忽化為異物粲之衰劣能久存耶去冬不幸先母棄背方忍死勉襄大事今春已遣嫁妾侍以家務委之兒息後此儻未即填溝壑當卜築先壟之旁不復與人世相聞矣近從子潛兄讀泉學筍江二記得窺髙藴知瑰瑋之作尚多令鄙人時復與觀焉斯所深願也左氏春秋鐫粲謫都匀時著與舊文數首俱往求教淺易直率之言視大方家詎可同日語寔藉以要瓊玖之報耳子元兄行布此别楮所求尤兾留意幸甚與尹崇基太史簡里人張醫士歸自京師獲拜手書及香帛之賜不勝哀感頃欽子辰工部傳道兄相念至情世務方殷非豪傑之才孰與匡拯區區衰朽昏塞兀若橛株假令得乗一障亦無以效其尺寸矣兄知我者何復云云聞雙江輩數君子相繼召用甚慰然粲嘗聞龔遂之治渤海也言於朝曰請丞相御史無拘臣以文法得一切便宜從事虞詡為朝歌亦告其郡将曰兵不厭權願寛假轡䇿勿令有所拘閡而已今之用人者能若此庶幾諸公有展布之地不然吾懼其難為也野人間肉食之憂大非所宜獨私於兄發此無令不相知者聞之恐重増口語耳病濕足胻痠痛枕間蠠没作啓不次與蕭太守國材論家禮纂要書承批示家禮纂要已隨條改正有可商㩁者數處具列請教如左一昏禮親迎原註云近則迎於其家逺則迎於中途來教云中途無儀節欲補之右考伊川止云逺則迎於其館無中途之文朱子亦云令妻家就近設一處或出至一處就彼往迎歸行禮觀此則既有所館其儀節自當與在家同矣若女家當告祠堂則主人前期告而後以女行至館則不必再告矣如何惟醮女之禮未知當行於家或行於館請裁之一卒哭之祔來教云考祔殷禮既練周禮卒哭孔子善殷而朱子從周從周者以類也程伊川有言喪須三年而祔若卒哭而祔則二年却都無事了且禮卒哭猶存朝夕哭若既祔則無主在寢哭於何所張横渠亦云喪須三年後祫祭於廟遂奉祧主歸夾室遷主新主皆歸廟此程張二儒皆不從卒哭而祔也文公亦嘗謂横渠此言似得禮意故於家禮告祔於卒哭而祔廟於大祥蓋兩從焉雖然禮順人情因時損益若卒哭告祔至大祥方祔廟則相去将二年而絡繹成兩祔非人情矣不如直以大祥之明日祔廟若為宗子則改主遷主祔主同日行之亦因時損益人情簡便右考家禮卒哭而祔其末云祝奉主各還故處註云納亡者神主匣之反于靈座楊氏復亦曰司馬禮家禮並是既祔之後主復于寝觀此則雖告祔而神主猶未入祠堂待三年之喪畢而後遷正來教所謂告祔于卒哭而祔廟於大祥蓋兩從焉者也又按禮記檀弓註藍田吕氏曰主人未除喪主未遷於新廟故以其主祔藏於祖廟有祭即而祭之既除喪而後主遷於新廟愚意古者一世自為一廟則此禮可行今之祠堂四代之主皆在一處則所謂有祭即而祭之者窒礙而難行矣此朱子所以雖從卒哭之祔而必反主於寝也來教兩祔之疑愚意亦同况卒哭之祔祝文既云適于祖考某官躋祔某官則是已告祖考以當祔亡者之主矣然其主乃不入祠堂而復反于寝祝文之意無乃虚乎此其失又不但兩祔之非人情也竊謂有程張之説可據則如來教大祥而遷祔之議似亦無悖於禮但家禮大祥前期一日告遷于祠堂改題神主厥明行事畢祝奉神主入于祠堂所謂厥明者即祥祭之本日也今來教欲用祥之明日而改主遷祔同日行之未知何據更詳之一家禮大祥註問子為母大祥及禫夫已無服其祭當如何朱子曰今禮几筵必三年而除則小祥大祥之祭皆夫主之小祥之後夫即除服大祥之祭夫亦須素服今按此説是矣但謂几筵必三年而除施之妻喪則恐未安蓋小祥之後夫既除服則几筵亦當徹矣雖子之服未除然以父為主故也請裁之一土地之祭今按時制有里社土穀之祭所當遵行則土地之祭似為重複雖朱子大全集有之而於古禮無據恐當刪去若鄉厲之祭則是時制亦當存之俱請裁定一吕氏鄉約禮俗相交尊幼輩行造請拜揖請召送迎之禮右鄉約内雖已舉其大綱而儀節未備愚欲刪節其禮附於四禮之後謂之居鄉雜儀或謂之相見禮如何一六禮纂要有鄉飲禮今按㑹典各里長人户亦行鄉飲禮恐當依式増入如何與太宰羅公論困知記書去嵗臘月間永新王主簿朝覲過蘓以公所寄教劄及困知記至伏承下問以記中所未安者此豈末學淺見所敢妄議前此亦嘗反覆潛玩覺得辭義皆平實無疵間有一二俱非大節目所繋謹逐章開具如左以效愚慮之萬一以仰答我公之盛心狂僣之罪自知莫逭無任悚惕伏望一一詳加鐫諭以祛愚惑幸甚凡言心者皆是已發一章朱子中庸序中道心為主人心聴命之語愚嘗疑人心一也若有一心為主又有一心聴命似有兩心也近見陽明先生答徐曰仁蓋先得之矣公與劉貳守書中亦用此語何邪竊忘其狂僣欲更之云必使道心常存而人心之發每不失其正焉如此較穏不知是否能者養以之福一章今漢書律厯志引此語正作養以之福顔師古註之往也往就福也孔穎達左傳正義亦云往適於福也蓋古本自如此然今本養之以福猶曰養之以致福爾於義亦通但杜預註此云養威儀以致福則恐非是竊謂養是養所受之中蓋敬慎於動作威儀之間乃所以養此中耳通書四十章義精詞確一章通書之言固為精確但朱子謂其皆所以發明太極之藴則恐未必然而愚之尤不能無疑者愛曰仁以下數語也如韓子原道言博愛之謂仁朱子譏之以為語用而遺體今周子指愛為仁何以異此朱子之解獨謂有是五者之用而因以名其體斯言也其亦善於回䕶矣無乃未足以服韓子之心乎中也者和也中節也天下之達道也此語亦可疑不然則和也之上當有闕文天道之變盡於春夏秋冬一章此章似乎回䕶邵子然邵子之説愚實疑之其書每以皇帝王伯道徳功力並論是惡可並也以春夏秋冬配易書詩春秋然儀禮周禮皆經也獨無所配邪生生長長收收藏藏皇皇帝帝王王伯伯等語殆不成文理又如謂揚雄太𤣥見天地之心老子得易之體孟子得易之用此等語皆不純正至於元㑹運世之説尤大可疑信如其説天開於子地闢於丑之後歴一萬餘年而人物始生以至伏羲神農未生之前凡歴三四萬年而後聖人出此三四萬年之間無衣裳宫室無禮樂政教不知何以過日生人之類有不殄滅者乎自書契以來至今纔三千餘年中間世道升降變遷已不知其幾乃至數萬年之久皆為洪荒之世有是理乎邵子之所謂數學者如此宜二程之不願受也愚為此言非欲詆訐先儒直有疑於心而不敢苟從耳或問楊龜山易有太極一章龜山所謂中恐是指未發之中言蓋寂然不動之中固太極之全體也若作中央之中看則恐未當漢儒以皇極二字作大中解朱子深非之然則太極之極獨可作中字解乎此處恐當更著一語以補龜山未備之意如何梁武帝問逹磨一章逹磨宗杲皆禪學之髙者故以造寺冩經為人天小果以看經念佛為愚人其意不過欲人學其所謂上一乗法在彼教中髙處走耳恐非所謂人心天理不可得而泯滅者也此語似更宜斟酌陸子餘集巻六
