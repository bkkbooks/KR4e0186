body:
  text: 陸子餘集巻一明陸粲撰注荀卿子序陸子曰吾讀荀卿子書髙其文辭而怪今之君子之好之何少也或曰荀卿者意廣而為學濶疏議論大抵矯亢失中又時譏切孟子以故近世儒者或頗黜其書吾亦甚恨卿之不遭孟子也使夫得游従焉與相切磋而去其蔽則卿固可為醇儒哉然自孔氏沒七十子之徒散亡既盡教益衰學士大夫爭騖於權利而卿獨脩先王之言卓然不阿時好彼所謂豪傑士也非耶戰國之世儒者阨窮孟子既困於齊梁以終而卿亦老無所遇晩乃適楚楚既衰矣而黄歇當國未見其有可仕者也方天下日被秦虐吳之故墟去中國稍闊逺兵車不及卿将託焉以卒老歟非有意於干歇也卿没後李斯相秦以并天下斯雖嘗游其門而卒叛去乃用異説以殘民廢先王之道蓋其徒之不肖者也而或者謂卿之學有以使之夫學焉而失其真自孔氏之門不能無雜而獨卿歟其師善醫其弟子蓄蠱以殺人非師之罪也議者以斯故病卿亦良過矣卿之書三十二篇其禮樂二篇多戴記中語餘篇自大略以下文辭不類往往雜見於家語諸書中将後来者勦焉以附益之乎余竊感卿以李斯故被汙衊因取其書粗為校定其章句又頗以已意訓釋之以俟夫讀荀卿子者濯纓亭筆記序故紹興郡學訓導戴先生著書一編曰濯纓亭筆記余為緒正譌闕除其復重離為十巻華學士子潛取而刻之戴先生名冠字章甫吳之長洲人也少頴敏篤學始游鄉校已刻意為古詩文博覽無所不通而伉爽負氣髙自許與不能詘折徇物八舉不中以貢上禮部入試内廷奏名第一然例止得學官王三原自廵撫江南時則愛重先生及是方掌銓先生貽之書條刺十事皆經國大務語不及私三原為斂容降歎李長沙為學士亦竒其文皆不及薦也在紹興久之與貴人語不相下棄官歸年七十一終于家瀕終猶歌吟不輟既而嘆曰天夢夢乎世掝掝乎仳倠擁楹娵奢斥乎矯䖍駟駕隨夷踣乎已乎已乎豪傑者廢死乎聞者悲之先生早有志用世自兵農水利之説靡不論究既連蹇弗試益洩其感憤於文辭廉峭精確多所風切平生未嘗一日廢書不觀得竒文奥義為抵掌自喜輒命筆識之是編所存僅什二三蓋非其至者然其扶樹教道繩枉黜邪之指亦略可睹矣君子曰夫士苟有以信於千載雖長隕溝壑不為辱也太史遷有言俶儻非常之人意有所鬱結則退論書策以舒其憤思垂空文以自見若戴先生幾是耶余少則知慕先生感風流之日遐懼遺文之泯墜爰敘列大校令後来者得考覽焉先生嘗作禮記集説辨疑未竟今掇其存者若干章附之編末他所纂述若詩文集尚數十巻藏其家平越西劉氏族譜序劉竒氏譜其族陸先生觀之曰不亦善夫不亦善夫夫譜也者宗法之遺意也昔者先王因生以賜姓胙土而命氏以重本始辨系類明親疎也小大之宗源流秩然㒺有殽雜故仁讓行而天下密如也及其衰也猶有譜牒焉以識夫始終分合之故使無忽忘而已洎乎末世譜牒淪廢族姓滋舛故士有服冕乘軒而其族混於甿𨽻莫知收恤者嗟乎先王之禮不行而民之散也久矣其孰能修而合之劉氏之先望於汝南自宣武君聚從髙帝戡亂以功延世賞其子義始奉詔徙平越人稱西劉氏至竒五世矣乃為之譜竒可謂有志者也余也聞諸君子曰宗子之法立乃有世臣信哉斯言也今國家自通侯以及列校㒺弗世禄然於宗法猶未遑及是故奢麗同流而象賢濟美之道闕焉夫變俗者庸衆之所驚也復古者中士之所難也必也為之以漸則莫要於為譜矣譜立故分明分明故義達義達故仁讓之道著而宗法可行也竒也為此将無意乎俾世禄之族胥慕而效之禮其有弗興乎故序之以勸有禮也怡老園燕集詩序歲辛巳四月之朔少傅太原公張燕于怡老園之池亭門下士侍坐者凡八人是日風融日舒樽几潔修囂塵俗慮若遁若避無自入焉時憑髙而望則秦餘杭以西諸山間厠隠滅於城堞間若其合形效伎而来也酒半公取杜少陵句分韻命人為詩一章章次第成復移飲於清廕堂適他客有善歌者酒至則歌以送之談詠間發竟日乃罷公曰樂矣今日之㑹也可無述乎於是潁川陳怡取諸詩聨為巻以授粲曰子盍有以復於公粲也聞之昔之居大位者患不能退即退矣有物焉役之則其身且不暇而何有於樂若夫養尊自髙倡焉而莫與和者又不論也公為三公年未及衰巻懐早退徜徉湖山樂亦甚矣而𢎞厚特達汲引後進恒若不逮四方之學者莫不思操几杖以従公游若今兹之㑹雖游從之常而諸生於是挹清飲醇固有不言之教無形而心成者矣可不謂樂乎昔裴晉公晩居洛陽與劉白輩窮晝夜飲午橋緑野之勝至於今人能道之然或者謂晉公蓋覩時事之不滿人意故託焉以自晦也雖樂而憂存矣今之時非晉公時比也公其何憂然古之大臣憂時體國固有身江湖心魏闕者而公豈遂恝然於此哉是故意興感觸形諸篇章者屢寄其忠愛之誠焉孰謂公之果無憂也夫公之憂憂以天下公所獨也吾徒其何敢與知若夫樂則與衆同矣雖然有獨樂者焉非游従文字之謂也公且不能自言而吾徒又何足以知之粲也不敏敢卒書以請焉作怡老園燕集詩序送同年戚秀夫知歸安序全椒戚秀夫以進士拜湖之歸安令湖在浙西為名郡歸安其上縣也其地當吳江之陽震澤之隂昇山在其東何山在其南卞山直其北武康長興諸山屬列環嚮蛇蜒起伏姢好秀麗其水則苕霅諸溪流衍灌溉為利甚博其土宜桑稼又多菱蒲茶苧之産木綿文綾衣被天下其民朴而務本愿而不爭其士秀敏而好學王逸少謝安石顔魯公諸君子之流風遺教猶有存者乎何其俗之美也臨是邦者為政宜若易然而在今日猶病其難何哉自頃年来東南諸郡數罹水旱公私之力大抵困屈微獨湖為然也役大而民勞賦繁而財窘長民者一身而百責萃焉信其有不易為者乎雖然吾聞古之君子将有為於天下其始必自夫難者試之進士為縣仕之始也雖當其難亦有志者所不辭矣今之為縣者治不一二年則諰諰然欲亟去之勇於取名而怯於為義巧於奉上而疎於得民前規後隨以為當然使夫王澤不宣元元滋困非以是故與抑所謂有志者何世無之意其誠心經理如古循吏者或亦有人焉而世特未知也秀夫君子人也貌温而荘言慤而慎推是為政其行古道而不襲流俗之風决矣當斯人之憔悴在上者苟有意焉足以使其惠朝布而暮及又况民風土俗之厚若歸安者乎其亦易治也秀夫往哉難不為沮易不為怠惟政之善不惟官之達則歸安治矣浙江鄉試録序嘉靖戊子秋八月浙江鄉試給事中臣粲郎中臣鑰寔奉命主之臣粲竊惟浙江古揚州之境而今之首藩也粤自我皇祖起南服定金陵遂下浙東西諸郡方國家草創日不暇給而崇禮樂考文章搢紳先生出入風議訢訢如也其間二三耆碩叅侍帷幄者大抵皆自浙起以博學贍辭潤色鴻業於是皇明之號令典法炳焉與三代同風而浙之文遂先天下粲不佞嘗好觀國朝故事而知其槩矣乃今承乏考校始盡得其賢士者之文而縱觀焉有取之無窮而讀之不厭者信乎其為盛也於是知皇祖之澤逺矣雖然文者道之華而行之飾也昔者孔子稱周之盛曰郁郁乎文哉他日論禮樂則慨然思従先進又曰我於辭命則不能也非謂夫文之有本哉由周以下言文者必曰秦漢秦漢尚矣近世以文取士宜莫盛於唐時則有若陸贄者司考校而韓愈輩出焉天下至于今稱之然愈嘗自言其當時程試之文以為讀之使人忸怩而已耳其信然乎抑有激而云爾也夫唐之文初亦失之靡矣自愈出然後一振之以復於古彼所謂豪傑之士者非邪而其始也微贄孰能知而取之我國家稽古立法以經術造士百六十年治教熈洽文亦日趨於盛學士大夫操筆伸紙類能達其所欲言者顧藻飾有餘而朴茂忠實之意視前輩若少衰焉當是時其亦有豪傑者出而振之而司考校者亦能知而取之乎聖天子方篤意教化屢詔所司選師儒嚴條約将責士以有本之學而非直曰文云者故屬者之舉雖有司存而特簡近臣涖之意嚮所在昭然可識士於是時有弗自奮也者非夫也况若浙之嘗以文先天下者哉将必有異才焉如愈者卓然出其間乎得若人以稱塞明詔則司考校者之責任亦無負矣而愧無贄之明弗能識也抑所謂公無私者或庶幾焉爾矣是舉也同考試則學正某某教諭某某某監臨則廵按監察御史某提調則左布政使某右布政使某監試則按察使某副使某士就試者二千八百有竒預選者九十人刻其文之優者二十一篇合諸執事姓名為録以獻粲序之靜芳亭稿後序少司馬髙吾先生陳公有文一編曰靜芳亭稿自武陵以寓粲粲既受而卒業為之歎曰於乎善言哉公楚人也昔者楚在春秋時為大國號多人材若申叔時聲子子革薳啓疆王孫圉之徒其辭令雍容著於傳記者爛然成章矣蓋有先王之遺風焉是後則有屈宋唐景諸子以詞賦著稱渢渢乎亦風雅之流亞也由漢以来作者間出明興百年人文宣昭至於憲孝之間盛矣時則名卿大夫之楚産者若茶陵華容郴州諸公咸以渾厚博大之文震燿海内武陵在湖北之境去中州數千里公奮起其間振華發藻與數公者殆相頡頏焉今即是編觀之其辭大抵質而雅簡而暢盡而弗汙無艱深刻削之態而思致不窮非善言者其孰能之乃其指事切理確然可著於實用者則公經世宰物之略亦往往而在君子謂不徒文而已也矧獨曰楚人之辭云哉抑嘗聞之君子之學惟靜故専惟曠故達公自謝政家居不以世務嬰心結廬髙吾山下日諷詠游適其間葢所造詣益深以粹謂夫有得於靜與曠也非歟自今公之著述殆将日富是編者曰為之權輿可也雖然讀是亦足以知公之所存矣贈訓導嚴用文之官寜海序正徳間中丞恒山張公以御史奉璽書督南畿學政公修政彊執不受請託黜陟明允一時士類畏而仰之若神明焉嵗乙亥按試吳中時則吾長洲之士在優列者五人而甫里嚴君用文名第一公亟稱諸人曰此進士才也於是君之聲譽一日隠然動江左所在傳誦其文咸曰此進士才也然君數竒屢試於鄉不利頃以貢上京師廷試日翰林華侍讀子潛閔編修師望閲其巻驚歎曰貢士中乃有斯人既而從銓部選得分教山東之寜海州諸嘗與交游者爭惜之謂如君之才寜不能自奮科目而僅得此雖君亦何能無不豫耶粲聞之竊以為是未為知言者夫科目之不足以盡人材也久矣今之仕者大抵重進士得之者侈然若有餘不得者歉然若不足由君子觀之直如博者之於梟其中與否有幸不幸耳曾何足置欣戚於其間而士顧以是自為輕重世亦従而輕重之也非惑歟士貴有諸已誠有諸已也彼在外之得喪吾何知焉君胡為不豫寜海古齊地今為東方大州負海阻山人物殷盛吾意其俗之闊達多知而好經術矜功名猶有如太史遷班固所稱者乎而君儼然束帶臨之抗顔稱師亦足樂矣矧今天子明聖屢詔中外選拔賢能不限資格士以貢升者得與進士並用往往躋陟華要當是時将必有人焉勵行檢飭官箴卓然出乎其類以應上之求者不在君歟君胡為不豫粲與君俱張公弟子嘗濫名五人者之列相知最深於其行不能黙也故為著所欲言者如此既以解衆之惑又以為君贈仙華集後序仙華集者吾吳趙與哲先生所著也吳自昔以文學擅天下蓋不獨名卿材大夫之述作烜赫流著而布衣韋帶之徒篤學修詞者亦累世未嘗乏絶其在本朝憲孝之間世運熈洽海内日興於藝文而是邦尤稱多士于時若杜用嘉陳孟賢二公以髙年為諸儒倡率㝡先有名繼則先生與賀美之都維明樓仲彞沈啓南史明古輩相踵而起數君子者雖其造詣或殊然大抵博雅有文行義修潔出入則古衣冠人望而起敬部使者若郡縣大夫側行襒席将迎恐後縉紳東西行過郡中者輒造其廬而禮焉髙標逺韻照映一時鄉人蓋至于今稱之不衰而先生尤意度倜儻喜論當世事嘗受知於廵撫三原王公值歉嵗三上書請蠲賦言極剴切御史理尺籍誣執民為軍先生貽之書力陳利害民賴以免其他事往往類此至於文辭亦伉健質實不肯骩骳以諧世好古所謂直諒多聞者非斯人歟自先生與數君子者没吳中耆舊略盡後進之士琱琢曼辭日入於佻巧而前輩朴雅誠直之意微矣粲生晩竊獨嚮往之而不獲覩其流風遺烈以為恨乃今讀先生之文寔重有感焉或者顧疑其言渉時事非處士所宜是殆不然夫人各有志劉勝雖清髙未必賢於杜密使李膺為鍾瑾亦非所安也彼隠情惜已自同寒蟬者直拘士一隅之見豈所以論夫𢎞達君子者哉是集為詩文通若干首蓋先生之子處州教授磬所自輯録将刻而傳焉屬粲為校定因附所欲言者於後先生名同魯與哲其字其先出宋宗室所居有仙華山因以名其集云贈長洲趙侯入覲序蘇天下劇郡長洲其首邑也為之令者恒病其難自余省事已来所見邑之賢令亦無幾人若李開州俞新昌賀渭南三君者皆循良吏也語其所長則今趙侯實兼之侯闗西盩厔人以進士釋褐補令長洲始至值縣政久不理蠧弊叢積慨然将一蠲滌之既悉心訪究得其利病所在於是摧抑富彊扶樹貧弱豪右獵取之徒咸斂戢退聽而困踣失業者始栩栩若更生矣諸大姓詭冒縉紳家籍規免庸調悉釐正之使與編氓齒民當受役者苦輕重失平侯先黙察其資力髙下手自籍記及期召立庭中披籍命之無弗愜適政務填委雍容裁決動中肯綮無細大皆立斷胥吏束手不能為姦而貴勢請託亦無自入也民曰有開州之敏侯性恬淡寡欲而介潔自将苞苴不入服御儉陋如寒士居常非公㑹不設肉食間出百里外一𨽻負簞笥以従菜羮糲飯欣然甘之大官顯人過境無一蔬之餉役于官者終嵗晏然不知横費民曰有新昌之儉制使以璽書督逋賦他邑民死杖下者什九侯獨以身捍拒又為多方擘畫賦卒用完而民間按堵無擾及諸非時科率一切省削上官或有可否輒齗齗辨爭必得請乃已時有所拘攝第出片紙授里甲以往墟落間無公𨽻之跡焉其視衆庶所患苦真若疾痛在已懼其除去之不速也民曰有渭南之仁若夫獄訟清賦稅集特其餘事耳蓋侯既才識優裕又果於自信未嘗以利害為前卻監司牧守往往以彊項目之或加譴怒訖不為變至於接對士民則又平易簡直弗屑以笞罰立威而得其一言者㒺不厭服是故無賢不肖咸愛樂其政頌歎者無間言云君子曰昔之循良吏列於史牒者可數矣後世以為不可覯見及今觀趙侯之政乃知古人未足多也而以三君為况葢直舉夫耳目所睹記者爾侯蒞邑四年輩類多超取清顯而侯邅囘日久無沮悔色益勤恤民隠孜孜未已也於戲賢哉於是侯當入覲京師民聞之曰侯其自此升矣嬰孺失母如吾人何嗁泣咨嗟相屬於路余固閔夫人之情而重惜賢令之去弗能留也雖然竊願有以告侯者長洲之境東西相距僅百里耳嵗賦且數十萬雜調不與焉自頃水旱相仍田里凋瘁而征需之目有加無已斯非仁人所蹙頞者乎前此侯嘗語余以所當釐革者而太息曰是吾今日所不得為與所不敢言也而有志焉今侯且升朝為天子近臣是将得為之矣雖不得為将得言之矣而豈遽㤀前日之志哉古之人臣見於君者必有所執以為贄侯之往也獨無以自獻者乎余也寔深望之於其行書以為贈後執法篇贈陳子東之考績閩陳子東之之補常郡推官也吾友濮陽蘇允吉氏贈之執法篇其考績當行也屬邑武進令李子元素而下五人求贈言於陸子陸子曰夫蘇氏之㫖陳子則允蹈之矣余何言哉然李子之請弗但已也於是為作後執法篇云陸子曰甚哉執法之難也往古之世吏持其法如懸衡而上下倓然従之無或沮也無或蔽也俗降而靡薄姦偽萌起士民之謗讟易興監司者尊嚴若神喜怒好惡弗常也當是時吏救過不給何暇乃得行其志乎是故有沮焉則靡靡則弛有蔽焉則惑惑則紊於是乎法抏而民敝非一日之積矣為説者曰士欲其剛夫剛則無靡也欲其明夫明則無惑也士無剛明之資故曰執法難斯言似也近世吏有聲為剛明者矣夷考之乃不然其為剛也悻悻者也其為明也察察者也俄而進陟以馴至乎大僚也則盡易其本操悻悻者鰓鰓爾矣察察者憒憒爾矣此無異故弗誠之過也君子曰非剛明之難也誠則難矣無靡也無惑也而有終兹惟誠乎執法者能誠而天下其誰易之陳子始起明經典教于濮既而舉進士補今官所治名天下要劇郡乃陳子為之撥煩理棼有餘裕焉其聴獄無遯情而議法有定守忠信懇款之意藹然出刑章吏牘外所謂剛明而誠者非耶陳子今入朝且進陟而顯矣雖大僚固其所必至也君子謂若人曩治一郡不肯枉三尺法以病民而為大僚有弗達其志者乎陳子行矣無靡也無惑也而有終其毋曰執法難也余始識陳子寔因其官之長符子大克符子者蓋今之清彊吏云余固重其剛明而尤願其有終者故於陳子而獻規焉亦因以勵符子也贈郡倅常公序昔者嘗讀史至班孟堅范蔚宗所述循吏傳觀其為政雖設施方略不同然大抵尊賢貴徳躬行禮讓以先之使衆庶悦慕興於行誼是以教化宣明風俗歸厚後世稱其𢎞美千載不衰葢導民有本者其效如此自余始有知識亦嘗聞諸長老言往時從政者每以禮教為大務於境内賢士大夫嵗時造請往来儀節雍容甚盛乃至山林韋布有修辭飭行者輒親屈邦君之重與之為禮其人皆褒衣大冠槃辟雅拜坐則講說今古移日乃罷以為常當是時𢎞厚謙抑之風由都邑達乎田野民知自愛而重犯法獄訟衰減苛慝不作上下之間穆如也比嵗以来此道寖廢自墨綬以上皆簡貴自尊其遇士大夫匪惟禮意之薄而已又加威怒焉有訟者至於庭稍渉搢紳之族鮮不被抑然所陵藉特其閒冷孱弱者耳即貴勢家雖有姦如山不問且自詭能摧彊扶弱以是立名迹云嗟乎亦弗思甚矣為治自有中道刻轢細民以奉巨室賢者恥之而挫辱衣冠以悦姦宄亦仁人之所惡也書曰㒺違道以干百姓之譽若彼所為謂之違道非邪乃使譁訐增長嚚訟日繁天下之俗浸淫入於靡薄是誰之過歟於是乎知古之循吏屈已下賢以訓厲民俗也其識慮逺矣而良史書之不厭繁委亦有意哉交河常公起進士為尚書郎擢御史出叅大藩坐詿累左遷倅貳吳郡為人倜儻有大節其好士特出於天性雖簿書倥偬而延訪耆俊恒若不及後進諸生苟知文蓺公皆虚心引接察其所欲惡而道利之進見者人人自以為常公親已逺近聞之譽嘆相屬曰是風也其不見於當世久矣昔宓子賤宰單父師事邑之賢士仲尼惜之以為所治者小未盡其用有如常公蓋能敦行古道者乃今以資望當遷君子亦惜其蒞吳之不専且久也令得綰章斯郡或綏殿南服假以嵗月禮讓之俗庶其有興乎公明達善斷寛簡不苛聽獄無小大必叅稽情法未嘗苟徇上官喜怒人尤以為難其政蓋無弗可紀余屬有感於公待士之盛也故所論特詳焉因書以為贈将藉以聞於今之従政者翰林文先生八十夀序嘉靖己酉前翰林待詔衡山先生長洲文公年八十乃十一月六日維初度之辰學士大夫之能言者咸以文辭為夀粲雅辱先生知愛雖固陋其敢無述焉蓋嘗觀之國家當太平極盛之日天地之氣沖融和粹者常鍾於人材於是有道徳博聞之士出乎其間當其遇於世則雲蒸龍變聲績卓殊其不遇也則其中之浩浩者固有以自足而其藴績衍溢之餘乃獨發舒為文章經量三才鐫刻萬物以極其所欲言而存諸方策皆足以信今傳後斯亦千載之鴻業矣若人者雖戢身韜光不渉世軌然髙風絶塵傾動海内如鵷雛鸑鷟翺翔千仞不可狎玩而有目者舉識為盛時之瑞也求諸今日蓋先生其人哉先生純明髙雅口無擇言居常與物無競至於出處辭受大節所存則執義堅定終不少貶徇俗雖自謂賁育弗能奪也其為學未嘗摽揭門戸詭激干名而粹然一出於正早嵗厭章句骩骳之習為文辭力追古作者旁綜六蓺咸臻其極始在鄉校則已名滿天下自公卿以及韋布之流莫不人誦其言家有其書東西行過吳者輒往造門以考徳問業幾無虚日云間被薦升朝入翰林典國史以不能屈意權貴遂致事歸天下髙其節而惜其學之不什一試也粲嘗竊論先生之行迹謂其介潔則徐孺子醇懿則管幼安真率則陶元亮君子良以為知言乃今巋然大耋其道益尊文益竒而神完氣厚視聴歩履不衰世恒言令名夀考難於具備先生寔兼得之意所謂沖融和粹者獨禀其全乎噫嘻盛哉抑粲聞之君子之受福於天也匪徒身自饗之乃國家與蒙其庥焉是故古之耆艾魁壘之士其用舍進退論者以占國盛衰雖其閒居佚處猶足以訓整邦族扶翊名教葢所繫之重如此方今雖道化隆洽而士習未純前輩樸訥渾厚之風幾於泯息誠得大雅君子敦行古道為之表率以匡拯頺俗其庶幾乎名徳如先生者今世無幾人天而有意於斯道之昌則其福履所躋未可量也然則吾黨所以夀先生者豈區區頌禱之私言哉曰為天下賀可矣又交河常公以藩司大僚因事左降稍遷倅乘来蒞于吳誠直豈弟敦悦典文政事之暇輒造請郡中名徳其尤所敬禮者則内翰衡山先生文公今年先生夀八十常公詣粲告曰吾且為先生夀宜有辭以将之願以屬子矣粲謝不敏公曰吾頃侍坐於先生聞亟稱子之達於辭也子其無讓粲曰唯唯昔者聞之書曰天夀平格保乂有殷又曰尚猷詢兹黄髮則㒺所愆蓋老成人之重於天下也如此雖其隠顯異軌進退殊致皆足以彰朝廷之榮華為邦邑之光美若二老来歸而周業勃興子夏居西河則魏國增重乃自古記之矣先生自未仕時則以文章節行負海内之望雖嘗列官禁近而乞身早退未究於用然清修介特之操足以廉頑立懦者固已振動一時至其孝友著於家庭忠信孚於鄉族而微言緒論依於仁義道徳者皆斯人之矩則也昔人謂國家隆盛之日其君子必有耆艾之福推其有餘足庇當世殆先生之謂哉大抵老成處世如崇山峻嶽凝然鎮重莫覩其施為運用之迹而興雲出雨澤及萬物是故古之為政者鮮不以尊賢尚齒為先務知化理之本存焉爾如常公所為嚮往於先生者君子謂其非苟然而已也蓋隆耆碩重禮讓以篤俗訓民其所觀示者大矣昔任長孫崇嚴陵之禮孔文舉表鄭公之鄉前史書之以著其𢎞美其在吾吳若宋元豐間程師孟閭丘孝終諸鄉彦為夀集曰十老㑹時浦城章公岵守郡實首倡斯舉相與賦詠成什而米禮部芾為序之談者每以為盛事今先生之賢視彼諸君子吾未知所先後也而常公所行非古人之操與粲也竊願以不腆之言贊揚其盛令異時得綴録郡乘附海嶽翁後有榮耀焉故承公之命也遂不卒辭而為之序貴州按察司題名記貴州按察司重刻題名碑成憲使王公僉事朱公屬粲記之粲獲寓目焉而歎曰盛哉是其史之遺意乎史莫大於春秋矣辭不費而勸懲之㫖備後之作者其孰能違之今夫題名古未有也殆昉於近世乎自姓氏邑里之外不加一辭而勸懲之道亦森然昭矣曰史之遺意也非歟貴故夷境我文皇帝時始詔以郡縣置又設方岳重臣董臨之與内地等乃聖慮所及則大且逺矣顧今之吏於兹土者其自視則以為弗内地若也雖用人者視之亦弗内地若也是故綿厯百年而王澤猶壅習俗弗移則豈獨其民之罪哉夫憲司群吏之表也政之廢興恒必由之題名雖淺事往跡存焉觀所以得謗譽亦太史遷所謂當世得失之林矣因是以儆夫在位者庶有益乎君子謂勸懲之大者将於是乎在其誰曰非史也二公聞之咸曰善夫子之言也已盍書之遂書以冠碑首思甯堂記吾兄子徴先生少侍吾外祖叅議胡府君學始為文辭已警㧞不凡府君竒焉因取魏陽元故事為制字曰思甯而命之曰爾其成吾宅相乎勉之無忘外氏矣先生既長與群從聨名始更今字顧不忍忘府君之教乃以思甯名其所居之堂而以自號云夫甯氏在當時非顯者徒以陽元之故遂有聞於世斯亦竒矣雖然彼所謂成其宅相云者直志於富貴耳非君子所願學也府君剛方介潔平生視勢利若将凂焉至於急流勇退家居三十年絶跡公府有慕其名者求一識面不可得蓋古之獨行君子也此豈以富貴望其後人者哉昔眉山之程有蘇長公為之甥而歙祝氏實朱晦翁所自出二公之賢於外氏有光焉此固府君之所嘗稱述而先生所為不忍忘者也又豈直以陽元自待耶粲始知學先生以府君之命為之師警惰發矇恩實㒺極比粲忝竊乙酉鄉薦繼舉丙戌進士皆與府君同鄉人以為竒事先生獨累舉弗偶時論稱屈而粲尤有愧於先之之歎先生處之夷然曰士固有當務者獨一第而已乎君子謂其所養者粹矣先生今年五十乃二月十一日為始生之辰粲方繫官于外念無以致祝頌者輒記其名堂之意如此因以為夀云先生忠信仁厚未嘗為矯飾不情之行而與物無忤有暴戾者素欺侮之亦一切容忍不校為文章温雅暢達而秀傑之氣溢發嘗搜磔經史傳記手自筆録為書數百巻藏於家他日粲将序而傳之今未暇及也鄒氏復節婦墓記節婦鄒氏蓋宋名臣浩裔孫云所居常熟之東始荘父處士士能行誼髙潔節婦諱淑清嫁長洲民陳復復戍死雲南節婦方盛年無子能抗志食貧誓不更適雖履渉艱危而卒完其操正統甲子部使者以聞於朝有詔旌其門節婦死葬邑中西凌橋之側若干歩嵗久墓域蕪沒稍為鄉甿所侵據鄒之族人僉謀復之力弗逮也處士之五世孫察時尚少獨慨然曰是寜不在我㑹御史中丞虞山先生陳公有别墅直墓地甿遂舉以售焉守者且屋其上公始弗知也他日或以告公曰嘻聞之後矣亟命撤屋標識其處約敇往来者使無踐毁嵗丙午察自縣學生舉於鄉廼詣公以請公曰是吾夙心也即以歸之察於是屬徒役刜荆榛燔茅茷作垣埒樹松檟擇良日修祀事宗親集㑹小大咸喜曰吾節婦之窀穸於斯丘也微我中丞公其卒湮沒爾矣爰相與頌公之𢎞美曰丘之隆隆孰培爾封我公之功丘之秩秩孰奠爾宅我公之徳凡鄒孫子世其毖祀祝公萬年錫嘏自天察間以語粲粲曰不亦善夫不亦善夫夫君子之甄表節義凡以篤俗導民而已節婦事嘗著列縣乘迨今且逾百年鄉人猶藉藉談之詩曰蔽芾甘裳勿翦勿伐召伯所茇思其人猶愛其樹况其體魄藏焉者乎而頺然淪廢固仁人之所隠矣中丞公以純徳雅道紀綱人倫蓋嘗執憲中朝則繩弼之誼著保釐外服則彰癉之法昭今兹之舉在公直細事爾然扶植彞教以軌訓邦俗者固於是乎在昔吕榮殉節糜君崇義婦之阪鬱生守志姚子表貞姬之號斯固吾鄉邑舊事也乃今復遘見之而察能篤念先烈敏於舉義以卒成其父兄宗族之志亦賢矣君子謂中丞公也仁謂察也孝皆盛節也不可以不志庸敘述大致俾刋列貞石植諸墓左誕彰厥休且以視後来者庶永永無壊陸子餘集巻一
